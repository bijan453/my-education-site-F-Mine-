<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>География: Логика и Вопросы</title>
<style>
/* Основные стили */
@media (max-width: 768px){
  h1{ font-size:24px; }
  button{ width:100%; }
}
body {
  margin: 0; padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #1e1e2f;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 { margin-bottom: 20px; color: gold; text-shadow: 0 0 8px gold; }

/* Сетка уровней */
.levels-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  width: 90%;
  max-width: 1300px;
}

/* Кнопки уровней */
.level-btn {
  padding: 25px;
  background: linear-gradient(135deg, #ffd700, #ffb700);
  border-radius: 15px;
  font-weight: bold;
  font-size: 1.1rem;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,215,0,0.7);
  transition: 0.3s;
}
.level-btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(255,215,0,1);
}

/* Модальное окно викторины */
#quiz-modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex; justify-content: center; align-items: center;
  opacity: 0; visibility: hidden;
  transition: 0.5s;
}
#quiz-modal.open {
  opacity: 1; visibility: visible;
}

/* Контейнер внутри модального окна */
.quiz-box {
  background: #2e2e4d;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 600px;
  text-align: center;
  position: relative;
}

/* Вопрос и кнопки */
.quiz-question { font-size: 1.2rem; margin-bottom: 20px; }
.quiz-options { display: flex; flex-direction: column; gap: 15px; }
.quiz-option {
  padding: 12px;
  border: none; border-radius: 10px;
  background: #555; color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
.quiz-option:hover { transform: translateY(-2px); }
.quiz-option.correct { background: #28a745; }
.quiz-option.wrong { background: #dc3545; }

/* Прогресс */
.progress { height: 15px; background: #444; border-radius: 10px; margin-top: 20px; overflow: hidden; }
.progress-bar { height: 100%; width: 0; background: gold; transition: 0.5s; }

/* Кнопка закрытия */
.close-btn {
  position: absolute; top: 10px; right: 10px;
  background: #ff6b6b; border: none;
  color: white; padding: 6px 12px;
  border-radius: 10px; cursor: pointer;
  font-weight: bold;
}

/* Таблица рекордов */
.record-board {
  margin-top: 30px;
  width: 90%;
  max-width: 600px;
  background: rgba(255,215,0,0.1);
  border-radius: 12px;
  padding: 20px;
  text-align: left;
  box-shadow: 0 0 10px gold;
}
.record-board h2 { margin-bottom: 10px; color: gold; }
.record-item { padding: 6px 0; border-bottom: 1px solid #444; }
</style>

// =================== Логика ===================
const levelsContainer = document.getElementById("levels-container");
const quizModal = document.getElementById("quiz-modal");
const quizQuestion = document.getElementById("quizQuestion");
const quizOptions = document.getElementById("quizOptions");
const progressBar = document.getElementById("progressBar");
const closeQuiz = document.getElementById("closeQuiz");
const recordsList = document.getElementById("recordsList");

let currentLevel = 0;
let currentQ = 0;
let score = 0;

// Создание кнопок уровней
levels.forEach((lvl, idx)=>{
  const btn = document.createElement("button");
  btn.innerText = "Уровень " + (idx+1);
  btn.classList.add("level-btn");
  btn.addEventListener("click", ()=>{
    playClick();
    startLevel(idx);
  });
  levelsContainer.appendChild(btn);
});

// Начало уровня
function startLevel(levelIdx){
  currentLevel = levelIdx;
  currentQ = 0;
  score = 0;
  quizModal.classList.add("open");
  showQuestion();
  updateProgress();
}

// Показ вопроса
function showQuestion(){
  const q = levels[currentLevel][currentQ];
  quizQuestion.innerText = q.q;
  quizOptions.innerHTML = "";
  q.opts.forEach((opt, i)=>{
    const btn = document.createElement("button");
    btn.classList.add("quiz-option");
    btn.innerText = opt;
    btn.addEventListener("click", ()=>{
      playClick();
      if(i === q.a){
        btn.classList.add("correct");
        score++;
      } else {
        btn.classList.add("wrong");
      }
      setTimeout(()=>{ nextQuestion(); }, 500);
    });
    quizOptions.appendChild(btn);
  });
}

// Следующий вопрос
function nextQuestion(){
  currentQ++;
  updateProgress();
  if(currentQ < levels[currentLevel].length){
    showQuestion();
  } else {
    endLevel();
  }
}

// Обновление прогресс-бара
function updateProgress(){
  const total = levels[currentLevel].length;
  const perc = (currentQ/total)*100;
  progressBar.style.width = perc + "%";
}

// Конец уровня
function endLevel(){
  quizModal.classList.remove("open");
  alert("🎉 Поздравляем! Вы закончили уровень " + (currentLevel+1) + " с результатом " + score + "/" + levels[currentLevel].length);
  saveRecord(currentLevel+1, score);
  showRecords();
}

// Закрыть модалку
closeQuiz.addEventListener("click", ()=>{
  quizModal.classList.remove("open");
});

// Сохранение рекордов в localStorage
function saveRecord(level, sc){
  const recs = JSON.parse(localStorage.getItem("geoRecords")||"[]");
  recs.push({level, score: sc, date: new Date().toLocaleString()});
  localStorage.setItem("geoRecords", JSON.stringify(recs));
}

// Показ рекордов
function showRecords(){
  const recs = JSON.parse(localStorage.getItem("geoRecords")||"[]");
  recordsList.innerHTML = "";
  recs.slice(-10).reverse().forEach(r=>{
    const div = document.createElement("div");
    div.classList.add("record-item");
    div.innerText = `Уровень ${r.level} - ${r.score}/4 (${r.date})`;
    recordsList.appendChild(div);
  });
}
showRecords();
</script>
