<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080e;
  --surface: #0e0f1a;
  --surface2: #141520;
  --surface3: #1b1c2c;
  --border: rgba(255,255,255,0.055);
  --border2: rgba(255,255,255,0.09);
  --indigo: #6366f1;
  --indigo2: #4f46e5;
  --indigo-dim: rgba(99,102,241,0.12);
  --text: #dde0f5;
  --muted: #484868;
  --danger: #f43f5e;
  --green: #34d399;
  --cyan: #22d3ee;
  --gold: #fbbf24;
  --gold2: #d97706;
  --own-bg: rgba(99,102,241,0.1);
  --own-border: rgba(99,102,241,0.22);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
header {
  position:relative; z-index:100;
  background:rgba(7,8,14,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 14px; height:52px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  flex-shrink:0;
}
.logo {
  font-family:'Syne',sans-serif; font-weight:800; font-size:20px;
  background:linear-gradient(110deg,var(--gold) 0%,var(--indigo) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:-0.5px; flex-shrink:0;
}
.header-left { display:flex; align-items:center; gap:8px; }
.header-right { display:flex; align-items:center; gap:6px; }
.hbtn {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:5px 9px;
  color:var(--muted); cursor:pointer; font-size:13px;
  transition:all .2s; font-family:inherit;
}
.hbtn:hover { border-color:var(--indigo); color:var(--indigo); }
.hbtn.danger:hover { border-color:var(--danger); color:var(--danger); }
#userBadge {
  font-size:11px; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  padding:4px 10px; border-radius:20px;
}
#userBadge span { color:var(--gold); font-weight:600; }

/* ── APP LAYOUT ── */
#app {
  flex:1; display:flex; overflow:hidden; position:relative;
}

/* ── CHAT LIST ── */
#chatListPanel {
  width:100%; display:flex; flex-direction:column;
  border-right:1px solid var(--border);
  transition:width .2s;
}
#app.chat-open #chatListPanel { width:0; overflow:hidden; border:none; }

.chatListHead {
  padding:10px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.chatListHead input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px; color:var(--text);
  font-family:inherit; font-size:13px; outline:none;
}
.chatListHead input:focus { border-color:var(--indigo); }
.newChatBtn {
  background:var(--indigo); color:white; border:none;
  border-radius:9px; padding:8px 12px; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit; white-space:nowrap;
  transition:background .15s;
}
.newChatBtn:hover { background:var(--indigo2); }

#chatList {
  flex:1; overflow-y:auto; padding:4px 0;
}
#chatList::-webkit-scrollbar { width:3px; }
#chatList::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }

.chatItem {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; cursor:pointer; transition:background .12s;
  border-bottom:1px solid rgba(255,255,255,.03);
}
.chatItem:hover { background:rgba(255,255,255,.03); }
.chatItem.active { background:rgba(99,102,241,.08); border-color:rgba(99,102,241,.15); }

.chatAvatar {
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--indigo),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; color:white; text-transform:uppercase;
  overflow:hidden; position:relative;
}
.chatAvatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.chatAvatar.group-avatar { border-radius:12px; background:linear-gradient(135deg,var(--gold),var(--indigo)); }
.chatInfo { flex:1; min-width:0; }
.chatName {
  font-size:14px; font-weight:600; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.chatPreview {
  font-size:12px; color:var(--muted); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.chatMeta { text-align:right; flex-shrink:0; }
.chatTime { font-size:10px; color:var(--muted); white-space:nowrap; }
.chatUnread {
  background:var(--indigo); color:white; font-size:10px; font-weight:700;
  border-radius:10px; padding:1px 6px; margin-top:4px; display:inline-block;
}
.chatEmpty { text-align:center; padding:50px 20px; color:var(--muted); }
.chatEmpty .icon { font-size:40px; margin-bottom:10px; opacity:.5; }

/* ── CHAT VIEW ── */
#chatView {
  flex:1; display:none; flex-direction:column; min-width:0;
}
#app.chat-open #chatView { display:flex; }

.chatViewHead {
  padding:0 12px; height:52px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  background:rgba(7,8,14,0.92); backdrop-filter:blur(20px);
}
.backBtn {
  background:none; border:none; color:var(--muted);
  font-size:18px; cursor:pointer; padding:4px;
}
.backBtn:hover { color:var(--text); }
.chatViewAvatar {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--indigo),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:white; overflow:hidden;
}
.chatViewAvatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.chatViewAvatar.group-avatar { border-radius:10px; }
.chatViewInfo { flex:1; min-width:0; }
.chatViewName { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chatViewStatus { font-size:11px; color:var(--muted); }
.chatViewStatus.online { color:var(--green); }
.chatViewActions { display:flex; gap:5px; }

/* ── MESSAGES FEED ── */
#feed {
  flex:1; overflow-y:auto; padding:14px 12px 10px;
  display:flex; flex-direction:column; gap:2px;
}
#feed::-webkit-scrollbar { width:3px; }
#feed::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }

.msg-row {
  display:flex; align-items:flex-end; gap:7px;
  animation:fadeUp .2s ease; position:relative; padding:1px 0;
}
.msg-row.own { flex-direction:row-reverse; }
.msg-row.grouped { padding-top:0; }
.msg-row.grouped .bubble { border-top-left-radius:8px; }
.msg-row.grouped.own .bubble { border-top-right-radius:8px; }
.msg-row:not(.grouped) .bubble { border-top-left-radius:16px; }
.msg-row:not(.grouped).own .bubble { border-top-right-radius:16px; }
.msg-row:hover { background:rgba(255,255,255,.015); border-radius:12px; }
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.avatar {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--indigo),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:white; text-transform:uppercase;
  margin-bottom:2px; overflow:hidden;
}
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.avatar.admin-avatar { background:linear-gradient(135deg,var(--gold),var(--gold2)); }
.avatar-placeholder { width:30px; height:0; flex-shrink:0; }

.bubble {
  max-width:72%; border-radius:16px; padding:9px 13px 7px;
  position:relative; word-break:break-word;
  transition:box-shadow .15s;
}
.bubble:hover { box-shadow:0 2px 8px rgba(0,0,0,.12); }
.bubble.other { background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px; }
.bubble.own { background:var(--own-bg); border:1px solid var(--own-border); border-bottom-right-radius:4px; }
.bubble.admin-bubble { border-color:rgba(251,191,36,.2); background:rgba(251,191,36,.04); }
.bubble.pinned-card { box-shadow:0 0 0 1px var(--gold); }

.bubble-author {
  font-size:11px; font-weight:700; color:var(--indigo);
  margin-bottom:3px; display:flex; align-items:center; gap:5px;
}
.admin-tag {
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  color:#000; font-size:9px; font-weight:700; letter-spacing:.5px;
  padding:1px 5px; border-radius:4px; text-transform:uppercase;
}
.msg-text { font-size:14px; line-height:1.55; color:#ccd0ed; }
.msg-text mark { background:rgba(251,191,36,.22); color:var(--gold); border-radius:3px; padding:0 2px; }
.mention { color:var(--cyan); font-weight:600; background:rgba(34,211,238,.08); border-radius:4px; padding:0 3px; cursor:pointer; }

/* reply quote */
.reply-quote {
  background:rgba(99,102,241,.07); border-left:3px solid var(--indigo);
  border-radius:6px; padding:5px 9px; margin-bottom:6px;
  font-size:12px; color:var(--muted); cursor:pointer; transition:background .15s;
}
.reply-quote:hover { background:rgba(99,102,241,.12); }
.reply-quote strong { color:var(--indigo); display:block; font-size:10px; margin-bottom:1px; }

/* images */
.msg-img {
  margin-top:6px; border-radius:10px; max-width:100%; max-height:280px;
  object-fit:cover; display:block; cursor:zoom-in; transition:opacity .2s;
}
.msg-img:hover { opacity:.92; }
.img-skeleton {
  margin-top:6px; border-radius:10px; width:100%; height:160px;
  background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.file-card {
  display:flex; align-items:center; gap:9px; margin-top:6px;
  background:rgba(99,102,241,.06); border:1px solid rgba(99,102,241,.18);
  border-radius:10px; padding:9px 11px; text-decoration:none; transition:background .15s;
}
.file-card:hover { background:rgba(99,102,241,.12); }
.file-icon { font-size:20px; flex-shrink:0; }
.file-info { flex:1; min-width:0; }
.file-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-dl { font-size:11px; color:var(--indigo); flex-shrink:0; }

.voice-msg {
  display:flex; align-items:center; gap:8px; margin-top:6px;
  background:rgba(34,211,238,.06); border:1px solid rgba(34,211,238,.15);
  border-radius:10px; padding:7px 10px;
}
.voice-msg audio { height:30px; flex:1; min-width:0; accent-color:var(--cyan); }
.voice-icon { font-size:15px; flex-shrink:0; }

/* reactions & footer */
.bubble-footer {
  display:flex; align-items:center; flex-wrap:wrap; gap:4px;
  margin-top:6px; padding-top:5px; border-top:1px solid var(--border);
}
.footer-left { display:flex; align-items:center; gap:3px; flex-wrap:wrap; flex:1; }
.footer-right { display:flex; align-items:center; gap:3px; margin-left:auto; }
.like-btn {
  display:inline-flex; align-items:center; gap:4px;
  background:none; border:1px solid var(--border); border-radius:14px;
  padding:2px 8px; color:var(--muted); font-size:11px; font-weight:600;
  cursor:pointer; transition:all .15s; font-family:inherit;
}
.like-btn:hover,.like-btn.liked { background:rgba(244,63,94,.07); border-color:#f43f5e; color:#f97316; }
.reaction-btn {
  display:inline-flex; align-items:center; gap:2px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:14px; padding:2px 7px; font-size:11px;
  cursor:pointer; transition:all .12s; font-family:inherit; color:var(--text);
}
.reaction-btn:hover { border-color:var(--indigo); transform:scale(1.06); }
.reaction-btn.active { background:rgba(99,102,241,.14); border-color:var(--indigo); }
.emoji-popup {
  position:absolute; bottom:calc(100% + 6px); left:0;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:11px; padding:7px; display:none; gap:4px; z-index:50;
  box-shadow:0 8px 30px rgba(0,0,0,.55);
}
.emoji-popup.open { display:flex; }
.emoji-popup button { background:none; border:none; font-size:17px; cursor:pointer; padding:3px; border-radius:5px; transition:background .12s; }
.emoji-popup button:hover { background:rgba(255,255,255,.08); }
.emoji-picker-btn {
  background:none; border:1px solid var(--border); border-radius:14px;
  padding:2px 7px; font-size:12px; cursor:pointer; transition:all .12s; color:var(--muted);
}
.emoji-picker-btn:hover { border-color:var(--indigo); }
.msg-actions { display:flex; gap:2px; }
.icon-btn {
  background:none; border:1px solid transparent; border-radius:7px;
  padding:3px 5px; font-size:11px; cursor:pointer; transition:all .12s;
  font-family:inherit; color:var(--muted);
}
.icon-btn:hover { border-color:var(--border2); color:var(--text); }
.icon-btn.delete-btn:hover { color:var(--danger); border-color:rgba(244,63,94,.25); }
.msg-time-inline { font-size:10px; color:var(--muted); white-space:nowrap; }
.msg-status { font-size:11px; color:var(--muted); }
.msg-status.read { color:var(--cyan); }
.edited-tag { font-size:10px; color:var(--muted); }

/* edit */
.edit-area-wrap { margin-top:6px; display:none; }
.edit-area-wrap textarea {
  width:100%; background:var(--surface3); border:1px solid var(--indigo);
  border-radius:8px; padding:7px 10px; color:var(--text); font-family:inherit;
  font-size:13px; resize:none; outline:none; line-height:1.5;
}
.edit-btns { display:flex; gap:5px; margin-top:5px; }
.edit-save-btn { background:var(--indigo); color:white; border:none; border-radius:7px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
.edit-cancel-btn { background:var(--surface3); color:var(--muted); border:1px solid var(--border); border-radius:7px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }

/* translate */
.translate-btn {
  background:none; border:1px solid var(--border); border-radius:7px;
  padding:1px 6px; font-size:10px; cursor:pointer; color:var(--muted);
  transition:all .12s; font-family:inherit;
}
.translate-btn:hover { border-color:var(--indigo); color:var(--indigo); }
.translate-result {
  margin-top:5px; padding:5px 8px; border-radius:7px;
  background:rgba(99,102,241,.06); border:1px solid rgba(99,102,241,.12);
  font-size:12px; line-height:1.5; color:var(--text); font-style:italic;
}

/* date divider */
.date-divider { display:flex; align-items:center; gap:10px; margin:16px 0 8px; }
.date-divider::before,.date-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.date-divider span {
  font-size:10px; font-weight:600; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  padding:2px 9px; border-radius:20px; white-space:nowrap;
}

/* typing */
#typingBar { padding:0 14px 5px; font-size:11px; color:var(--muted); min-height:18px; }
.typing-dots span {
  display:inline-block; width:3px; height:3px;
  background:var(--muted); border-radius:50%; margin:0 1px;
  animation:typingDot 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* scroll button */
#scrollBtn {
  position:absolute; bottom:130px; right:18px; z-index:200;
  width:36px; height:36px; background:var(--indigo); color:white;
  border:none; border-radius:50%; font-size:14px;
  cursor:pointer; box-shadow:0 4px 16px rgba(99,102,241,.4);
  display:none; align-items:center; justify-content:center;
  transition:opacity .2s, transform .2s;
}
#scrollBtn.show { display:flex; }

/* ── COMPOSE BAR ── */
#composeBar {
  position:relative; z-index:10;
  background:rgba(7,8,14,.94); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); padding:7px 12px 10px;
  flex-shrink:0;
}
.compose-inner { display:flex; flex-direction:column; gap:5px; }
#charCounter { text-align:right; font-size:10px; color:var(--muted); display:none; }
#charCounter.warn { color:var(--gold); }
#charCounter.danger { color:var(--danger); }

#replyPreview {
  display:none; background:rgba(99,102,241,.07);
  border:1px solid rgba(99,102,241,.16); border-radius:9px;
  padding:5px 10px; font-size:12px; color:var(--muted);
  align-items:center; gap:6px;
}
#replyPreview strong { color:var(--indigo); }
#cancelReply { margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; }

#photoPreviewWrap {
  display:none; align-items:center; gap:7px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:5px 9px;
}
#photoThumb { width:28px; height:28px; border-radius:5px; object-fit:cover; }
#clearPhoto { background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; }

#uploadProgress {
  display:none; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:6px 10px; align-items:center; gap:9px;
  font-size:11px; color:var(--muted);
}
#uploadProgress.active { display:flex; }
#progressBar { flex:1; height:3px; background:var(--surface3); border-radius:2px; overflow:hidden; }
#progressFill { height:100%; background:linear-gradient(90deg,var(--indigo),var(--cyan)); border-radius:2px; width:0%; transition:width .3s; }

#voicePreviewWrap {
  display:none; align-items:center; gap:7px;
  background:var(--surface2); border:1px solid rgba(34,211,238,.2);
  border-radius:9px; padding:5px 9px;
}
#voicePreviewWrap audio { height:28px; flex:1; accent-color:var(--cyan); }
#clearVoice { background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; }

.compose-row { display:flex; gap:6px; align-items:flex-end; }
#msgInput {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; color:var(--text); font-family:inherit; font-size:14px;
  padding:8px 12px; resize:none; outline:none;
  max-height:120px; min-height:38px; transition:border-color .2s; line-height:1.5;
}
#msgInput:focus { border-color:var(--indigo); }
#msgInput::placeholder { color:var(--muted); }
.compose-actions { display:flex; gap:4px; align-items:center; }
.cmp-btn {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:all .15s;
  color:var(--muted); flex-shrink:0;
}
.cmp-btn:hover { border-color:var(--indigo); color:var(--indigo); }
#voiceBtn:hover { border-color:var(--danger); color:var(--danger); }
#voiceBtn.recording { border-color:var(--danger); color:white; background:rgba(244,63,94,.18); animation:recPulse 1s ease infinite; }
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.5)}50%{box-shadow:0 0 0 5px rgba(244,63,94,0)}}

#sendBtn {
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  color:white; border:none; border-radius:9px;
  width:36px; height:36px; font-size:15px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .2s; box-shadow:0 3px 10px rgba(99,102,241,.3);
}
#sendBtn:hover { transform:translateY(-1px); }
#sendBtn:disabled { opacity:.35; cursor:not-allowed; transform:none; }

#composeEmojiPanel {
  display:none; flex-wrap:wrap; gap:3px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:11px; padding:6px;
}
#composeEmojiPanel.open { display:flex; }
#composeEmojiPanel button { background:none; border:none; font-size:19px; cursor:pointer; padding:3px; border-radius:5px; transition:background .12s; }
#composeEmojiPanel button:hover { background:rgba(255,255,255,.07); }

/* GIF panel */
#gifPanel { display:none; background:var(--surface2); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:5px; }
#gifPanel.open { display:block; }
#gifSearchRow { display:flex; padding:7px; border-bottom:1px solid var(--border); }
#gifSearchInput {
  flex:1; background:var(--surface3); border:1px solid var(--border);
  border-radius:8px; padding:6px 10px; color:var(--text); font-size:13px;
  font-family:inherit; outline:none;
}
#gifSearchInput:focus { border-color:var(--indigo); }
#gifGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; max-height:240px; overflow-y:auto; padding:4px; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, orderBy, query,
  doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp,
  getDoc, setDoc, deleteDoc, where, limit, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getStorage, ref, uploadBytesResumable, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3mpP7UjMrqbq-X_bmDfBQkZGbwTy6aVc",
  authDomain: "fmine-auth.firebaseapp.com",
  projectId: "fmine-auth",
  storageBucket: "fmine-auth.firebasestorage.app",
  messagingSenderId: "219769927531",
  appId: "1:219769927531:web:fbd45a0876f32927d23e2e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ── STATE ──
let currentUser = null, isAdmin = false;
let selectedFile = null, selectedVoice = null;
let likedMsgs = JSON.parse(localStorage.getItem('fmine_likes') || '[]');
let replyTo = null, typingTimer = null;
let unreadCount = 0, isAtBottom = true;
let allMessages = [], pinnedMsgId = null;
let lightboxCurrentUrl = null, presenceRef = null;
let mediaRecorder = null, audioChunks = [], isRecording = false, recordTimer = null;
let lastSentTime = 0, cooldownIv = null;
let userProfiles = {};
let allUsernames = [];

// Chat system state
let chats = []; // {id, participants, type, name, createdBy, lastMessage, lastMessageTime}
let activeChatId = null;
let unsubMessages = null;
let unsubChatList = null;

// New chat modal state
let newChatType = 'dm';
let selectedDmUser = null;
let selectedGroupUsers = new Set();

const MAX_CHARS = 1000, COOLDOWN = 8000;
const REACTIONS = ['🔥','❤️','😂','👍','😮','💯'];
const COMPOSE_EMOJIS = ['😀','😂','🔥','❤️','👍','😎','🥳','😢','💯','🎉','😍','🤔','💀','🙏','🤣','😅','👏','🫡','💪','🚀','✨','🎮','🤩','😤','👋','🫶','🥰','😮','🤯','🧠','👑','💎','🌙','⭐','🎯','💬','🤝','👀','🫠','😈'];

// ── AUTH ──
function initAuth() {
  const stored = localStorage.getItem('currentUser') || localStorage.getItem('fmine_user');
  if (!stored) { window.location.href = 'index.html'; return false; }
  currentUser = stored;
  isAdmin = (currentUser === 'admin123');
  document.getElementById('headerName').textContent = currentUser;
  if (isAdmin) document.getElementById('headerName').innerHTML = '👑 admin123';
  return true;
}
window.doLogout = () => {
  localStorage.removeItem('currentUser'); localStorage.removeItem('fmine_user');
  clearPresence(); window.location.href = 'index.html';
};

// ── PROFILES ──
async function loadUserProfile(username) {
  if (userProfiles[username]) return userProfiles[username];
  try {
    const userDoc = await getDoc(doc(db, 'users', username));
    if (userDoc.exists()) {
      const data = userDoc.data();
      userProfiles[username] = {
        photoURL: data.photoURL || data.profile?.avatar || null,
        displayName: data.displayName || data.profile?.nickname || username
      };
    } else {
      userProfiles[username] = { photoURL: null, displayName: username };
    }
  } catch { userProfiles[username] = { photoURL: null, displayName: username }; }
  return userProfiles[username];
}
async function loadAllProfiles(usernames) {
  const unique = [...new Set(usernames.filter(u => u && !userProfiles[u]))];
  await Promise.all(unique.map(u => loadUserProfile(u)));
}

async function loadAllUsers() {
  try {
    const snap = await getDocs(collection(db, 'users'));
    allUsernames = snap.docs.map(d => d.id).filter(u => u !== currentUser);
    await loadAllProfiles(allUsernames);
  } catch { allUsernames = []; }
}

// ── PRESENCE ──
async function initPresence() {
  presenceRef = doc(db, 'presence', currentUser + '_' + Math.random().toString(36).slice(2,7));
  await setDoc(presenceRef, { user: currentUser, ts: Date.now() });
  setInterval(async () => { if (presenceRef) await setDoc(presenceRef, { user: currentUser, ts: Date.now() }).catch(()=>{}); }, 20000);
  window.addEventListener('beforeunload', clearPresence);
}
async function clearPresence() { if (presenceRef) await deleteDoc(presenceRef).catch(()=>{}); }
async function isUserOnline(username) {
  try {
    const q = query(collection(db, 'presence'), where('user', '==', username), limit(5));
    const snap = await getDocs(q);
    const cutoff = Date.now() - 60000;
    return snap.docs.some(d => d.data().ts > cutoff);
  } catch { return false; }
}

// ── TYPING (per-chat) ──
async function setTyping(active) {
  if (!currentUser || !activeChatId) return;
  const tRef = doc(db, 'typing', activeChatId + '_' + currentUser);
  if (active) await setDoc(tRef, { user: currentUser, chatId: activeChatId, ts: Date.now() });
  else await deleteDoc(tRef).catch(() => {});
}
function startTypingListener() {
  onSnapshot(collection(db, 'typing'), snap => {
    if (!activeChatId) return;
    const cutoff = Date.now() - 4000;
    const typers = snap.docs
      .filter(d => d.data().chatId === activeChatId && d.data().user !== currentUser && d.data().ts > cutoff)
      .map(d => d.data().user);
    const bar = document.getElementById('typingBar');
    bar.innerHTML = typers.length
      ? `<span style="display:inline-flex;align-items:center;gap:5px">${escHtml(typers.join(', '))} печатает<span class="typing-dots"><span></span><span></span><span></span></span></span>`
      : '';
  });
}

// ── CHAT LIST ──
function subscribeChatList() {
  const q = query(collection(db, 'chats'), where('participants', 'array-contains', currentUser));
  unsubChatList = onSnapshot(q, snap => {
    chats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    chats.sort((a, b) => (b.lastMessageTime?.seconds || 0) - (a.lastMessageTime?.seconds || 0));
    renderChatList(chats);
  });
}

function renderChatList(list) {
  const el = document.getElementById('chatList');
  if (!list.length) { el.innerHTML = '<div class="chatEmpty"><div class="icon">💬</div><p>Нет чатов. Нажмите "+ Новый"</p></div>'; return; }

  const promises = [];
  list.forEach(c => {
    if (c.type === 'dm') {
      const other = c.participants.find(p => p !== currentUser);
      if (other && !userProfiles[other]) promises.push(loadUserProfile(other));
    }
    (c.participants || []).forEach(p => {
      if (p !== currentUser && !userProfiles[p]) promises.push(loadUserProfile(p));
    });
  });

  Promise.all(promises).then(() => {
    el.innerHTML = list.map(c => {
      const isOwn = c.lastMessageAuthor === currentUser;
      const time = c.lastMessageTime ? formatChatTime(c.lastMessageTime) : '';
      const preview = c.lastMessage ? (isOwn ? 'Вы: ' : '') + escHtml(c.lastMessage.slice(0, 50)) : 'Нет сообщений';
      const unread = (c.unread && c.unread[currentUser]) || 0;

      let name, avatarContent, avatarClass;
      if (c.type === 'dm') {
        const other = c.participants.find(p => p !== currentUser);
        const profile = userProfiles[other] || { photoURL: null, displayName: other };
        name = profile.displayName || other;
        avatarContent = profile.photoURL ? `<img src="${escHtml(profile.photoURL)}" alt="" />` : (other || '?')[0].toUpperCase();
        avatarClass = 'chatAvatar';
      } else {
        name = escHtml(c.name || 'Группа');
        avatarContent = '👥';
        avatarClass = 'chatAvatar group-avatar';
      }

      return `<div class="chatItem ${c.id === activeChatId ? 'active' : ''}" onclick="openChat('${c.id}')">
        <div class="${avatarClass}">${avatarContent}</div>
        <div class="chatInfo">
          <div class="chatName">${name}</div>
          <div class="chatPreview">${preview}</div>
        </div>
        <div class="chatMeta">
          <div class="chatTime">${time}</div>
          ${unread > 0 ? `<div class="chatUnread">${unread}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  });
}

function formatChatTime(ts) {
  if (!ts?.seconds) return '';
  const d = new Date(ts.seconds * 1000);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  if (diff < 172800000) return 'Вчера';
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' });
}

window.filterChatList = (val) => {
  const q = val.trim().toLowerCase();
  if (!q) { renderChatList(chats); return; }
  const filtered = chats.filter(c => {
    if (c.type === 'dm') {
      const other = c.participants.find(p => p !== currentUser);
      const profile = userProfiles[other] || {};
      return ((profile.displayName || other || '') + (c.lastMessage || '')).toLowerCase().includes(q);
    }
    return ((c.name || '') + (c.lastMessage || '')).toLowerCase().includes(q);
  });
  renderChatList(filtered);
};

async function clearUnread(chatId) {
  try {
    const chatRef = doc(db, 'chats', chatId);
    const chatDoc = await getDoc(chatRef);
    if (chatDoc.exists()) {
      const data = chatDoc.data();
      const unread = data.unread || {};

        delete unread[currentUser];
        await updateDoc(chatRef, { unread });
      }
    }

}

// ── CHAT VIEW ──
async function loadChatView(chatId) {
  const chatDoc = await getDoc(doc(db, 'chats', chatId));
  if (!chatDoc.exists()) return;
  const chat = { id: chatDoc.id, ...chatDoc.data() };

  // Header
  const isGroup = chat.type === 'group';
  document.getElementById('chatInfoBtn').style.display = isGroup ? '' : 'none';

  if (isGroup) {
    document.getElementById('cvAvatar').className = 'chatViewAvatar group-avatar';
    document.getElementById('cvAvatar').innerHTML = '👥';
    document.getElementById('cvName').textContent = chat.name || 'Группа';
    document.getElementById('cvStatus').textContent = `${chat.participants.length} участников`;
    document.getElementById('cvStatus').className = 'chatViewStatus';
  } else {
    const other = chat.participants.find(p => p !== currentUser);
    const profile = userProfiles[other] || { photoURL: null, displayName: other };
    document.getElementById('cvAvatar').className = 'chatViewAvatar';
    document.getElementById('cvAvatar').innerHTML = profile.photoURL
      ? `<img src="${escHtml(profile.photoURL)}" alt="" />`
      : (other || '?')[0].toUpperCase();
    document.getElementById('cvName').textContent = profile.displayName || other;
    const online = await isUserOnline(other);
    document.getElementById('cvStatus').textContent = online ? 'онлайн' : 'не в сети';
    document.getElementById('cvStatus').className = online ? 'chatViewStatus online' : 'chatViewStatus';
  }

  // Subscribe to messages
  if (unsubMessages) unsubMessages();
  const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('ts', 'asc'));
  let firstLoad = true;
  unsubMessages = onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const wasAtBottom = isAtBottom, prevCount = allMessages.length;
    allMessages = msgs;

    const usernames = msgs.map(m => m.author).filter(Boolean);
    loadAllProfiles(usernames).then(() => {
      renderFeed(msgs);
      if (firstLoad) { scrollToBottom(false); firstLoad = false; }
      else if (wasAtBottom) scrollToBottom(true);
      else if (msgs.length > prevCount) {
        unreadCount += msgs.length - prevCount;
      }
    });
  });
}

// ── FEED ──
function renderFeed(msgs) {
  const feed = document.getElementById('feed');
  if (!msgs.length) { feed.innerHTML = '<div class="empty"><div class="icon">💬</div><p>Пока нет сообщений</p></div>'; return; }

  let html = '', lastDateLabel = null, lastAuthor = null, lastTime = null;
  msgs.forEach(m => {
    const dateLabel = formatDateDivider(m.ts);
    if (dateLabel && dateLabel !== lastDateLabel) {
      html += `<div class="date-divider"><span>${escHtml(dateLabel)}</span></div>`;
      lastDateLabel = dateLabel; lastAuthor = null;
    }
    const msgTime = m.ts ? new Date(m.ts.seconds * 1000).getTime() : 0;
    const timeDiff = lastTime ? msgTime - lastTime : Infinity;
    const isGrouped = m.author === lastAuthor && timeDiff < 120000 && timeDiff >= 0;
    html += buildCard(m, isGrouped);
    lastAuthor = m.author; lastTime = msgTime;
  });
  feed.innerHTML = html;
}

function formatDateDivider(ts) {
  if (!ts) return null;
  const d = new Date(ts.seconds * 1000), now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return 'Сегодня';
  if (diff < 172800000) return 'Вчера';
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderText(text) {
  return escHtml(text).replace(/@(\w+)/g, '<span class="mention" onclick="scrollToUserMsg(\'$1\')">@$1</span>');
}

function buildCard(m, isGrouped = false) {
  const admin = m.author === 'admin123';
  const isOwn = m.author === currentUser;
  const profile = userProfiles[m.author] || { photoURL: null, displayName: m.author };
  const initials = (m.author || '?')[0].toUpperCase();
  const time = m.ts ? new Date(m.ts.seconds*1000).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : '';

  const reactions = m.reactions || {};
  const reactionHtml = REACTIONS.map(emoji => {
    const users = reactions[emoji] || [];
    if (!users.length) return '';
    const active = users.includes(currentUser) ? 'active' : '';
    return `<button class="reaction-btn ${active}" onclick="toggleReaction('${m.id}','${emoji}')">${emoji} <span>${users.length}</span></button>`;
  }).join('');

  const emojiPickerHtml = `<div style="position:relative">
    <button class="emoji-picker-btn" onclick="toggleEmojiPicker('${m.id}')">＋</button>
    <div class="emoji-popup" id="picker-${m.id}">
      ${REACTIONS.map(e => `<button onclick="toggleReaction('${m.id}','${e}');closeAllPickers()">${e}</button>`).join('')}
    </div>
  </div>`;

  let replyHtml = '';
  if (m.replyTo) {
    const orig = allMessages.find(x => x.id === m.replyTo.id);
    const txt = orig ? (orig.text || (orig.voiceUrl ? '🎙 голосовое' : '📷 фото')) : (m.replyTo.text || '📷');
    replyHtml = `<div class="reply-quote" onclick="scrollToMsg('${m.replyTo.id}')">
      <strong>${escHtml(m.replyTo.author)}</strong>${escHtml(txt.slice(0,80))}${txt.length>80?'…':''}
    </div>`;
  }

  let mediaHtml = '';
  if (m.voiceUrl) {
    mediaHtml = `<div class="voice-msg"><span class="voice-icon">🎙</span><audio controls src="${escHtml(m.voiceUrl)}"></audio></div>`;
  } else if (m.imgUrl) {
    const isImg = m.fileType ? m.fileType.startsWith('image/') : true;
    if (isImg) {
      mediaHtml = `<div class="img-skeleton"></div><img class="msg-img" src="${escHtml(m.imgUrl)}" alt="" onclick="openLightbox('${escHtml(m.imgUrl)}')" loading="lazy" onload="this.previousElementSibling?.remove()" />`;
    } else {
      const ext = (m.fileName||'').split('.').pop().toUpperCase() || 'FILE';
      mediaHtml = `<a class="file-card" href="${escHtml(m.imgUrl)}" target="_blank" download="${escHtml(m.fileName||'file')}">
        <span class="file-icon">${ext==='PDF'?'📄':'📎'}</span>
        <div class="file-info"><div class="file-name">${escHtml(m.fileName||'файл')}</div></div>
        <span class="file-dl">⬇</span>
      </a>`;
    }
  }

  let editBtn = isOwn && m.text && !m.imgUrl && !m.voiceUrl
    ? `<button class="icon-btn" onclick="startEdit('${m.id}')" style="color:var(--cyan)">✏️</button>` : '';

  const editAreaHtml = `<div class="edit-area-wrap" id="editWrap-${m.id}">
    <textarea id="editInput-${m.id}" rows="2">${escHtml(m.text||'')}</textarea>
    <div class="edit-btns">
      <button class="edit-save-btn" onclick="saveEdit('${m.id}')">Сохранить</button>
      <button class="edit-cancel-btn" onclick="cancelEdit('${m.id}')">Отмена</button>
    </div>
  </div>`;

  let statusHtml = '';
  if (isOwn) {
    const readCount = (m.readBy||[]).filter(u => u !== currentUser).length;
    statusHtml = `<span class="msg-status ${readCount>0?'read':''}">${readCount>0?'✓✓':'✓'}</span>`;
  }

  const canDelete = isOwn || isAdmin;
  const actionsHtml = `<div class="msg-actions">
    <button class="icon-btn" onclick="replyMessage('${m.id}')" title="Ответить">↩</button>
    ${editBtn}
    ${canDelete ? `<button class="icon-btn delete-btn" onclick="deleteMessage('${m.id}')">🗑</button>` : ''}
  </div>`;

  const liked = likedMsgs.includes(m.id);
  const likeCount = (m.likes||[]).length;
  const canTranslate = m.text && m.text.length > 2;
  const footerHTML = `<div class="bubble-footer">
    <div class="footer-left">
      <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${m.id}')">${liked?'❤️':'🤍'}${likeCount?' '+likeCount:''}</button>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${reactionHtml}<div style="position:relative">${emojiPickerHtml}</div></div>
    </div>
    <div class="footer-right">
      ${actionsHtml}
      ${canTranslate ? `<button class="translate-btn" onclick="translateMessage('${m.id}')">🌐</button>` : ''}
      <span class="msg-time-inline">${time}${m.edited?' <span class="edited-tag">·ред</span>':''}</span>
      ${statusHtml}
    </div>
  </div>`;

  const bubbleInner = `${replyHtml}${m.text?`<div class="msg-text" id="msgText-${m.id}">${renderText(m.text)}</div>`:''}${editAreaHtml}${mediaHtml}${footerHTML}`;

  if (isOwn) {
    return `<div class="msg-row own ${isGrouped ? 'grouped' : ''}" id="msg-${m.id}">
      <div class="bubble own">${bubbleInner}</div>
    </div>`;
  }

  const avatarContent = profile.photoURL
    ? `<img src="${escHtml(profile.photoURL)}" alt="" />`
    : (admin ? '👑' : initials);
  const avatarClass = `avatar ${admin ? 'admin-avatar' : ''}`;

  return `<div class="msg-row other ${isGrouped ? 'grouped' : ''}" id="msg-${m.id}">
    ${isGrouped ? '<div class="avatar-placeholder"></div>' : `<div class="${avatarClass}">${avatarContent}</div>`}
    <div class="bubble other ${admin?'admin-bubble':''}">
      ${!isGrouped ? `<div class="bubble-author">
        ${admin?'<span class="admin-tag">ADMIN</span>':''}${escHtml(profile.displayName || m.author)}
      </div>` : ''}
      ${bubbleInner}
    </div>
  </div>`;
}

// ── SEND MESSAGE ──
function startCooldown() {
  if (isAdmin) return;
  let remaining = 8;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = `<span style="font-size:11px;font-weight:800">${remaining}</span>`;
  cooldownIv = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(cooldownIv); btn.disabled = false; btn.innerHTML = '↑'; }
    else btn.innerHTML = `<span style="font-size:11px;font-weight:800">${remaining}</span>`;
  }, 1000);
}

window.sendMessage = async () => {
  if (!activeChatId) return;
  const text = document.getElementById('msgInput').value.trim();
  if (!text && !selectedFile && !selectedVoice) return;

  const now = Date.now();
  if (!isAdmin && now - lastSentTime < COOLDOWN) { showToast(`⏳ Подождите`); return; }

  document.getElementById('sendBtn').disabled = true;
  await setTyping(false);

  let imgUrl = null, voiceUrl = null, fileType = null, fileName = null;
  if (selectedVoice) {
    try { voiceUrl = await uploadVoice(selectedVoice); } catch(e) { showToast('❌ Ошибка: ' + (e.message||e)); document.getElementById('sendBtn').disabled = false; hideUploadProgress(); return; }
  } else if (selectedFile) {
    try { fileType = selectedFile.type; fileName = selectedFile.name; imgUrl = await uploadFileWithProgress(selectedFile); } catch(e) { showToast('❌ Ошибка: ' + (e.message||e)); document.getElementById('sendBtn').disabled = false; hideUploadProgress(); return; }
  }

  const msgData = {
    author: currentUser, text: text||'',
    imgUrl: imgUrl||null, voiceUrl: voiceUrl||null,
    fileType: fileType||null, fileName: fileName||null,
    likes: [], reactions: {}, readBy: [currentUser], edited: false,
    ts: serverTimestamp()
  };
  if (replyTo) msgData.replyTo = { id: replyTo.id, author: replyTo.author, text: replyTo.text||'' };

  await addDoc(collection(db, 'chats', activeChatId, 'messages'), msgData);

  // Update chat last message + unread (read doc once)
  try {
    const chatSnap = await getDoc(doc(db, 'chats', activeChatId));
    const chatData = chatSnap.data();
    const prevUnread = chatData.unread || {};
    const newUnread = {};
    (chatData.participants || []).forEach(p => {
      if (p !== currentUser) newUnread[p] = (prevUnread[p] || 0) + 1;
    });
    await updateDoc(doc(db, 'chats', activeChatId), {
      lastMessage: text || (imgUrl ? '📷 фото' : voiceUrl ? '🎙 голосовое' : ''),
      lastMessageTime: serverTimestamp(),
      lastMessageAuthor: currentUser,
      unread: newUnread
    });
  } catch {}

  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';
  updateCharCounter('');
  clearPhoto(); clearVoice(); clearReply();
  lastSentTime = Date.now();
  startCooldown();
};

// ── FILE UPLOAD ──
function uploadFileWithProgress(file) {
  return new Promise((resolve, reject) => {
    if (file.size > 5*1024*1024) { reject(new Error('Макс. 5MB')); return; }
    const folder = file.type.startsWith('image/') ? 'chat-photos' : 'chat-files';
    const storageRef = ref(storage, `${folder}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`);
    const task = uploadBytesResumable(storageRef, file);
    showUploadProgress('Загрузка файла...');
    task.on('state_changed',
      snap => { const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100); document.getElementById('progressFill').style.width = pct + '%'; document.getElementById('uploadLabel').textContent = `Загрузка... ${pct}%`; },
      err => { hideUploadProgress(); reject(err); },
      async () => { hideUploadProgress(); resolve(await getDownloadURL(task.snapshot.ref)); }
    );
  });
}
function uploadVoice(blob) {
  return new Promise((resolve, reject) => {
    const storageRef = ref(storage, `chat-audio/${Date.now()}_voice.webm`);
    const task = uploadBytesResumable(storageRef, blob);
    showUploadProgress('Загрузка голосового...');
    task.on('state_changed',
      snap => { const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100); document.getElementById('progressFill').style.width = pct + '%'; },
      err => { hideUploadProgress(); reject(err); },
      async () => { hideUploadProgress(); resolve(await getDownloadURL(task.snapshot.ref)); }
    );
  });
}
function showUploadProgress(label) { document.getElementById('uploadProgress').classList.add('active'); document.getElementById('progressFill').style.width = '0%'; document.getElementById('uploadLabel').textContent = label || 'Загрузка...'; }
function hideUploadProgress() { document.getElementById('uploadProgress').classList.remove('active'); }

// ── VOICE RECORDING ──
window.toggleRecording = async () => {
  if (isRecording) { mediaRecorder.stop(); isRecording = false; clearInterval(recordTimer); document.getElementById('voiceBtn').textContent = '🎙️'; document.getElementById('voiceBtn').classList.remove('recording'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: mimeType });
      if (selectedFile) clearPhoto();
      selectedVoice = blob;
      document.getElementById('voicePreview').src = URL.createObjectURL(blob);
      document.getElementById('voicePreviewWrap').style.display = 'flex';
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start(250);
    isRecording = true;
    document.getElementById('voiceBtn').classList.add('recording');
    let secs = 0;
    recordTimer = setInterval(() => {
      secs++;
      document.getElementById('voiceBtn').textContent = `⏹ ${secs}s`;
      if (secs >= 120) { mediaRecorder.stop(); clearInterval(recordTimer); isRecording = false; document.getElementById('voiceBtn').textContent = '🎙️'; document.getElementById('voiceBtn').classList.remove('recording'); }
    }, 1000);
    showToast('🎙 Запись...');
  } catch { showToast('❌ Нет доступа к микрофону'); }
};
window.clearVoice = () => {
  selectedVoice = null;
  document.getElementById('voicePreview').src = '';
  document.getElementById('voicePreviewWrap').style.display = 'none';
  if (isRecording && mediaRecorder) { mediaRecorder.stop(); isRecording = false; clearInterval(recordTimer); document.getElementById('voiceBtn').textContent = '🎙️'; document.getElementById('voiceBtn').classList.remove('recording'); }
};

// ── LIKES ──
window.toggleLike = async (id) => {
  if (!activeChatId) return;
  const already = likedMsgs.includes(id);
  const ref2 = doc(db, 'chats', activeChatId, 'messages', id);
  if (already) {
    likedMsgs = likedMsgs.filter(x => x !== id);
    const snap = await getDoc(ref2);
    await updateDoc(ref2, { likes: (snap.data().likes||[]).filter(l => !l.startsWith(currentUser+'_')) });
  } else {
    likedMsgs.push(id);
    await updateDoc(ref2, { likes: arrayUnion(currentUser+'_'+Date.now()) });
  }
  localStorage.setItem('fmine_likes', JSON.stringify(likedMsgs));
};

// ── REACTIONS ──
window.toggleReaction = async (id, emoji) => {
  if (!activeChatId) return;
  const ref2 = doc(db, 'chats', activeChatId, 'messages', id);
  const snap = await getDoc(ref2);
  const reactions = snap.data().reactions || {};
  const users = reactions[emoji] || [];
  reactions[emoji] = users.includes(currentUser) ? users.filter(u => u !== currentUser) : [...users, currentUser];
  await updateDoc(ref2, { reactions });
};
window.toggleEmojiPicker = (id) => {

// ── REPLY ──
window.replyMessage = (id) => {
  const msg = allMessages.find(m => m.id === id);
  if (!msg) return;
  replyTo = { id, author: msg.author, text: msg.text||'' };
  document.getElementById('replyAuthorLabel').textContent = msg.author;
  document.getElementById('replyTextLabel').textContent = (msg.text || (msg.voiceUrl ? '🎙 голосовое' : '📷 фото')).slice(0,60);
  document.getElementById('replyPreview').style.display = 'flex';
  document.getElementById('msgInput').focus();
};
window.clearReply = () => { replyTo = null; document.getElementById('replyPreview').style.display = 'none'; };
window.scrollToMsg = (id) => {
  const el = document.getElementById('msg-'+id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); const bubble = el.querySelector('.bubble'); if (bubble) { bubble.style.boxShadow = '0 0 0 2px var(--indigo)'; setTimeout(() => bubble.style.boxShadow = '', 2000); } }
};

// ── CONTEXT MENU ──
let ctxMsgId = null;
function showContextMenu(e, msgId) {
  e.preventDefault(); e.stopPropagation();
  ctxMsgId = msgId;
  const menu = document.getElementById('contextMenu');
  const msg = allMessages.find(m => m.id === msgId);
  if (!msg) return;
  const isOwn = msg.author === currentUser;
  document.getElementById('ctxEditBtn').style.display = isOwn && msg.text && !msg.imgUrl && !msg.voiceUrl ? '' : 'none';
  document.getElementById('ctxDeleteBtn').style.display = (isOwn || isAdmin) ? '' : 'none';
  menu.style.left = Math.min(e.clientX || e.pageX, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(e.clientY || e.pageY, window.innerHeight - 220) + 'px';
  menu.classList.add('open');
}
function hideContextMenu() { document.getElementById('contextMenu').classList.remove('open'); ctxMsgId = null; }
window.ctxReply = () => { if (ctxMsgId) replyMessage(ctxMsgId); hideContextMenu(); };
window.ctxCopy = () => { if (ctxMsgId) { const msg = allMessages.find(m => m.id === ctxMsgId); if (msg?.text) navigator.clipboard.writeText(msg.text).then(() => showToast('📋 Скопировано')); } hideContextMenu(); };
window.ctxTranslate = () => { if (ctxMsgId) translateMessage(ctxMsgId); hideContextMenu(); };
window.ctxEdit = () => { if (ctxMsgId) startEdit(ctxMsgId); hideContextMenu(); };
window.ctxDelete = () => { if (ctxMsgId) deleteMessage(ctxMsgId); hideContextMenu(); };

let longPressTimer = null;
document.addEventListener('contextmenu', e => { const row = e.target.closest('.msg-row'); if (row) { const id = row.id?.replace('msg-',''); if (id) showContextMenu(e, id); } });
document.addEventListener('mousedown', e => { const row = e.target.closest('.msg-row'); if (!row || e.target.closest('button') || e.target.closest('audio') || e.target.closest('a')) return; longPressTimer = setTimeout(() => { const id = row.id?.replace('msg-',''); if (id) showContextMenu(e, id); }, 500); });
document.addEventListener('mouseup', () => clearTimeout(longPressTimer));
document.addEventListener('mousemove', () => clearTimeout(longPressTimer));

// ── SWIPE TO REPLY ──
let swipeStartX = 0, swipeStartY = 0, swipeMsgEl = null;
document.addEventListener('touchstart', e => { const row = e.target.closest('.msg-row'); if (!row || e.target.closest('button') || e.target.closest('audio') || e.target.closest('a')) return; swipeStartX = e.touches[0].clientX; swipeStartY = e.touches[0].clientY; swipeMsgEl = row; }, { passive: true });
document.addEventListener('touchmove', e => { if (!swipeMsgEl) return; const dx = e.touches[0].clientX - swipeStartX; const dy = e.touches[0].clientY - swipeStartY; if (Math.abs(dy) > Math.abs(dx)) { swipeMsgEl = null; return; } if (dx > 0) { swipeMsgEl.style.transform = `translateX(${Math.min(dx, 100)}px)`; swipeMsgEl.style.opacity = Math.max(0.5, 1 - dx/200); } }, { passive: true });
document.addEventListener('touchend', e => { if (!swipeMsgEl) return; const row = swipeMsgEl; row.style.transform = ''; row.style.opacity = ''; const match = (e.changedTouches[0].clientX - swipeStartX); if (match > 80) { const id = row.id?.replace('msg-',''); if (id) { replyMessage(id); showToast('↩ Ответ'); } } swipeMsgEl = null; });

// ── PHOTO / FILE ──
window.handlePhoto = (e) => { const file = e.target.files[0]; if (file) attachFile(file); };
function attachFile(file) {
  if (file.size > 5*1024*1024) { showToast('❌ Макс. 5MB'); return; }
  if (selectedVoice) clearVoice();
  selectedFile = file;
  if (file.type.startsWith('image/')) { document.getElementById('photoThumb').src = URL.createObjectURL(file); document.getElementById('photoThumb').style.display = 'block'; }
  else { document.getElementById('photoThumb').style.display = 'none'; }
  document.getElementById('photoName').textContent = file.name;
  document.getElementById('photoPreviewWrap').style.display = 'flex';
}
window.clearPhoto = () => { selectedFile = null; document.getElementById('photoInput').value = ''; document.getElementById('photoPreviewWrap').style.display = 'none'; };
document.addEventListener('paste', e => { const items = e.clipboardData?.items; if (!items) return; for (const item of items) { if (item.type.startsWith('image/')) { const file = item.getAsFile(); if (file) { attachFile(file); showToast('📷 Вставлено'); } } } });

// ── LIGHTBOX ──
window.openLightbox = (url) => { lightboxCurrentUrl = url; document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').classList.add('open'); };
window.closeLightbox = () => document.getElementById('lightbox').classList.remove('open');
window.downloadImage = async () => { if (!lightboxCurrentUrl) return; try { const r = await fetch(lightboxCurrentUrl); const b = await r.blob(); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'fmine-' + Date.now() + '.jpg'; a.click(); } catch { window.open(lightboxCurrentUrl, '_blank'); } };

// ── SCROLL ──
function checkScroll() { const maxScroll = document.getElementById('feed')?.scrollHeight - document.getElementById('feed')?.clientHeight || 99999; isAtBottom = (document.getElementById('feed')?.scrollTop || 0) >= maxScroll - 120; document.getElementById('scrollBtn').classList.toggle('show', !isAtBottom); if (isAtBottom) { unreadCount = 0; } }
function scrollToBottom(smooth = false) { const feed = document.getElementById('feed'); if (feed) feed.scrollTo({ top: feed.scrollHeight, behavior: smooth ? 'smooth' : 'auto' }); unreadCount = 0; }
document.getElementById('feed')?.addEventListener('scroll', checkScroll);

// ── SEARCH ──
let searchQuery = '';
window.toggleSearch = () => { const bar = document.getElementById('searchBar'); const open = bar.classList.toggle('open'); if (open) { document.getElementById('searchInput').placeholder = activeChatId ? 'Поиск сообщений...' : 'Поиск чатов...'; document.getElementById('searchInput').focus(); } else { document.getElementById('searchInput').value = ''; handleSearch(''); } };
window.handleSearch = (val) => { searchQuery = val.trim().toLowerCase(); if (activeChatId) applySearch(); else filterChatList(val); };
function applySearch() {
  if (!searchQuery) { document.querySelectorAll('.msg-row').forEach(el => el.classList.remove('search-match','search-hidden')); document.querySelectorAll('.msg-text').forEach(el => { const id = el.closest('.msg-row')?.id?.replace('msg-',''); const m = allMessages.find(x => x.id === id); if (m?.text) el.innerHTML = renderText(m.text); }); document.getElementById('searchResultsCount').textContent = ''; return; }
  let count = 0;
  document.querySelectorAll('.msg-row').forEach(el => { const id = el.id?.replace('msg-',''); const m = allMessages.find(x => x.id === id); const text = ((m?.text||'')+(m?.author||'')).toLowerCase(); if (text.includes(searchQuery)) { el.classList.add('search-match'); el.classList.remove('search-hidden'); count++; } else { el.classList.remove('search-match'); el.classList.add('search-hidden'); } });
  document.getElementById('searchResultsCount').textContent = count ? `Найдено: ${count}` : 'Ничего не найдено';
}

// ── NEW CHAT MODAL ──
window.openNewChatModal = () => {
  document.getElementById('newChatModal').classList.add('open');
  selectedDmUser = null; selectedGroupUsers.clear();
  document.getElementById('dmSearchInput').value = '';
  document.getElementById('groupNameInput').value = '';
  document.getElementById('groupSearchInput').value = '';
  renderDmUserList(); renderGroupUserList();
  updateCreateBtn();
};
window.closeNewChatModal = () => document.getElementById('newChatModal').classList.remove('open');
window.switchChatTab = (type) => {
  newChatType = type;
  document.getElementById('tabDM').classList.toggle('active', type === 'dm');
  document.getElementById('tabGroup').classList.toggle('active', type === 'group');
  document.getElementById('dmTab').style.display = type === 'dm' ? '' : 'none';
  document.getElementById('groupTab').style.display = type === 'group' ? '' : 'none';
  updateCreateBtn();
};

function renderDmUserList(filter = '') {
  const list = document.getElementById('dmUserList');
  const q = filter.toLowerCase();
  const users = allUsernames.filter(u => !q || (userProfiles[u]?.displayName || u).toLowerCase().includes(q));
  list.innerHTML = users.map(u => {
    const profile = userProfiles[u] || { photoURL: null, displayName: u };
    const avatar = profile.photoURL ? `<img src="${escHtml(profile.photoURL)}" alt="" />` : u[0].toUpperCase();
    return `<div class="user-select-item ${selectedDmUser===u?'selected':''}" onclick="selectDmUser('${escHtml(u)}')">
      <div class="us-avatar">${avatar}</div>
      <div class="us-name">${escHtml(profile.displayName || u)}</div>
      <span class="us-check">✓</span>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Нет пользователей</div>';
}
window.filterUserList = (val) => renderDmUserList(val);
window.selectDmUser = (u) => { selectedDmUser = selectedDmUser === u ? null : u; renderDmUserList(document.getElementById('dmSearchInput').value); updateCreateBtn(); };

function renderGroupUserList(filter = '') {
  const list = document.getElementById('groupUserList');
  const q = filter.toLowerCase();
  const users = allUsernames.filter(u => !q || (userProfiles[u]?.displayName || u).toLowerCase().includes(q));
  list.innerHTML = users.map(u => {
    const profile = userProfiles[u] || { photoURL: null, displayName: u };
    const avatar = profile.photoURL ? `<img src="${escHtml(profile.photoURL)}" alt="" />` : u[0].toUpperCase();
    return `<div class="user-select-item ${selectedGroupUsers.has(u)?'selected':''}" onclick="toggleGroupUser('${escHtml(u)}')">
      <div class="us-avatar">${avatar}</div>
      <div class="us-name">${escHtml(profile.displayName || u)}</div>
      <span class="us-check">✓</span>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Нет пользователей</div>';
}
window.filterGroupUserList = (val) => renderGroupUserList(val);
window.toggleGroupUser = (u) => { if (selectedGroupUsers.has(u)) selectedGroupUsers.delete(u); else selectedGroupUsers.add(u); renderGroupUserList(document.getElementById('groupSearchInput').value); updateCreateBtn(); };

function updateCreateBtn() {
  const btn = document.getElementById('createChatBtn');
  if (newChatType === 'dm') btn.disabled = !selectedDmUser;
  else btn.disabled = selectedGroupUsers.size < 1 || !document.getElementById('groupNameInput').value.trim();
}
document.getElementById('groupNameInput')?.addEventListener('input', updateCreateBtn);

window.createNewChat = async () => {
  if (newChatType === 'dm') {
    // Check if DM already exists
    const existing = chats.find(c => c.type === 'dm' && c.participants.includes(selectedDmUser) && c.participants.includes(currentUser));
    if (existing) { closeNewChatModal(); openChat(existing.id); return; }

    const chatRef = await addDoc(collection(db, 'chats'), {
      type: 'dm',
      participants: [currentUser, selectedDmUser],
      name: null,
      createdBy: currentUser,
      createdAt: serverTimestamp(),
      lastMessage: null,
      lastMessageTime: null,
      lastMessageAuthor: null,
      unread: {}
    });
    closeNewChatModal();
    openChat(chatRef.id);
  } else {
    const name = document.getElementById('groupNameInput').value.trim();
    if (!name || selectedGroupUsers.size < 1) return;
    const participants = [currentUser, ...selectedGroupUsers];
    const chatRef = await addDoc(collection(db, 'chats'), {
      type: 'group',
      participants,
      name,
      createdBy: currentUser,
      createdAt: serverTimestamp(),
      lastMessage: null,
      lastMessageTime: null,
      lastMessageAuthor: null,
      unread: {}
    });
    closeNewChatModal();
    openChat(chatRef.id);
  }
};

// ── GROUP INFO ──
window.openGroupInfo = async () => {
  if (!activeChatId) return;
  const chatDoc = await getDoc(doc(db, 'chats', activeChatId));
  if (!chatDoc.exists()) return;
  const chat = { id: chatDoc.id, ...chatDoc.data() };
  if (chat.type !== 'group') return;

  document.getElementById('giTitle').textContent = chat.name || 'Группа';
  await loadAllProfiles(chat.participants);

  let membersHtml = chat.participants.map(p => {
    const profile = userProfiles[p] || { photoURL: null, displayName: p };
    const avatar = profile.photoURL ? `<img src="${escHtml(profile.photoURL)}" alt="" />` : p[0].toUpperCase();
    const role = p === chat.createdBy ? 'Создатель' : '';
    return `<div class="gi-member">
      <div class="gi-member-avatar">${avatar}</div>
      <div class="gi-member-name">${escHtml(profile.displayName || p)}</div>
      ${role ? `<div class="gi-member-role">${role}</div>` : ''}
    </div>`;
  }).join('');

  const isCreator = chat.createdBy === currentUser;
  document.getElementById('giBody').innerHTML = `
    <div class="gi-section">
      <div class="gi-section-title">Участники (${chat.participants.length})</div>
      ${membersHtml}
    </div>
    <div class="gi-section">
      <div class="gi-section-title">Действия</div>
      <button class="gi-action-btn" onclick="addMembersToGroup()">➕ Добавить участника</button>
      <button class="gi-action-btn danger" onclick="leaveGroup()">🚪 Покинуть группу</button>
      ${isCreator ? `<button class="gi-action-btn danger" onclick="deleteGroup()">🗑 Удалить группу</button>` : ''}
    </div>`;

  document.getElementById('groupInfoOverlay').classList.add('open');
  document.getElementById('groupInfoPanel').classList.add('open');
};
window.closeGroupInfo = () => {
  document.getElementById('groupInfoOverlay').classList.remove('open');
  document.getElementById('groupInfoPanel').classList.remove('open');
};

window.leaveGroup = async () => {
  if (!activeChatId || !confirm('Покинуть группу?')) return;
  await updateDoc(doc(db, 'chats', activeChatId), { participants: arrayRemove(currentUser) });
  closeGroupInfo(); goBackToList(); showToast('🚪 Вы вышли из группы');
};

window.deleteGroup = async () => {
  if (!activeChatId || !confirm('Удалить группу?')) return;
  await deleteDoc(doc(db, 'chats', activeChatId));
  closeGroupInfo(); goBackToList(); showToast('🗑 Группа удалена');
};

window.addMembersToGroup = async () => {
  const name = prompt('Введите имя пользователя для добавления:');
  if (!name || !activeChatId) return;
  const user = name.trim();
  try {
    const chatDoc = await getDoc(doc(db, 'chats', activeChatId));
    const chat = chatDoc.data();
    if (chat.participants.includes(user)) { showToast('⚠️ Уже в группе'); return; }
    await updateDoc(doc(db, 'chats', activeChatId), { participants: arrayUnion(user) });
    showToast(`✅ ${user} добавлен`);
    openGroupInfo(); // refresh
  } catch { showToast('❌ Ошибка'); }
};

// ── TRANSLATION ──
async function translateMessage(msgId) {
  const msg = allMessages.find(m => m.id === msgId);
  if (!msg?.text) return;
  const existing = document.getElementById('trans-' + msgId);
  if (existing) { existing.remove(); return; }
  try {
    const detectLang = /[а-яёА-ЯЁ]/.test(msg.text) ? 'ru' : 'en';
    const targetLang = detectLang === 'ru' ? 'en' : 'ru';
    const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(msg.text)}&langpair=${detectLang}|${targetLang}`);
    const data = await resp.json();
    const translated = data.responseData?.translatedText || 'Не удалось перевести';
    const bubble = document.querySelector(`#msg-${msgId} .bubble`);
    if (bubble) { const div = document.createElement('div'); div.className = 'translate-result'; div.id = 'trans-' + msgId; div.textContent = translated; bubble.appendChild(div); }
  } catch { showToast('❌ Ошибка перевода'); }
}
window.translateMessage = translateMessage;

// ── GIF ──
let gifPanelOpen = false, gifDebounce = null;
window.toggleGifPanel = () => { gifPanelOpen = !gifPanelOpen; document.getElementById('gifPanel').classList.toggle('open', gifPanelOpen); if (gifPanelOpen) document.getElementById('gifSearchInput').focus(); };
window.handleGifSearch = (val) => { clearTimeout(gifDebounce); if (!val.trim()) { document.getElementById('gifGrid').innerHTML = ''; return; } gifDebounce = setTimeout(() => searchGifs(val.trim()), 400); };
async function searchGifs(query) {
  const grid = document.getElementById('gifGrid');
  grid.innerHTML = '<div id="gifLoading">Поиск...</div>';
  try {
    const resp = await fetch(`https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(query)}&key=AIzaSyAyimkuYQYF_FXVALexPuGQctUWRURdCYQ&limit=18&media_filter=gif,tinygif`);
    const data = await resp.json();
    if (!data.results?.length) { grid.innerHTML = '<div id="gifEmpty">Ничего не найдено</div>'; return; }
    grid.innerHTML = data.results.map(r => { const url = r.media_formats?.gif?.url || r.media_formats?.tinygif?.url || ''; return url ? `<div class="gif-item" onclick="sendGif('${escHtml(url)}')"><img src="${escHtml(url)}" loading="lazy" /></div>` : ''; }).join('');
  } catch { grid.innerHTML = '<div id="gifEmpty">Ошибка</div>'; }
}
window.sendGif = async (url) => {
  if (!activeChatId) return;
  await addDoc(collection(db, 'chats', activeChatId, 'messages'), {
    author: currentUser, text: '', imgUrl: url, voiceUrl: null, fileType: 'image/gif', fileName: 'gif',
    likes: [], reactions: {}, readBy: [currentUser], edited: false, ts: serverTimestamp()
  });
  await updateDoc(doc(db, 'chats', activeChatId), { lastMessage: '📎 GIF', lastMessageTime: serverTimestamp(), lastMessageAuthor: currentUser });
  toggleGifPanel(); document.getElementById('gifSearchInput').value = ''; document.getElementById('gifGrid').innerHTML = '';
};

// ── CHAR COUNTER ──
function updateCharCounter(val) {
  const counter = document.getElementById('charCounter'), len = val.length;
  if (len < 600) { counter.style.display = 'none'; return; }
  counter.style.display = 'block'; counter.textContent = `${len}/${MAX_CHARS}`;
  counter.className = len >= MAX_CHARS ? 'danger' : len >= 800 ? 'warn' : '';
}

// ── EMOJI COMPOSE ──
window.toggleComposeEmoji = () => document.getElementById('composeEmojiPanel').classList.toggle('open');
const emojiPanel = document.getElementById('composeEmojiPanel');
emojiPanel.innerHTML = COMPOSE_EMOJIS.map(e => `<button onclick="insertEmoji('${e}')">${e}</button>`).join('');
window.insertEmoji = (emoji) => {
  const inp = document.getElementById('msgInput');
  const start = inp.selectionStart, end = inp.selectionEnd;
  inp.value = inp.value.slice(0,start) + emoji + inp.value.slice(end);
  inp.selectionStart = inp.selectionEnd = start + emoji.length;
  inp.focus(); handleInput(inp);
};

// ── KEYBOARD ──
window.handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
window.handleInput = (el) => {
  el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  updateCharCounter(el.value); setTyping(true); clearTimeout(typingTimer);
  typingTimer = setTimeout(() => setTyping(false), 3000);
  if (el.value.length > MAX_CHARS) { el.value = el.value.slice(0, MAX_CHARS); showToast(`❌ Макс. ${MAX_CHARS}`); }
};
window.scrollToUserMsg = (username) => { const msg = allMessages.find(m => m.author === username); if (msg) scrollToMsg(msg.id); };

// ── UTILS ──
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
window.showToast = (msg) => { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };

// ── GLOBAL CLICK AWAY ──
document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-picker-btn') && !e.target.closest('.emoji-popup')) closeAllPickers();
  if (!e.target.closest('#composeEmojiBtn') && !e.target.closest('#composeEmojiPanel')) document.getElementById('composeEmojiPanel').classList.remove('open');
  if (!e.target.closest('#gifBtn') && !e.target.closest('#gifPanel')) { gifPanelOpen = false; document.getElementById('gifPanel').classList.remove('open'); }
  if (!e.target.closest('#contextMenu')) hideContextMenu();
});

// ── INIT ──
if (initAuth()) {
  Promise.all([initPresence(), loadAllUsers()]).then(() => {
    subscribeChatList();
    startTypingListener();
    setInterval(() => { if (isAtBottom && activeChatId) markVisibleAsRead(); }, 5000);
  });
}
</script>
</body>
</html>
