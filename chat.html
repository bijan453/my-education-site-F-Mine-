<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080e;
  --surface: #0e0f1a;
  --surface2: #141520;
  --surface3: #1b1c2c;
  --border: rgba(255,255,255,0.055);
  --border2: rgba(255,255,255,0.09);
  --indigo: #6366f1;
  --indigo2: #4f46e5;
  --indigo-dim: rgba(99,102,241,0.12);
  --indigo-glow: rgba(99,102,241,0.2);
  --text: #dde0f5;
  --muted: #484868;
  --danger: #f43f5e;
  --green: #34d399;
  --cyan: #22d3ee;
  --gold: #fbbf24;
  --gold2: #d97706;
  --radius: 18px;
  --own-bg: rgba(99,102,241,0.1);
  --own-border: rgba(99,102,241,0.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow-x: hidden;
}

/* grain */
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}
/* ambient */
body::after {
  content:''; position:fixed;
  top:-150px; left:50%; transform:translateX(-50%);
  width:700px; height:400px;
  background:radial-gradient(ellipse, rgba(99,102,241,0.05) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:100;
  background:rgba(7,8,14,0.88);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:52px;
  display:flex; align-items:center; justify-content:space-between;
  gap:10px;
}
.logo {
  font-family:'Syne',sans-serif; font-weight:800; font-size:20px;
  background:linear-gradient(110deg,var(--gold) 0%,var(--indigo) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:-0.5px; flex-shrink:0;
}
.header-center { display:flex; align-items:center; gap:8px; }
.header-right { display:flex; align-items:center; gap:6px; }

#onlineBadge {
  font-size:11px; color:var(--green);
  background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.18);
  padding:4px 9px; border-radius:20px;
  display:flex; align-items:center; gap:5px;
}
#onlineBadge::before {
  content:''; width:5px; height:5px; border-radius:50%;
  background:var(--green); box-shadow:0 0 6px var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#userBadge {
  font-size:11px; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  padding:4px 10px; border-radius:20px;
}
#userBadge span { color:var(--gold); font-weight:600; }

.hbtn {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:5px 9px;
  color:var(--muted); cursor:pointer; font-size:13px;
  transition:all .2s; font-family:inherit;
}
.hbtn:hover { border-color:var(--indigo); color:var(--indigo); }
.hbtn.danger:hover { border-color:var(--danger); color:var(--danger); }

/* search bar */
#searchBar {
  display:none; background:rgba(7,8,14,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:8px 16px;
  position:sticky; top:52px; z-index:99;
}
#searchBar.open { display:block; }
#searchBar input {
  width:100%; max-width:640px; margin:0 auto; display:block;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:10px; padding:8px 13px;
  color:var(--text); font-family:inherit; font-size:13px;
  outline:none; transition:border-color .2s;
}
#searchBar input:focus { border-color:var(--indigo); }
#searchResultsCount {
  max-width:640px; margin:5px auto 0;
  font-size:11px; color:var(--muted); padding-left:4px;
}

/* pinned banner */
#pinnedBanner {
  display:none; position:sticky; top:52px; z-index:98;
  background:rgba(251,191,36,.06);
  border-bottom:1px solid rgba(251,191,36,.14);
  padding:7px 16px; cursor:pointer; transition:background .2s;
}
#pinnedBanner:hover { background:rgba(251,191,36,.1); }
.pinned-inner {
  max-width:640px; margin:0 auto;
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:var(--gold);
}
.pinned-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }

/* ── LAYOUT ── */
.layout {
  flex:1; max-width:640px; width:100%;
  margin:0 auto; padding:14px 12px 148px;
  position:relative; z-index:1;
}

/* date dividers */
.date-divider {
  display:flex; align-items:center; gap:10px; margin:18px 0 10px;
}
.date-divider::before,.date-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.date-divider span {
  font-size:10px; font-weight:600; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  padding:2px 9px; border-radius:20px; white-space:nowrap; letter-spacing:.3px;
}

/* ── BUBBLE MESSAGES ── */
#feed { display:flex; flex-direction:column; gap:2px; }

.msg-row {
  display:flex; align-items:flex-end; gap:7px;
  animation:fadeUp .22s ease;
  position:relative;
  padding:1px 0;
  transition:background .15s;
}
.msg-row:hover { background:rgba(255,255,255,.02); border-radius:12px; }
.msg-row.own { flex-direction:row-reverse; }

.msg-row.grouped { padding-top:0; }
.msg-row.grouped .bubble { border-top-left-radius:8px; }
.msg-row.grouped.own .bubble { border-top-right-radius:8px; }

.avatar-placeholder {
  width:30px; height:0; flex-shrink:0;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.avatar {
  width:30px; height:30px; border-radius:50%;
  background:linear-gradient(135deg,var(--indigo),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0; color:white;
  text-transform:uppercase; margin-bottom:2px;
  overflow:hidden;
}
.avatar.admin-avatar { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#000; }
.avatar.has-photo { background:transparent; }

.bubble {
  max-width:73%; border-radius:16px;
  padding:9px 13px 8px;
  position:relative; word-break:break-word;
  transition:border-color .15s, box-shadow .15s;
}
.bubble:hover { box-shadow:0 2px 8px rgba(0,0,0,.15); }
.bubble.other {
  background:var(--surface);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.bubble.own {
  background:var(--own-bg);
  border:1px solid var(--own-border);
  border-bottom-right-radius:4px;
}

/* Grouped messages - Telegram style */
.msg-row.grouped .bubble {
  border-top-left-radius:8px;
}
.msg-row.grouped.own .bubble {
  border-top-right-radius:8px;
}
.msg-row:not(.grouped) .bubble {
  border-top-left-radius:16px;
}
.msg-row:not(.grouped).own .bubble {
  border-top-right-radius:16px;
}
.bubble.admin-bubble {
  border-color:rgba(251,191,36,.2);
  background:rgba(251,191,36,.04);
}
.bubble.pinned-card { box-shadow:0 0 0 1px var(--gold); }
.bubble.highlight-msg {
  border-color:var(--indigo) !important;
  box-shadow:0 0 0 2px rgba(99,102,241,.2);
  animation:highlightPop .4s ease;
}
@keyframes highlightPop{0%{box-shadow:0 0 0 4px rgba(99,102,241,.35)}100%{box-shadow:0 0 0 2px rgba(99,102,241,.1)}}

.msg-row.search-match .bubble { border-color:rgba(251,191,36,.4) !important; }
.msg-row.search-hidden { display:none; }

.bubble-author {
  font-size:11px; font-weight:700; color:var(--indigo);
  margin-bottom:4px; display:flex; align-items:center; gap:5px; flex-wrap:wrap;
}
.admin-tag {
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  color:#000; font-size:9px; font-weight:700; letter-spacing:.5px;
  padding:1px 5px; border-radius:4px; text-transform:uppercase;
}

.msg-text { font-size:14px; line-height:1.6; color:#ccd0ed; }
.msg-text mark { background:rgba(251,191,36,.22); color:var(--gold); border-radius:3px; padding:0 2px; }

.mention {
  color:var(--cyan); font-weight:600;
  background:rgba(34,211,238,.08); border-radius:4px; padding:0 3px;
  cursor:pointer;
}
.mention:hover { background:rgba(34,211,238,.15); }

/* reply quote */
.reply-quote {
  background:rgba(99,102,241,.07); border-left:3px solid var(--indigo);
  border-radius:6px; padding:5px 9px; margin-bottom:6px;
  font-size:12px; color:var(--muted); cursor:pointer; transition:background .15s;
}
.reply-quote:hover { background:rgba(99,102,241,.12); }
.reply-quote strong { color:var(--indigo); display:block; font-size:10px; margin-bottom:1px; }

/* images */
.msg-img {
  margin-top:8px; border-radius:11px;
  max-width:100%; max-height:300px; object-fit:cover; display:block;
  cursor:zoom-in; transition:opacity .2s, transform .2s;
}
.msg-img:hover { opacity:.92; transform:scale(1.005); }
.img-skeleton {
  margin-top:8px; border-radius:11px; width:100%; height:180px;
  background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* file attachment */
.file-card {
  display:flex; align-items:center; gap:9px; margin-top:8px;
  background:rgba(99,102,241,.06); border:1px solid rgba(99,102,241,.18);
  border-radius:11px; padding:9px 11px; text-decoration:none;
  transition:background .15s;
}
.file-card:hover { background:rgba(99,102,241,.12); }
.file-icon { font-size:22px; flex-shrink:0; }
.file-info { flex:1; min-width:0; }
.file-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-size { font-size:10px; color:var(--muted); margin-top:1px; }
.file-dl { font-size:11px; color:var(--indigo); flex-shrink:0; }

/* voice in feed */
.voice-msg {
  display:flex; align-items:center; gap:8px; margin-top:8px;
  background:rgba(34,211,238,.06); border:1px solid rgba(34,211,238,.15);
  border-radius:11px; padding:8px 11px;
  transition:background .15s;
}
.voice-msg:hover { background:rgba(34,211,238,.1); }
.voice-msg audio { height:32px; flex:1; min-width:0; accent-color:var(--cyan); }
.voice-icon { font-size:16px; flex-shrink:0; animation:voicePulse 2s ease-in-out infinite; }
@keyframes voicePulse { 0%,100%{opacity:1}50%{opacity:.6} }

/* edit mode */
.edit-area-wrap { margin-top:6px; display:none; }
.edit-area-wrap textarea {
  width:100%; background:var(--surface3); border:1px solid var(--indigo);
  border-radius:9px; padding:8px 11px; color:var(--text); font-family:inherit;
  font-size:13px; resize:none; outline:none; line-height:1.5;
}
.edit-area-wrap .edit-btns { display:flex; gap:5px; margin-top:5px; }
.edit-save-btn {
  background:var(--indigo); color:white; border:none; border-radius:7px;
  padding:5px 13px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;
}
.edit-save-btn:hover { background:var(--indigo2); }
.edit-cancel-btn {
  background:var(--surface3); color:var(--muted); border:1px solid var(--border);
  border-radius:7px; padding:5px 13px; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit;
}
.edit-cancel-btn:hover { border-color:var(--danger); color:var(--danger); }

/* bubble footer */
.bubble-footer {
  display:flex; align-items:center; flex-wrap:wrap; gap:4px;
  margin-top:7px; padding-top:6px; border-top:1px solid var(--border);
}
.footer-left { display:flex; align-items:center; gap:3px; flex-wrap:wrap; flex:1; }
.footer-right { display:flex; align-items:center; gap:3px; margin-left:auto; }

.like-btn {
  display:inline-flex; align-items:center; gap:4px;
  background:none; border:1px solid var(--border); border-radius:14px;
  padding:3px 9px; color:var(--muted); font-size:11px; font-weight:600;
  cursor:pointer; transition:all .18s; font-family:inherit;
}
.like-btn:hover,.like-btn.liked { background:rgba(244,63,94,.07); border-color:#f43f5e; color:#f97316; }

.reaction-btn {
  display:inline-flex; align-items:center; gap:2px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:14px; padding:2px 8px; font-size:11px;
  cursor:pointer; transition:all .15s; font-family:inherit; color:var(--text);
}
.reaction-btn:hover { border-color:var(--indigo); transform:scale(1.07); }
.reaction-btn.active { background:rgba(99,102,241,.14); border-color:var(--indigo); }

.emoji-popup {
  position:absolute; bottom:calc(100% + 6px); left:0;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:11px; padding:7px; display:none; gap:5px; z-index:50;
  box-shadow:0 8px 30px rgba(0,0,0,.55);
}
.emoji-popup.open { display:flex; }
.emoji-popup button {
  background:none; border:none; font-size:18px; cursor:pointer;
  padding:3px; border-radius:5px; transition:background .12s; line-height:1;
}
.emoji-popup button:hover { background:rgba(255,255,255,.08); }
.emoji-picker-btn {
  background:none; border:1px solid var(--border); border-radius:14px;
  padding:2px 7px; font-size:13px; cursor:pointer; transition:all .15s; color:var(--muted);
}
.emoji-picker-btn:hover { border-color:var(--indigo); }

.msg-actions { display:flex; gap:2px; }
.icon-btn {
  background:none; border:1px solid transparent; border-radius:7px;
  padding:3px 6px; font-size:11px; cursor:pointer; transition:all .14s;
  font-family:inherit; color:var(--muted);
}
.icon-btn:hover { border-color:var(--border2); color:var(--text); }
.icon-btn.delete-btn:hover { color:var(--danger); border-color:rgba(244,63,94,.25); }
.icon-btn.edit-btn:hover { color:var(--cyan); border-color:rgba(34,211,238,.25); }

.msg-time-inline { font-size:10px; color:var(--muted); white-space:nowrap; }
.msg-status { font-size:11px; color:var(--muted); }
.msg-status.read { color:var(--cyan); }
.edited-tag { font-size:10px; color:var(--muted); }

.banned-banner {
  background:rgba(244,63,94,.07); border:1px solid rgba(244,63,94,.2);
  border-radius:14px; padding:12px; text-align:center;
  color:var(--danger); font-weight:600; font-size:13px; margin-bottom:10px;
}

/* typing indicator */
#typingBar {
  max-width:640px; margin:0 auto; padding:0 14px 5px;
  font-size:11px; color:var(--muted); min-height:18px; position:relative; z-index:1;
}
.typing-dots span {
  display:inline-block; width:3px; height:3px;
  background:var(--muted); border-radius:50%; margin:0 1px;
  animation:typingDot 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* scroll button */
#scrollBtn {
  position:fixed; bottom:130px; right:18px; z-index:200;
  width:38px; height:38px; background:var(--indigo); color:white;
  border:none; border-radius:50%; font-size:15px;
  cursor:pointer; box-shadow:0 4px 18px rgba(99,102,241,.45);
  display:none; align-items:center; justify-content:center;
  transition:opacity .2s, transform .2s;
}
#scrollBtn.show { display:flex; }
#scrollBtn:hover { transform:scale(1.08); }
#unreadBadge {
  position:fixed; bottom:175px; right:10px; z-index:201;
  background:var(--danger); color:white;
  font-size:10px; font-weight:700; border-radius:18px;
  padding:2px 7px; display:none;
}
#unreadBadge.show { display:block; }

/* ── COMPOSE BAR ── */
#composeBar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(7,8,14,.92); backdrop-filter:blur(24px);
  border-top:1px solid var(--border); padding:8px 12px 12px;
}
.compose-inner { max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:6px; }

#charCounter {
  text-align:right; font-size:10px; color:var(--muted); display:none;
}
#charCounter.warn { color:var(--gold); }
#charCounter.danger { color:var(--danger); }

#replyPreview {
  display:none; background:rgba(99,102,241,.07);
  border:1px solid rgba(99,102,241,.16); border-radius:9px;
  padding:6px 10px; font-size:12px; color:var(--muted);
  align-items:center; gap:6px;
}
#replyPreview strong { color:var(--indigo); }
#cancelReply { margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; }
#cancelReply:hover { color:var(--danger); }

#photoPreviewWrap {
  display:none; align-items:center; gap:7px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:5px 9px;
}
#photoThumb { width:30px; height:30px; border-radius:5px; object-fit:cover; }
#clearPhoto { background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; }

#uploadProgress {
  display:none; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:7px 11px; align-items:center; gap:9px;
  font-size:11px; color:var(--muted);
}
#uploadProgress.active { display:flex; }
#progressBar { flex:1; height:3px; background:var(--surface3); border-radius:2px; overflow:hidden; }
#progressFill { height:100%; background:linear-gradient(90deg,var(--indigo),var(--cyan)); border-radius:2px; width:0%; transition:width .3s; }

#voicePreviewWrap {
  display:none; align-items:center; gap:7px;
  background:var(--surface2); border:1px solid rgba(34,211,238,.2);
  border-radius:9px; padding:5px 9px;
}
#voicePreviewWrap audio { height:30px; flex:1; min-width:0; accent-color:var(--cyan); }
#clearVoice { background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; }

.compose-row { display:flex; gap:7px; align-items:flex-end; }
#msgInput {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; color:var(--text); font-family:inherit; font-size:14px;
  padding:9px 13px; resize:none; outline:none;
  max-height:120px; min-height:40px; transition:border-color .2s; line-height:1.5;
}
#msgInput:focus { border-color:var(--indigo); }
#msgInput::placeholder { color:var(--muted); }

.compose-actions { display:flex; gap:5px; align-items:center; }
.cmp-btn {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:17px; transition:all .18s;
  color:var(--muted); flex-shrink:0;
}
.cmp-btn:hover { border-color:var(--indigo); color:var(--indigo); }
#voiceBtn:hover { border-color:var(--danger); color:var(--danger); }
#voiceBtn.recording {
  border-color:var(--danger); color:white;
  background:rgba(244,63,94,.18);
  animation:recPulse 1s ease infinite;
}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.5)}50%{box-shadow:0 0 0 5px rgba(244,63,94,0)}}

#sendBtn {
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  color:white; border:none; border-radius:9px;
  width:38px; height:38px; font-size:16px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .2s; font-family:inherit;
  box-shadow:0 3px 12px rgba(99,102,241,.35);
}
#sendBtn:hover { transform:translateY(-1px); box-shadow:0 5px 18px rgba(99,102,241,.5); }
#sendBtn:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

#composeEmojiPanel {
  display:none; flex-wrap:wrap; gap:3px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:11px; padding:7px;
  box-shadow:0 -4px 20px rgba(0,0,0,.3);
}
#composeEmojiPanel.open { display:flex; }
#composeEmojiPanel button {
  background:none; border:none; font-size:20px; cursor:pointer;
  padding:4px; border-radius:5px; transition:background .12s; line-height:1;
}
#composeEmojiPanel button:hover { background:rgba(255,255,255,.07); }

/* cooldown ring on send button */
#cooldownRing {
  position:absolute; inset:0; border-radius:9px; pointer-events:none;
  border:2px solid rgba(99,102,241,.5);
  clip-path:inset(0 100% 0 0);
  transition:clip-path 1s linear;
}

/* ── LIGHTBOX ── */
#lightbox {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.94); align-items:center; justify-content:center;
  flex-direction:column; gap:12px;
}
#lightbox.open { display:flex; }
#lightbox img { max-width:92vw; max-height:84vh; border-radius:11px; }
#lightbox-close {
  position:absolute; top:14px; right:18px;
  background:rgba(255,255,255,.1); border:none; color:white;
  font-size:20px; cursor:pointer; border-radius:8px; padding:3px 10px;
}
#lightbox-close:hover { background:rgba(255,255,255,.18); }
#lightbox-download {
  background:var(--indigo); color:white; border:none; border-radius:9px;
  padding:8px 16px; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit;
}
#lightbox-download:hover { background:var(--indigo2); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:85px; left:50%; transform:translateX(-50%);
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:24px; padding:9px 18px; font-size:12px; font-weight:600; color:var(--text);
  opacity:0; pointer-events:none; transition:opacity .22s, bottom .22s;
  z-index:300; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#toast.show { opacity:1; bottom:95px; }

/* ── THREAD PANEL ── */
#threadPanel {
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px); align-items:flex-end;
}
#threadPanel.open { display:flex; }
#threadInner {
  width:100%; max-width:640px; margin:0 auto;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:18px 18px 0 0; max-height:75vh;
  display:flex; flex-direction:column; animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#threadHead { padding:13px 14px 9px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:9px; flex-shrink:0; }
#threadTitle { font-weight:700; font-size:13px; flex:1; }
#threadClose { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; }
#threadClose:hover { color:var(--danger); }
#threadFeed { flex:1; overflow-y:auto; padding:9px 13px; display:flex; flex-direction:column; gap:7px; }
.thread-msg { background:var(--surface2); border:1px solid var(--border); border-radius:11px; padding:9px 11px; }
.thread-msg .t-name { font-size:11px; font-weight:700; color:var(--indigo); margin-bottom:3px; }
.thread-msg .t-text { font-size:13px; line-height:1.5; }
.thread-msg .t-time { font-size:10px; color:var(--muted); margin-top:3px; }
#threadCompose { padding:9px 13px; border-top:1px solid var(--border); display:flex; gap:7px; flex-shrink:0; }
#threadInput {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; color:var(--text); font-family:inherit; font-size:13px; padding:7px 11px; outline:none;
}
#threadInput:focus { border-color:var(--indigo); }
#threadSend {
  background:var(--indigo); color:white; border:none; border-radius:9px;
  padding:7px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;
}
.thread-badge { background:var(--indigo); color:white; font-size:9px; font-weight:700; border-radius:9px; padding:1px 5px; }

/* ── NOTIFICATIONS ── */
#notifBtn { position:relative; }
#notifDot { position:absolute; top:-3px; right:-3px; background:var(--danger); color:white; font-size:8px; font-weight:700; border-radius:9px; padding:1px 4px; display:none; }
#notifDot.show { display:block; }
#notifPanel {
  display:none; position:fixed; top:54px; right:8px; z-index:300;
  width:min(320px,94vw); background:var(--surface2); border:1px solid var(--border2);
  border-radius:13px; box-shadow:0 8px 35px rgba(0,0,0,.65); animation:fadeUp .18s ease;
}
#notifPanel.open { display:block; }
.notif-head { padding:11px 13px 7px; border-bottom:1px solid var(--border); font-weight:700; font-size:12px; display:flex; justify-content:space-between; align-items:center; }
.notif-clear { background:none; border:none; color:var(--muted); font-size:10px; cursor:pointer; font-family:inherit; }
.notif-clear:hover { color:var(--danger); }
.notif-item { padding:9px 13px; font-size:11px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .14s; display:flex; gap:7px; align-items:flex-start; }
.notif-item:hover { background:rgba(99,102,241,.06); }
.notif-icon { font-size:14px; flex-shrink:0; }
.notif-text { flex:1; line-height:1.5; color:var(--text); }
.notif-time { font-size:9px; color:var(--muted); white-space:nowrap; }
.notif-empty { padding:18px; text-align:center; color:var(--muted); font-size:12px; }

/* empty state */
.empty { text-align:center; padding:55px 20px; color:var(--muted); }
.empty .icon { font-size:44px; margin-bottom:10px; opacity:.5; }

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="logo">F-Mine</div>
  <div class="header-center">
    <div id="onlineBadge"><span id="onlineCount">0</span> online</div>
  </div>
  <div class="header-right">
    <button class="hbtn" id="searchToggleBtn" onclick="toggleSearch()" title="Поиск">🔍</button>
    <button class="hbtn" id="notifBtn" onclick="toggleNotifPanel()" title="Уведомления">
      🔔<span id="notifDot"></span>
    </button>
    <div id="userBadge">Вы: <span id="headerName">—</span></div>
    <button class="hbtn danger" onclick="doLogout()" style="font-size:11px;padding:4px 9px;">Выйти</button>

</header>

<div id="searchBar">
  <input type="text" placeholder="Поиск сообщений..." id="searchInput" oninput="handleSearch(this.value)" />
  <div id="searchResultsCount"></div>
</div>

<div id="pinnedBanner" onclick="scrollToPinned()">
  <div class="pinned-inner">
    <span>📌</span>
    <span id="pinnedAuthor" style="font-weight:700;flex-shrink:0;margin-right:3px"></span>
    <span class="pinned-text" id="pinnedText"></span>
  </div>
</div>

<div class="layout">
  <div id="bannedMsg" class="banned-banner" style="display:none">
    🚫 Вы заблокированы администратором.
  </div>
  <div id="feed"><div class="empty"><div class="icon">💬</div><p>Загрузка...</p></div></div>
</div>

<div id="typingBar"></div>
<div id="unreadBadge"></div>
<button id="scrollBtn" onclick="scrollToBottom(true)">↓</button>

<!-- COMPOSE -->
<div id="composeBar">
  <div class="compose-inner">
    <div id="composeEmojiPanel"></div>
    <div id="replyPreview">
      <div>↩ <strong id="replyAuthorLabel"></strong>: <span id="replyTextLabel" style="opacity:.7"></span></div>
      <button id="cancelReply" onclick="clearReply()">✕</button>
    </div>
    <div id="photoPreviewWrap">
      <img id="photoThumb" src="" alt="" />
      <span id="photoName" style="font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button id="clearPhoto" onclick="clearPhoto()">✕</button>
    </div>
    <div id="uploadProgress">
      <span id="uploadLabel">Загрузка...</span>
      <div id="progressBar"><div id="progressFill"></div></div>
    </div>
    <div id="voicePreviewWrap">
      <span>🎙</span>
      <audio id="voicePreview" controls></audio>
      <button id="clearVoice" onclick="clearVoice()">✕</button>
    </div>
    <div id="charCounter"></div>
    <div class="compose-row">
      <textarea id="msgInput" rows="1" placeholder="Написать сообщение..." onkeydown="handleKey(event)" oninput="handleInput(this)"></textarea>
      <div class="compose-actions">
        <button class="cmp-btn" id="composeEmojiBtn" onclick="toggleComposeEmoji()" title="Эмодзи">😀</button>
        <button class="cmp-btn" id="voiceBtn" title="Голосовое сообщение" onclick="toggleRecording()">🎙️</button>
        <label class="cmp-btn" id="photoBtn" title="Прикрепить файл или фото" style="cursor:pointer">
          📎<input type="file" accept="*/*" id="photoInput" style="display:none" onchange="handlePhoto(event)" />
        </label>
        <div style="position:relative">
          <button id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
  <button id="lightbox-download" onclick="event.stopPropagation();downloadImage()">⬇ Скачать</button>
</div>

<!-- THREAD PANEL -->
<div id="threadPanel" onclick="closeThread()">
  <div id="threadInner" onclick="event.stopPropagation()">
    <div id="threadHead">
      <div id="threadTitle">Ответы в треде</div>
      <button id="threadClose" onclick="closeThread()">✕</button>
    </div>
    <div id="threadFeed"></div>
    <div id="threadCompose">
      <input type="text" id="threadInput" placeholder="Ответить в тред..." onkeydown="if(event.key==='Enter') sendThreadReply()" />
      <button id="threadSend" onclick="sendThreadReply()">Ответить</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION PANEL -->
<div id="notifPanel">
  <div class="notif-head">
    Уведомления
    <button class="notif-clear" onclick="clearNotifs()">Очистить</button>
  </div>
  <div class="notif-body" id="notifList">
    <div class="notif-empty">Нет уведомлений</div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, orderBy, query,
  doc, updateDoc, arrayUnion, serverTimestamp,
  getDoc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getStorage, ref, uploadBytesResumable, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3mpP7UjMrqbq-X_bmDfBQkZGbwTy6aVc",
  authDomain: "fmine-auth.firebaseapp.com",
  projectId: "fmine-auth",
  storageBucket: "fmine-auth.firebasestorage.app",
  messagingSenderId: "219769927531",
  appId: "1:219769927531:web:fbd45a0876f32927d23e2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ── STATE ──
let currentUser = null, isAdmin = false;
let bannedUsers = new Set();
let selectedFile = null, selectedVoice = null;
let likedMsgs = JSON.parse(localStorage.getItem('fmine_likes') || '[]');
let replyTo = null, typingTimer = null;
let unreadCount = 0, isAtBottom = true;
let allMessages = [], pinnedMsgId = null;
let lightboxCurrentUrl = null, presenceRef = null;
let mediaRecorder = null, audioChunks = [], isRecording = false, recordTimer = null;
let lastSentTime = 0, cooldownIv = null;
let userProfiles = {}; // Cache user profiles {username: {photoURL, displayName}}
const MAX_CHARS = 1000, COOLDOWN = 10000;
const REACTIONS = ['🔥','❤️','😂','👍','😮','💯'];
const COMPOSE_EMOJIS = ['😀','😂','🔥','❤️','👍','😎','🥳','😢','💯','🎉','😍','🤔','💀','🙏','🤣','😅','👏','🫡','💪','🚀','✨','🎮','🤩','😤','👋','🫶','🥰','😮','🤯','🧠','👑','💎','🌙','⭐','🎯','💬','🤝','👀','🫠','😈'];

// ── AUTH ──
function initAuth() {
  const stored = localStorage.getItem('currentUser') || localStorage.getItem('fmine_user');
  if (!stored) { window.location.href = 'index.html'; return false; }
  currentUser = stored;
  isAdmin = (currentUser === 'admin123');
  document.getElementById('headerName').textContent = currentUser;
  if (isAdmin) document.getElementById('headerName').innerHTML = '👑 admin123';
  return true;
}
window.doLogout = () => {
  localStorage.removeItem('currentUser'); localStorage.removeItem('fmine_user');
  clearPresence(); window.location.href = 'index.html';
};

// ── USER PROFILES ──
async function loadUserProfile(username) {
  if (userProfiles[username]) return userProfiles[username];
  try {
    const userDoc = await getDoc(doc(db, 'users', username));
    if (userDoc.exists()) {
      const data = userDoc.data();
      userProfiles[username] = {
        photoURL: data.photoURL || data.profile?.avatar || null,
        displayName: data.displayName || data.profile?.nickname || username
      };
    } else {
      userProfiles[username] = { photoURL: null, displayName: username };
    }
  } catch (e) {
    userProfiles[username] = { photoURL: null, displayName: username };
  }
  return userProfiles[username];
}

async function loadAllProfiles(usernames) {
  const unique = [...new Set(usernames.filter(u => u && !userProfiles[u]))];
  await Promise.all(unique.map(u => loadUserProfile(u)));
}

// ── PRESENCE ──
async function initPresence() {
  presenceRef = doc(db, 'presence', currentUser + '_' + Math.random().toString(36).slice(2,7));
  await setDoc(presenceRef, { user: currentUser, ts: Date.now() });
  setInterval(async () => { await setDoc(presenceRef, { user: currentUser, ts: Date.now() }); }, 20000);
  onSnapshot(collection(db, 'presence'), snap => {
    const cutoff = Date.now() - 60000;
    const active = new Set();
    snap.docs.forEach(d => { if (d.data().ts > cutoff) active.add(d.data().user); });
    document.getElementById('onlineCount').textContent = active.size;
  });
  window.addEventListener('beforeunload', clearPresence);
}
async function clearPresence() {
  if (presenceRef) await deleteDoc(presenceRef).catch(() => {});
}

// ── TYPING ──
async function setTyping(active) {
  if (!currentUser) return;
  const tRef = doc(db, 'typing', currentUser);
  if (active) await setDoc(tRef, { user: currentUser, ts: Date.now() });
  else await deleteDoc(tRef).catch(() => {});
}
function startTypingListener() {
  onSnapshot(collection(db, 'typing'), snap => {
    const cutoff = Date.now() - 4000;
    const typers = snap.docs
      .filter(d => d.data().user !== currentUser && d.data().ts > cutoff)
      .map(d => d.data().user);
    const bar = document.getElementById('typingBar');
    bar.innerHTML = typers.length
      ? `<span style="display:inline-flex;align-items:center;gap:5px">${escHtml(typers.join(', '))} печатает<span class="typing-dots"><span></span><span></span><span></span></span></span>`
      : '';
  });
}

// ── BANNED ──
async function loadBannedUsers() {
  const snap = await getDoc(doc(db, 'meta', 'banned'));
  if (snap.exists()) bannedUsers = new Set(snap.data().users || []);
  updateComposeState();
}
function updateComposeState() {
  const banned = bannedUsers.has(currentUser);
  document.getElementById('bannedMsg').style.display = banned ? 'block' : 'none';
  document.getElementById('sendBtn').disabled = banned && !isAdmin;
  document.getElementById('msgInput').disabled = banned && !isAdmin;
}

// ── SCROLL ──
function checkScroll() {
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  isAtBottom = window.scrollY >= maxScroll - 150;
  document.getElementById('scrollBtn').classList.toggle('show', !isAtBottom);
  if (isAtBottom) { unreadCount = 0; document.getElementById('unreadBadge').classList.remove('show'); }
}
function scrollToBottom(smooth = false) {
  window.scrollTo({ top: document.body.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  unreadCount = 0; document.getElementById('unreadBadge').classList.remove('show');
}
window.scrollToBottom = scrollToBottom;
window.addEventListener('scroll', checkScroll);

// ── SEARCH ──
let searchQuery = '';
window.toggleSearch = () => {
  const bar = document.getElementById('searchBar');
  const open = bar.classList.toggle('open');
  if (open) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value = ''; handleSearch(''); }
};
window.handleSearch = (val) => { searchQuery = val.trim().toLowerCase(); applySearch(); };
function applySearch() {
  if (!searchQuery) {
    document.querySelectorAll('.msg-row').forEach(el => el.classList.remove('search-match','search-hidden'));
    document.getElementById('searchResultsCount').textContent = '';
    document.querySelectorAll('.msg-text').forEach(el => {
      const id = el.closest('.msg-row')?.id?.replace('msg-','');
      const m = allMessages.find(x => x.id === id);
      if (m?.text) el.innerHTML = renderText(m.text);
    });
    return;
  }
  let count = 0;
  document.querySelectorAll('.msg-row').forEach(el => {
    const id = el.id?.replace('msg-','');
    const m = allMessages.find(x => x.id === id);
    const text = ((m?.text||'')+(m?.author||'')).toLowerCase();
    if (text.includes(searchQuery)) {
      el.classList.add('search-match'); el.classList.remove('search-hidden'); count++;
      if (m?.text) {
        const textEl = el.querySelector('.msg-text');
        if (textEl) textEl.innerHTML = renderText(m.text).replace(
          new RegExp(`(${escHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
          '<mark>$1</mark>'
        );
      }
    } else { el.classList.remove('search-match'); el.classList.add('search-hidden'); }
  });
  document.getElementById('searchResultsCount').textContent = count ? `Найдено: ${count}` : 'Ничего не найдено';
}

// ── DATE DIVIDERS ──
function formatDateDivider(ts) {
  if (!ts) return null;
  const d = new Date(ts.seconds * 1000), now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return 'Сегодня';
  if (diff < 172800000) return 'Вчера';
  return d.toLocaleDateString('ru', { day:'numeric', month:'long', year:'numeric' });
}

// ── FEED ──
function startFeed() {
  const q = query(collection(db, 'messages'), orderBy('ts','asc'));
  let firstLoad = true;
  onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const wasAtBottom = isAtBottom, prevCount = allMessages.length;
    allMessages = msgs;

    // Load all profiles on first load
    if (firstLoad) {
      const usernames = msgs.map(m => m.author).filter(Boolean);
      loadAllProfiles(usernames).then(() => {
        renderFeed(msgs);
        if (searchQuery) applySearch();
        scrollToBottom(false);
        firstLoad = false;
      });
    } else {
      renderFeed(msgs);
      if (searchQuery) applySearch();
      if (wasAtBottom) scrollToBottom(true);
      else if (msgs.length > prevCount) {
        unreadCount += msgs.length - prevCount;
        const badge = document.getElementById('unreadBadge');
        badge.textContent = `+${unreadCount} новых`; badge.classList.add('show');
      }
    }
  });
}
function renderFeed(msgs) {
  const feed = document.getElementById('feed');
  if (!msgs.length) { feed.innerHTML = '<div class="empty"><div class="icon">💬</div><p>Пока нет сообщений</p></div>'; return; }

  // Load all user profiles first
  const usernames = msgs.map(m => m.author).filter(Boolean);
  loadAllProfiles(usernames).then(() => {
    let html = '', lastDateLabel = null, lastAuthor = null, lastTime = null;

    msgs.forEach((m, idx) => {
      const dateLabel = formatDateDivider(m.ts);
      if (dateLabel && dateLabel !== lastDateLabel) {
        html += `<div class="date-divider"><span>${escHtml(dateLabel)}</span></div>`;
        lastDateLabel = dateLabel;
        lastAuthor = null; // Reset grouping on new date
      }

      // Message grouping: check if same author within 2 minutes
      const msgTime = m.ts ? new Date(m.ts.seconds * 1000).getTime() : 0;
      const timeDiff = lastTime ? msgTime - lastTime : Infinity;
      const isGrouped = m.author === lastAuthor && timeDiff < 120000 && timeDiff >= 0;

      html += buildCard(m, isGrouped);
      lastAuthor = m.author;
      lastTime = msgTime;
    });

    feed.innerHTML = html;
  });
}

function renderText(text) {
  return escHtml(text).replace(/@(\w+)/g, '<span class="mention" onclick="scrollToUserMsg(\'$1\')">@$1</span>');
}

function buildCard(m, isGrouped = false) {
  const admin = m.author === 'admin123';
  const isOwn = m.author === currentUser;
  const isBanned = bannedUsers.has(m.author);
  const profile = userProfiles[m.author] || { photoURL: null, displayName: m.author };
  const initials = (m.author || '?')[0].toUpperCase();
  const time = m.ts ? new Date(m.ts.seconds*1000).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : '';
  const isPinned = m.id === pinnedMsgId;

  // Reactions
  const reactions = m.reactions || {};
  const reactionHtml = REACTIONS.map(emoji => {
    const users = reactions[emoji] || [];
    if (!users.length) return '';
    const active = users.includes(currentUser) ? 'active' : '';
    return `<button class="reaction-btn ${active}" onclick="toggleReaction('${m.id}','${emoji}')">${emoji} <span>${users.length}</span></button>`;
  }).join('');

  const emojiPickerHtml = `<div style="position:relative">
    <button class="emoji-picker-btn" onclick="toggleEmojiPicker('${m.id}')">＋</button>
    <div class="emoji-popup" id="picker-${m.id}">
      ${REACTIONS.map(e => `<button onclick="toggleReaction('${m.id}','${e}');closeAllPickers()">${e}</button>`).join('')}
    </div>
  </div>`;

  // Reply quote
  let replyHtml = '';
  if (m.replyTo) {
    const orig = allMessages.find(x => x.id === m.replyTo.id);
    const txt = orig ? (orig.text || (orig.voiceUrl ? '🎙 голосовое' : '📷 фото')) : (m.replyTo.text || '📷');
    replyHtml = `<div class="reply-quote" onclick="scrollToMsg('${m.replyTo.id}')">
      <strong>${escHtml(m.replyTo.author)}</strong>${escHtml(txt.slice(0,80))}${txt.length>80?'…':''}
    </div>`;
  }

  // Media
  let mediaHtml = '';
  if (m.voiceUrl) {
    mediaHtml = `<div class="voice-msg"><span class="voice-icon">🎙</span><audio controls src="${escHtml(m.voiceUrl)}"></audio></div>`;
  } else if (m.imgUrl) {
    const isImg = m.fileType ? m.fileType.startsWith('image/') : true;
    if (isImg) {
      mediaHtml = `<div class="img-skeleton"></div><img class="msg-img" src="${escHtml(m.imgUrl)}" alt="photo" onclick="openLightbox('${escHtml(m.imgUrl)}')" loading="lazy" onload="this.previousElementSibling&&this.previousElementSibling.remove()" />`;
    } else {
      const ext = (m.fileName||'').split('.').pop().toUpperCase() || 'FILE';
      mediaHtml = `<a class="file-card" href="${escHtml(m.imgUrl)}" target="_blank" download="${escHtml(m.fileName||'file')}">
        <span class="file-icon">${ext==='PDF'?'📄':ext==='ZIP'||ext==='RAR'?'📦':'📎'}</span>
        <div class="file-info"><div class="file-name">${escHtml(m.fileName||'файл')}</div></div>
        <span class="file-dl">⬇</span>
      </a>`;
    }
  }

  let editBtn = isOwn && m.text && !m.imgUrl && !m.voiceUrl
    ? `<button class="icon-btn edit-btn" onclick="startEdit('${m.id}')">✏️</button>` : '';

  const editAreaHtml = `<div class="edit-area-wrap" id="editWrap-${m.id}">
    <textarea id="editInput-${m.id}" rows="2">${escHtml(m.text||'')}</textarea>
    <div class="edit-btns">
      <button class="edit-save-btn" onclick="saveEdit('${m.id}')">Сохранить</button>
      <button class="edit-cancel-btn" onclick="cancelEdit('${m.id}')">Отмена</button>
    </div>
  </div>`;

  let statusHtml = '';
  if (isOwn) {
    const readCount = (m.readBy||[]).filter(u => u !== currentUser).length;
    statusHtml = `<span class="msg-status ${readCount>0?'read':''}">${readCount>0?'✓✓':'✓'}</span>`;
  }

  const canDelete = isOwn || isAdmin, canBan = isAdmin && !admin, canPin = isAdmin;
  const actionsHtml = `<div class="msg-actions">
    <button class="icon-btn" onclick="replyMessage('${m.id}')" title="Ответить">↩</button>
    ${editBtn}
    ${canPin ? `<button class="icon-btn" onclick="pinMessage('${m.id}','${escHtml(m.author)}','${escHtml((m.text||'').slice(0,60))}')">${isPinned?'📍':'📌'}</button>` : ''}
    ${canDelete ? `<button class="icon-btn delete-btn" onclick="deleteMessage('${m.id}')">🗑</button>` : ''}
    ${canBan ? `<button class="icon-btn" onclick="toggleBan('${m.author}',${isBanned})" style="font-size:12px">${isBanned?'✅':'🚫'}</button>` : ''}
  </div>`;

  const liked = likedMsgs.includes(m.id);
  const likeCount = (m.likes||[]).length;
  const footerHTML = `<div class="bubble-footer">
    <div class="footer-left">
      <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${m.id}')">${liked?'❤️':'🤍'}${likeCount?' '+likeCount:''}</button>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${reactionHtml}<div style="position:relative">${emojiPickerHtml}</div></div>
    </div>
    <div class="footer-right">
      ${actionsHtml}
      <span class="msg-time-inline">${time}${isPinned?' 📌':''}${m.edited?' <span class="edited-tag">·ред</span>':''}</span>
      ${statusHtml}
    </div>
  </div>`;

  const bubbleInner = `${replyHtml}${m.text?`<div class="msg-text" id="msgText-${m.id}">${renderText(m.text)}</div>`:''}${editAreaHtml}${mediaHtml}${footerHTML}`;

  if (isOwn) {
    return `<div class="msg-row own ${isGrouped ? 'grouped' : ''}" id="msg-${m.id}">
      <div class="bubble own ${isPinned?'pinned-card':''}">${bubbleInner}</div>
    </div>`;
  }

  // Avatar with photoURL or fallback to initials
  const avatarContent = profile.photoURL
    ? `<img src="${escHtml(profile.photoURL)}" alt="${escHtml(m.author)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />`
    : (admin ? '👑' : initials);
  const avatarClass = `avatar ${admin ? 'admin-avatar' : ''} ${profile.photoURL ? 'has-photo' : ''}`;

  return `<div class="msg-row other ${isGrouped ? 'grouped' : ''}" id="msg-${m.id}">
    ${isGrouped ? '<div class="avatar-placeholder"></div>' : `<div class="${avatarClass}">${avatarContent}</div>`}
    <div class="bubble other ${admin?'admin-bubble':''} ${isPinned?'pinned-card':''}">
      ${!isGrouped ? `<div class="bubble-author">
        ${admin?'<span class="admin-tag">ADMIN</span>':''}${escHtml(profile.displayName || m.author)}${isBanned?' <span style="color:var(--danger);font-size:10px">🚫</span>':''}
      </div>` : ''}
      ${bubbleInner}
    </div>
  </div>`;
}

// ── RATE LIMIT + SEND ──
function startCooldown() {
  if (isAdmin) return;
  let remaining = 10;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = `<span style="font-size:12px;font-weight:800">${remaining}</span>`;
  cooldownIv = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(cooldownIv);
      btn.disabled = false;
      btn.innerHTML = '↑';
    } else {
      btn.innerHTML = `<span style="font-size:12px;font-weight:800">${remaining}</span>`;
    }
  }, 1000);
}

window.sendMessage = async () => {
  if (bannedUsers.has(currentUser) && !isAdmin) return;
  const text = document.getElementById('msgInput').value.trim();
  if (!text && !selectedFile && !selectedVoice) return;

  // Rate limit check
  const now = Date.now();
  if (!isAdmin && now - lastSentTime < COOLDOWN) {
    const secs = Math.ceil((COOLDOWN - (now - lastSentTime)) / 1000);
    showToast(`⏳ Подождите ${secs} сек.`);
    return;
  }

  document.getElementById('sendBtn').disabled = true;
  await setTyping(false);

  let imgUrl = null, voiceUrl = null, fileType = null, fileName = null;

  if (selectedVoice) {
    try {
      voiceUrl = await uploadVoice(selectedVoice);
    } catch(e) {
      showToast('❌ Ошибка загрузки голосового: ' + (e.message||e));
      document.getElementById('sendBtn').disabled = false;
      hideUploadProgress();
      return;
    }
  } else if (selectedFile) {
    try {
      fileType = selectedFile.type;
      fileName = selectedFile.name;
      imgUrl = await uploadFileWithProgress(selectedFile);
    } catch(e) {
      showToast('❌ Ошибка загрузки: ' + (e.message||e));
      document.getElementById('sendBtn').disabled = false;
      hideUploadProgress();
      return;
    }
  }

  const msgData = {
    author: currentUser, text: text||'',
    imgUrl: imgUrl||null, voiceUrl: voiceUrl||null,
    fileType: fileType||null, fileName: fileName||null,
    likes: [], reactions: {}, readBy: [currentUser], edited: false,
    ts: serverTimestamp()
  };
  if (replyTo) msgData.replyTo = { id: replyTo.id, author: replyTo.author, text: replyTo.text||'' };

  await addDoc(collection(db, 'messages'), msgData);

  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';
  updateCharCounter('');
  clearPhoto(); clearVoice(); clearReply();

  lastSentTime = Date.now();
  startCooldown();
};

// ── FILE UPLOAD ──
function uploadFileWithProgress(file) {
  return new Promise((resolve, reject) => {
    if (file.size > 5 * 1024 * 1024) { reject(new Error('Максимальный размер 5MB')); return; }
    const folder = file.type.startsWith('image/') ? 'chat-photos' : 'chat-files';
    const storageRef = ref(storage, `${folder}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`);
    const task = uploadBytesResumable(storageRef, file);
    showUploadProgress('Загрузка файла...');
    task.on('state_changed',
      snap => {
        const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('uploadLabel').textContent = `Загрузка... ${pct}%`;
      },
      err => {
        hideUploadProgress();
        if (err.code === 'storage/unauthorized') reject(new Error('Нет доступа к Storage. Опубликуйте Storage Rules!'));
        else reject(new Error(err.message));
      },
      async () => { hideUploadProgress(); resolve(await getDownloadURL(task.snapshot.ref)); }
    );
  });
}

function uploadVoice(blob) {
  return new Promise((resolve, reject) => {
    const storageRef = ref(storage, `chat-audio/${Date.now()}_voice.webm`);
    const task = uploadBytesResumable(storageRef, blob);
    showUploadProgress('Загрузка голосового...');
    task.on('state_changed',
      snap => {
        const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
        document.getElementById('progressFill').style.width = pct + '%';
      },
      err => { hideUploadProgress(); reject(err); },
      async () => { hideUploadProgress(); resolve(await getDownloadURL(task.snapshot.ref)); }
    );
  });
}

function showUploadProgress(label) {
  const el = document.getElementById('uploadProgress');
  el.classList.add('active');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('uploadLabel').textContent = label || 'Загрузка...';
}
function hideUploadProgress() { document.getElementById('uploadProgress').classList.remove('active'); }

// ── VOICE RECORDING ──
window.toggleRecording = async () => {
  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(recordTimer);
    document.getElementById('voiceBtn').textContent = '🎙️';
    document.getElementById('voiceBtn').classList.remove('recording');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: mimeType });
      if (selectedFile) clearPhoto();
      selectedVoice = blob;
      const url = URL.createObjectURL(blob);
      document.getElementById('voicePreview').src = url;
      document.getElementById('voicePreviewWrap').style.display = 'flex';
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start(250);
    isRecording = true;
    document.getElementById('voiceBtn').classList.add('recording');
    let secs = 0;
    recordTimer = setInterval(() => {
      secs++;
      document.getElementById('voiceBtn').textContent = `⏹ ${secs}s`;
      if (secs >= 120) { mediaRecorder.stop(); clearInterval(recordTimer); isRecording = false; }
    }, 1000);
    showToast('🎙 Запись...');
  } catch(e) {
    showToast('❌ Нет доступа к микрофону');
  }
};

window.clearVoice = () => {
  selectedVoice = null;
  document.getElementById('voicePreview').src = '';
  document.getElementById('voicePreviewWrap').style.display = 'none';
  if (isRecording && mediaRecorder) { mediaRecorder.stop(); isRecording = false; clearInterval(recordTimer); document.getElementById('voiceBtn').textContent = '🎙️'; document.getElementById('voiceBtn').classList.remove('recording'); }
};

// ── DELETE ──
window.deleteMessage = async (id) => {
  if (!confirm('Удалить?')) return;
  await deleteDoc(doc(db, 'messages', id));
  showToast('🗑 Удалено');
};

// ── EDIT ──
window.startEdit = (id) => {
  const wrap = document.getElementById('editWrap-'+id), textEl = document.getElementById('msgText-'+id);
  if (!wrap) return;
  wrap.style.display = 'block'; if (textEl) textEl.style.display = 'none';
  const inp = document.getElementById('editInput-'+id);
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
};
window.cancelEdit = (id) => {
  const wrap = document.getElementById('editWrap-'+id), textEl = document.getElementById('msgText-'+id);
  if (wrap) wrap.style.display = 'none'; if (textEl) textEl.style.display = '';
};
window.saveEdit = async (id) => {
  const inp = document.getElementById('editInput-'+id);
  if (!inp) return;
  const newText = inp.value.trim();
  if (!newText) { showToast('Нельзя сохранить пустое сообщение'); return; }
  await updateDoc(doc(db, 'messages', id), { text: newText, edited: true });
  showToast('✏️ Сохранено');
};

// ── READ RECEIPTS ──
function markRead(id) { updateDoc(doc(db, 'messages', id), { readBy: arrayUnion(currentUser) }).catch(()=>{}); }
function markVisibleAsRead() {
  allMessages.forEach(m => {
    if (m.author !== currentUser && !(m.readBy||[]).includes(currentUser)) markRead(m.id);
  });
}

// ── LIKES ──
window.toggleLike = async (id) => {
  const already = likedMsgs.includes(id);
  const ref2 = doc(db, 'messages', id);
  if (already) {
    likedMsgs = likedMsgs.filter(x => x !== id);
    const snap = await getDoc(ref2);
    await updateDoc(ref2, { likes: (snap.data().likes||[]).filter(l => !l.startsWith(currentUser+'_')) });
  } else {
    likedMsgs.push(id);
    await updateDoc(ref2, { likes: arrayUnion(currentUser+'_'+Date.now()) });
  }
  localStorage.setItem('fmine_likes', JSON.stringify(likedMsgs));
};

// ── REACTIONS ──
window.toggleReaction = async (id, emoji) => {
  const ref2 = doc(db, 'messages', id);
  const snap = await getDoc(ref2);
  const reactions = snap.data().reactions || {};
  const users = reactions[emoji] || [];
  reactions[emoji] = users.includes(currentUser) ? users.filter(u => u !== currentUser) : [...users, currentUser];
  await updateDoc(ref2, { reactions });
};
window.toggleEmojiPicker = (id) => {
  const p = document.getElementById('picker-'+id);
  if (!p) return;
  const open = p.classList.contains('open');
  closeAllPickers(); if (!open) p.classList.add('open');
};
window.closeAllPickers = () => document.querySelectorAll('.emoji-popup').forEach(p => p.classList.remove('open'));
document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-picker-btn') && !e.target.closest('.emoji-popup')) closeAllPickers();
  if (!e.target.closest('#composeEmojiBtn') && !e.target.closest('#composeEmojiPanel')) document.getElementById('composeEmojiPanel').classList.remove('open');
  if (!e.target.closest('#notifBtn') && !e.target.closest('#notifPanel')) document.getElementById('notifPanel').classList.remove('open');
});

// ── REPLY ──
window.replyMessage = (id) => {
  const msg = allMessages.find(m => m.id === id);
  if (!msg) return;
  replyTo = { id, author: msg.author, text: msg.text||'' };
  document.getElementById('replyAuthorLabel').textContent = msg.author;
  document.getElementById('replyTextLabel').textContent = (msg.text || (msg.voiceUrl ? '🎙 голосовое' : '📷 фото')).slice(0,60);
  document.getElementById('replyPreview').style.display = 'flex';
  document.getElementById('msgInput').focus();
};
window.clearReply = () => { replyTo = null; document.getElementById('replyPreview').style.display = 'none'; };
window.scrollToMsg = (id) => {
  const el = document.getElementById('msg-'+id);
  if (el) {
    el.scrollIntoView({ behavior:'smooth', block:'center' });
    const bubble = el.querySelector('.bubble');
    if (bubble) { bubble.classList.add('highlight-msg'); setTimeout(() => bubble.classList.remove('highlight-msg'), 2000); }
  }
};

// ── BAN ──
window.toggleBan = async (username, currentlyBanned) => {
  const banRef = doc(db, 'meta', 'banned');
  const snap = await getDoc(banRef);
  let users = snap.exists() ? (snap.data().users||[]) : [];
  if (currentlyBanned) { users = users.filter(u => u !== username); bannedUsers.delete(username); showToast(`✅ ${username} разбанен`); }
  else { users.push(username); bannedUsers.add(username); showToast(`🚫 ${username} заблокирован`); }
  await setDoc(banRef, { users }); updateComposeState();
};

// ── PIN ──
window.pinMessage = async (id, author, text) => {
  const pinRef = doc(db, 'meta', 'pinned');
  if (pinnedMsgId === id) {
    await deleteDoc(pinRef).catch(()=>{});
    pinnedMsgId = null; document.getElementById('pinnedBanner').style.display = 'none';
    showToast('📌 Откреплено');
  } else {
    await setDoc(pinRef, { msgId: id, author, text });
    pinnedMsgId = id;
    document.getElementById('pinnedBanner').style.display = 'block';
    document.getElementById('pinnedAuthor').textContent = author + ':';
    document.getElementById('pinnedText').textContent = text || '📷';
    showToast('📌 Закреплено');
  }
};
window.scrollToPinned = () => { if (pinnedMsgId) scrollToMsg(pinnedMsgId); };
async function loadPinned() {
  const snap = await getDoc(doc(db, 'meta', 'pinned'));
  if (snap.exists()) {
    const d = snap.data(); pinnedMsgId = d.msgId;
    document.getElementById('pinnedBanner').style.display = 'block';
    document.getElementById('pinnedAuthor').textContent = (d.author||'') + ':';
    document.getElementById('pinnedText').textContent = d.text || '📷 фото';
  }
}

// ── PHOTO / FILE ──
window.handlePhoto = (e) => { const file = e.target.files[0]; if (file) attachFile(file); };
function attachFile(file) {
  if (file.size > 5*1024*1024) { showToast('❌ Макс. 5MB'); return; }
  if (selectedVoice) clearVoice();
  selectedFile = file;
  if (file.type.startsWith('image/')) {
    document.getElementById('photoThumb').src = URL.createObjectURL(file);
    document.getElementById('photoThumb').style.display = 'block';
  } else {
    document.getElementById('photoThumb').style.display = 'none';
  }
  document.getElementById('photoName').textContent = file.name;
  document.getElementById('photoPreviewWrap').style.display = 'flex';
}
window.clearPhoto = () => {
  selectedFile = null;
  document.getElementById('photoInput').value = '';
  document.getElementById('photoPreviewWrap').style.display = 'none';
};
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { attachFile(file); showToast('📷 Изображение вставлено'); }
    }
  }
});

// ── LIGHTBOX ──
window.openLightbox = (url) => {
  lightboxCurrentUrl = url;
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = () => document.getElementById('lightbox').classList.remove('open');
window.downloadImage = async () => {
  if (!lightboxCurrentUrl) return;
  try {
    const resp = await fetch(lightboxCurrentUrl);
    const blob = await resp.blob();
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'fmine-' + Date.now() + '.jpg'; a.click();
    showToast('⬇ Скачивание...');
  } catch { window.open(lightboxCurrentUrl, '_blank'); }
};

// ── CHAR COUNTER ──
function updateCharCounter(val) {
  const counter = document.getElementById('charCounter'), len = val.length;
  if (len < 600) { counter.style.display = 'none'; return; }
  counter.style.display = 'block';
  counter.textContent = `${len}/${MAX_CHARS}`;
  counter.className = len >= MAX_CHARS ? 'danger' : len >= 800 ? 'warn' : '';
}

// ── EMOJI COMPOSE ──
window.toggleComposeEmoji = () => document.getElementById('composeEmojiPanel').classList.toggle('open');
const emojiPanel = document.getElementById('composeEmojiPanel');
emojiPanel.innerHTML = COMPOSE_EMOJIS.map(e => `<button onclick="insertEmoji('${e}')">${e}</button>`).join('');
window.insertEmoji = (emoji) => {
  const inp = document.getElementById('msgInput');
  const start = inp.selectionStart, end = inp.selectionEnd;
  inp.value = inp.value.slice(0,start) + emoji + inp.value.slice(end);
  inp.selectionStart = inp.selectionEnd = start + emoji.length;
  inp.focus(); handleInput(inp);
};

// ── KEYBOARD ──
window.handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
window.handleInput = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  updateCharCounter(el.value);
  setTyping(true); clearTimeout(typingTimer);
  typingTimer = setTimeout(() => setTyping(false), 3000);
  if (el.value.length > MAX_CHARS) { el.value = el.value.slice(0, MAX_CHARS); showToast(`❌ Макс. ${MAX_CHARS} символов`); }
};

window.scrollToUserMsg = (username) => {
  const msg = allMessages.find(m => m.author === username);
  if (msg) scrollToMsg(msg.id);
};

// ── NOTIFICATIONS (stubs) ──
window.toggleNotifPanel = () => document.getElementById('notifPanel').classList.toggle('open');
window.clearNotifs = () => { document.getElementById('notifList').innerHTML = '<div class="notif-empty">Нет уведомлений</div>'; document.getElementById('notifDot').classList.remove('show'); };

// ── THREAD (stubs) ──
window.closeThread = () => document.getElementById('threadPanel').classList.remove('open');
window.sendThreadReply = () => showToast('Треды временно отключены');

// ── UTILS ──
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
window.showToast = (msg) => {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

// ── INIT ──
if (initAuth()) {
  Promise.all([loadBannedUsers(), initPresence(), loadPinned()]).then(() => {
    startFeed(); startTypingListener();
    setInterval(() => { if (isAtBottom) markVisibleAsRead(); }, 5000);
  });
}
