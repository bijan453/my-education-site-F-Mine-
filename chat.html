
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #07070d;
  --surface: #0f0f18;
  --surface2: #161622;
  --surface3: #1e1e2e;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --gold: #f5c842;
  --gold2: #e8a020;
  --accent: #7c6af7;
  --accent2: #5e4fd6;
  --text: #e2e2f0;
  --muted: #52526a;
  --danger: #ff4d6d;
  --green: #3dffa0;
  --cyan: #3ddeff;
  --radius: 16px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ── AMBIENT GLOW ── */
body::after {
  content: '';
  position: fixed;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, rgba(124,106,247,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── TOP BAR ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,7,13,0.9);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
}

.logo {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 900; font-size: 22px;
  background: linear-gradient(90deg, var(--gold), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}

.header-center { display: flex; align-items: center; gap: 8px; }
.header-right { display: flex; align-items: center; gap: 8px; }

#userBadge {
  font-size: 12px; color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 30px;
}
#userBadge span { color: var(--gold); font-weight: 600; }

#onlineBadge {
  font-size: 12px; color: var(--green);
  background: rgba(61,255,160,0.07);
  border: 1px solid rgba(61,255,160,0.15);
  padding: 5px 10px; border-radius: 30px;
  display: flex; align-items: center; gap: 5px;
}
#onlineBadge::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* NEW: Search button in header */
#searchToggleBtn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  color: var(--muted); cursor: pointer; font-size: 14px;
  transition: all 0.2s; font-family: inherit;
}
#searchToggleBtn:hover { border-color: var(--accent); color: var(--accent); }

/* ── NEW: SEARCH BAR (Improvement 1) ── */
#searchBar {
  display: none;
  background: rgba(7,7,13,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  position: sticky; top: 53px; z-index: 99;
}
#searchBar.open { display: block; }
#searchBar input {
  width: 100%; max-width: 680px;
  margin: 0 auto; display: block;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 9px 14px;
  color: var(--text); font-family: inherit; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
#searchBar input:focus { border-color: var(--accent); }
#searchResultsCount {
  max-width: 680px; margin: 6px auto 0;
  font-size: 12px; color: var(--muted); padding-left: 4px;
}

/* ── LAYOUT ── */
.layout {
  flex: 1;
  max-width: 680px; width: 100%;
  margin: 0 auto;
  padding: 16px 16px 150px;
  position: relative; z-index: 1;
}

/* ── DATE DIVIDERS (Improvement 2) ── */
.date-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 12px;
}
.date-divider::before, .date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.date-divider span {
  font-size: 11px; font-weight: 600; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px;
  white-space: nowrap;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 16px;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; text-decoration: none;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

/* ── MESSAGES ── */
#feed { display: flex; flex-direction: column; gap: 8px; }

.msg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 15px;
  position: relative;
  animation: fadeUp 0.28s ease;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.msg-card:hover { border-color: var(--border2); }
.msg-card.admin-msg { border-color: rgba(245,200,66,0.18); }
.msg-card.own-msg { border-color: rgba(124,106,247,0.18); }
.msg-card.highlight-msg {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 2px rgba(124,106,247,0.15);
  animation: highlightPulse 1.5s ease forwards;
}
@keyframes highlightPulse {
  0%   { box-shadow: 0 0 0 4px rgba(124,106,247,0.3); }
  100% { box-shadow: 0 0 0 2px rgba(124,106,247,0.1); }
}

/* NEW: Search match highlight */
.msg-card.search-match { border-color: rgba(245,200,66,0.35) !important; }
.msg-card.search-hidden { display: none; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}

.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0; color: white;
  text-transform: uppercase;
}
.avatar.admin-avatar { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #000; }

.msg-meta { flex: 1; min-width: 0; }
.msg-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
}
.msg-time { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* IMPROVEMENT: Edited tag */
.edited-tag { font-size: 10px; color: var(--muted); font-weight: 400; }

/* Reply quote */
.reply-quote {
  background: rgba(124,106,247,0.07);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 6px 10px;
  margin-bottom: 8px;
  font-size: 12px; color: var(--muted);
  cursor: pointer; transition: background 0.15s;
}
.reply-quote:hover { background: rgba(124,106,247,0.12); }
.reply-quote strong { color: var(--accent); display: block; font-size: 11px; margin-bottom: 2px; }

.msg-text { font-size: 14px; line-height: 1.65; color: #d0d0e8; word-break: break-word; }

/* NEW: Highlight search term in text */
.msg-text mark {
  background: rgba(245,200,66,0.25);
  color: var(--gold);
  border-radius: 3px; padding: 0 2px;
}

.msg-img {
  margin-top: 10px; border-radius: 12px;
  max-width: 100%; max-height: 320px;
  object-fit: cover; display: block;
  cursor: zoom-in; transition: opacity 0.2s, transform 0.2s;
}
.msg-img:hover { opacity: 0.9; transform: scale(1.005); }

/* NEW: Image loading skeleton */
.img-skeleton {
  margin-top: 10px; border-radius: 12px;
  width: 100%; height: 200px;
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.msg-footer {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

/* Like */
.like-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 11px;
  color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; font-family: inherit;
}
.like-btn:hover, .like-btn.liked {
  background: rgba(255,77,109,0.08);
  border-color: #ff4d6d; color: #ff6b85;
}

/* Reactions */
.reaction-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.reaction-btn {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 16px; padding: 3px 9px;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
  font-family: inherit; color: var(--text);
}
.reaction-btn:hover { border-color: var(--accent); transform: scale(1.08); }
.reaction-btn.active { background: rgba(124,106,247,0.15); border-color: var(--accent); }

.emoji-picker-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 16px; padding: 3px 8px;
  font-size: 14px; cursor: pointer; transition: all 0.15s; color: var(--muted);
}
.emoji-picker-btn:hover { border-color: var(--accent); }

.emoji-popup {
  position: absolute; bottom: calc(100% + 8px); left: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 8px;
  display: none; gap: 6px; z-index: 50;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.emoji-popup.open { display: flex; }
.emoji-popup button {
  background: none; border: none; font-size: 20px; cursor: pointer;
  padding: 4px; border-radius: 6px; transition: background 0.15s; line-height: 1;
}
.emoji-popup button:hover { background: rgba(255,255,255,0.08); }

/* Action buttons */
.msg-actions { margin-left: auto; display: flex; gap: 4px; }
.icon-btn {
  background: none; border: 1px solid transparent;
  border-radius: 8px; padding: 4px 8px;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
  font-family: inherit; color: var(--muted);
}
.icon-btn:hover { border-color: var(--border2); color: var(--text); }
.icon-btn.delete-btn:hover { color: var(--danger); border-color: rgba(255,77,109,0.3); }
.icon-btn.ban-btn-inline:hover { color: var(--danger); border-color: rgba(255,77,109,0.3); }
.icon-btn.edit-btn:hover { color: var(--cyan); border-color: rgba(61,222,255,0.3); }

.banned-banner {
  background: rgba(255,77,109,0.07);
  border: 1px solid rgba(255,77,109,0.2);
  border-radius: var(--radius); padding: 14px;
  text-align: center; color: var(--danger);
  font-weight: 600; font-size: 14px; margin-bottom: 12px;
}

/* ── NEW: Edit mode inline (Improvement 3) ── */
.edit-area-wrap {
  margin-top: 8px;
  display: none;
}
.edit-area-wrap textarea {
  width: 100%;
  background: var(--surface3);
  border: 1px solid var(--accent);
  border-radius: 10px; padding: 9px 12px;
  color: var(--text); font-family: inherit; font-size: 14px;
  resize: none; outline: none; line-height: 1.5;
}
.edit-area-wrap .edit-btns { display: flex; gap: 6px; margin-top: 6px; }
.edit-save-btn {
  background: var(--accent); color: white; border: none;
  border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.edit-save-btn:hover { background: var(--accent2); }
.edit-cancel-btn {
  background: var(--surface3); color: var(--muted); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.edit-cancel-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ── NEW: Message status ticks (Improvement 4) ── */
.msg-status { font-size: 12px; color: var(--muted); margin-left: auto; }
.msg-status.read { color: var(--cyan); }

/* ── Typing indicator ── */
#typingBar {
  max-width: 680px; margin: 0 auto;
  padding: 0 16px 6px;
  font-size: 12px; color: var(--muted);
  min-height: 20px; position: relative; z-index: 1;
}
.typing-dots span {
  display: inline-block; width: 4px; height: 4px;
  background: var(--muted); border-radius: 50%; margin: 0 1px;
  animation: typingDot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ── Scroll button ── */
#scrollBtn {
  position: fixed; bottom: 135px; right: 20px; z-index: 200;
  width: 40px; height: 40px;
  background: var(--accent); color: white;
  border: none; border-radius: 50%; font-size: 16px;
  cursor: pointer; box-shadow: 0 4px 20px rgba(124,106,247,0.45);
  display: none; align-items: center; justify-content: center;
  transition: opacity 0.2s, transform 0.2s;
}
#scrollBtn.show { display: flex; }
#scrollBtn:hover { transform: scale(1.1); }

/* ── Unread badge ── */
#unreadBadge {
  position: fixed; bottom: 180px; right: 12px; z-index: 201;
  background: var(--danger); color: white;
  font-size: 11px; font-weight: 700;
  border-radius: 20px; padding: 2px 8px; display: none;
}
#unreadBadge.show { display: block; }

/* ── COMPOSE BAR ── */
#composeBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(7,7,13,0.94);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  padding: 10px 16px 14px;
}

.compose-inner {
  max-width: 680px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 8px;
}

/* NEW: Char counter (Improvement 5) */
#charCounter {
  text-align: right; font-size: 11px; color: var(--muted);
  transition: color 0.2s; display: none;
}
#charCounter.warn { color: var(--gold); }
#charCounter.danger { color: var(--danger); }

/* Reply preview */
#replyPreview {
  display: none;
  background: rgba(124,106,247,0.07);
  border: 1px solid rgba(124,106,247,0.18);
  border-radius: 10px; padding: 8px 12px;
  font-size: 12px; color: var(--muted);
  align-items: center; gap: 8px;
}
#replyPreview strong { color: var(--accent); }
#cancelReply {
  margin-left: auto; background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 16px;
}
#cancelReply:hover { color: var(--danger); }

.compose-row { display: flex; gap: 8px; align-items: flex-end; }

#msgInput {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit; font-size: 14px;
  padding: 10px 14px;
  resize: none; outline: none;
  max-height: 120px; min-height: 42px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
#msgInput:focus { border-color: var(--accent); }
#msgInput::placeholder { color: var(--muted); }

.compose-actions { display: flex; gap: 6px; align-items: center; }

/* NEW: Emoji picker in compose (Improvement 6) */
#composeEmojiBtn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; transition: all 0.18s;
  color: var(--muted); flex-shrink: 0;
}
#composeEmojiBtn:hover { border-color: var(--accent); }

#composeEmojiPanel {
  display: none; flex-wrap: wrap; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 8px;
  max-width: 680px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
}
#composeEmojiPanel.open { display: flex; }
#composeEmojiPanel button {
  background: none; border: none; font-size: 22px; cursor: pointer;
  padding: 5px; border-radius: 6px; transition: background 0.15s; line-height: 1;
}
#composeEmojiPanel button:hover { background: rgba(255,255,255,0.08); }

#photoBtn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; transition: all 0.18s;
  color: var(--muted); flex-shrink: 0;
}
#photoBtn:hover { border-color: var(--accent); color: var(--accent); }

#photoPreviewWrap {
  display: none; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 6px 10px;
}
#photoThumb { width: 34px; height: 34px; border-radius: 6px; object-fit: cover; }
#clearPhoto { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }

/* ── UPLOAD PROGRESS (Fix for photos + Improvement 7) ── */
#uploadProgress {
  display: none;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 12px;
  align-items: center; gap: 10px; font-size: 12px; color: var(--muted);
}
#uploadProgress.active { display: flex; }
#progressBar {
  flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden;
}
#progressFill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 2px; width: 0%; transition: width 0.3s;
  box-shadow: 0 0 8px rgba(124,106,247,0.5);
}
#uploadLabel { white-space: nowrap; }

/* ── ADMIN TAG ── */
.admin-tag {
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  color: #000; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
}

/* ── IMAGE LIGHTBOX ── */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.93); align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 92vw; max-height: 85vh; border-radius: 12px; }
#lightbox-close {
  position: absolute; top: 16px; right: 20px;
  background: rgba(255,255,255,0.1); border: none; color: white;
  font-size: 22px; cursor: pointer; border-radius: 8px; padding: 4px 10px;
  transition: background 0.2s;
}
#lightbox-close:hover { background: rgba(255,255,255,0.2); }
/* NEW: Download button in lightbox (Improvement 8) */
#lightbox-download {
  background: var(--accent); color: white; border: none;
  border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
#lightbox-download:hover { background: var(--accent2); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 30px; padding: 10px 20px;
  font-size: 13px; font-weight: 600; color: var(--text);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, bottom 0.25s;
  z-index: 300; white-space: nowrap;
  box-shadow: var(--shadow);
}
#toast.show { opacity: 1; bottom: 100px; }

/* ── NEW: Message pinning banner (Improvement 9) ── */
#pinnedBanner {
  display: none;
  position: sticky; top: 53px; z-index: 98;
  background: rgba(245,200,66,0.07);
  border-bottom: 1px solid rgba(245,200,66,0.18);
  padding: 8px 20px;
  cursor: pointer;
  transition: background 0.2s;
}
#pinnedBanner:hover { background: rgba(245,200,66,0.12); }
.pinned-inner {
  max-width: 680px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--gold);
}

/* ── EMPTY ── */

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

/* ── NEW: Jump-to-mention highlight (Improvement 10) ── */
.mention {

<body>

<!-- Improvement 1: Search bar -->

<div id="pinnedBanner" onclick="scrollToPinned()">

<!-- COMPOSE -->
<div id="composeBar">
  <div class="compose-inner">
    <!-- Improvement 6: Emoji panel -->
    <div id="composeEmojiPanel">
      😀 😂 🔥 ❤️ 👍 😎 🥳 😢 💯 🎉 😍 🤔 💀 🙏 🤣 😅 👏 🫡 💪 🚀
      ✨ 🎮 🤩 😤 👋 🫶 🥰 😮 🤯 🧠 👑 💎 🌙 ⭐ 🎯 💬 🤝 👀 🫠 😈

    <!-- Improvement 2 reply preview -->
    <div id="replyPreview">
      <div>Ответ → <strong id="replyAuthorLabel"></strong>: <span id="replyTextLabel" style="opacity:.7"></span></div>
      <button id="cancelReply" onclick="clearReply()">✕</button>
    </div>
    <div id="photoPreviewWrap">
      <img id="photoThumb" src="" alt="preview" />

<!-- LIGHTBOX -->

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, orderBy, query,
  doc, updateDoc, arrayUnion, serverTimestamp,
  getDoc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getStorage, ref, uploadBytesResumable, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3mpP7UjMrqbq-X_bmDfBQkZGbwTy6aVc",
  authDomain: "fmine-auth.firebaseapp.com",
  projectId: "fmine-auth",
  storageBucket: "fmine-auth.firebasestorage.app",
  messagingSenderId: "219769927531",
  appId: "1:219769927531:web:fbd45a0876f32927d23e2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ── STATE ──
let currentUser = null;
let isAdmin = false;
let bannedUsers = new Set();
let selectedFile = null;
let likedMsgs = JSON.parse(localStorage.getItem('fmine_likes') || '[]');
let replyTo = null;
let typingTimer = null;
let unreadCount = 0;
let isAtBottom = true;
let allMessages = [];
let pinnedMsgId = null;
let lightboxCurrentUrl = null;
let presenceRef = null;
const MAX_CHARS = 1000;

const REACTIONS = ['🔥','❤️','😂','👍','😮','💯'];

// Emojis for compose panel
const COMPOSE_EMOJIS = ['😀','😂','🔥','❤️','👍','😎','🥳','😢','💯','🎉','😍','🤔','💀','🙏','🤣','😅','👏','🫡','💪','🚀','✨','🎮','🤩','😤','👋','🫶','🥰','😮','🤯','🧠','👑','💎','🌙','⭐','🎯','💬','🤝','👀','🫠','😈'];

// ── AUTH ──
function initAuth() {
  const stored = localStorage.getItem('currentUser') || localStorage.getItem('fmine_user');
  if (!stored) { window.location.href = 'index.html'; return false; }
  currentUser = stored;
  isAdmin = (currentUser === 'admin123');
  document.getElementById('headerName').textContent = currentUser;
  if (isAdmin) document.getElementById('headerName').innerHTML = '👑 admin123';
  return true;
}

window.doLogout = () => {
  localStorage.removeItem('currentUser');
  localStorage.removeItem('fmine_user');
  clearPresence();
  window.location.href = 'index.html';
};

// ── PRESENCE ──
async function initPresence() {
  presenceRef = doc(db, 'presence', currentUser + '_' + Math.random().toString(36).slice(2, 7));
  await setDoc(presenceRef, { user: currentUser, ts: Date.now() });
  setInterval(async () => {
    await setDoc(presenceRef, { user: currentUser, ts: Date.now() });
  }, 20000);
  onSnapshot(collection(db, 'presence'), snap => {
    const cutoff = Date.now() - 60000;
    const active = new Set();
    snap.docs.forEach(d => { if (d.data().ts > cutoff) active.add(d.data().user); });
    document.getElementById('onlineCount').textContent = active.size;
  });
  window.addEventListener('beforeunload', clearPresence);
}

async function clearPresence() {
  if (presenceRef) await deleteDoc(presenceRef).catch(() => {});
}

// ── TYPING ──
async function setTyping(active) {
  if (!currentUser) return;
  const tRef = doc(db, 'typing', currentUser);
  if (active) { await setDoc(tRef, { user: currentUser, ts: Date.now() }); }
  else { await deleteDoc(tRef).catch(() => {}); }
}

function startTypingListener() {
  onSnapshot(collection(db, 'typing'), snap => {
    const cutoff = Date.now() - 4000;
    const typers = snap.docs
      .filter(d => d.data().user !== currentUser && d.data().ts > cutoff)
      .map(d => d.data().user);
    const bar = document.getElementById('typingBar');
    if (typers.length) {
      bar.innerHTML = `<span style="display:inline-flex;align-items:center;gap:6px">${escHtml(typers.join(', '))} печатает<span class="typing-dots"><span></span><span></span><span></span></span></span>`;
    } else {
      bar.innerHTML = '';
    }
  });
}

// ── BANNED USERS ──
async function loadBannedUsers() {
  const snap = await getDoc(doc(db, 'meta', 'banned'));
  if (snap.exists()) bannedUsers = new Set(snap.data().users || []);
  updateComposeState();
}

function updateComposeState() {
  const isBanned = bannedUsers.has(currentUser);
  document.getElementById('bannedMsg').style.display = isBanned ? 'block' : 'none';
  document.getElementById('sendBtn').disabled = isBanned && !isAdmin;
  document.getElementById('msgInput').disabled = isBanned && !isAdmin;
}

// ── SCROLL ──
function checkScroll() {
  const scrollY = window.scrollY;
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  isAtBottom = scrollY >= maxScroll - 150;
  document.getElementById('scrollBtn').classList.toggle('show', !isAtBottom);
  if (isAtBottom) {
    unreadCount = 0;
    document.getElementById('unreadBadge').classList.remove('show');
  }
}

function scrollToBottom(smooth = false) {
  window.scrollTo({ top: document.body.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  unreadCount = 0;
  document.getElementById('unreadBadge').classList.remove('show');
}
window.scrollToBottom = scrollToBottom;
window.addEventListener('scroll', checkScroll);

// ── IMPROVEMENT 1: Search ──
let searchQuery = '';
window.toggleSearch = () => {
  const bar = document.getElementById('searchBar');
  const isOpen = bar.classList.toggle('open');
  if (isOpen) { document.getElementById('searchInput').focus(); }
  else { document.getElementById('searchInput').value = ''; handleSearch(''); }
};

window.handleSearch = (val) => {
  searchQuery = val.trim().toLowerCase();
  applySearch();
};

function applySearch() {
  if (!searchQuery) {
    document.querySelectorAll('.msg-card').forEach(el => {
      el.classList.remove('search-match', 'search-hidden');
    });
    document.getElementById('searchResultsCount').textContent = '';
    // restore raw text
    document.querySelectorAll('.msg-text').forEach(el => {
      const msgId = el.closest('.msg-card')?.id?.replace('msg-', '');
      if (!msgId) return;
      const m = allMessages.find(x => x.id === msgId);
      if (m && m.text) el.innerHTML = renderText(m.text);
    });
    return;
  }
  let count = 0;
  document.querySelectorAll('.msg-card').forEach(el => {
    const msgId = el.id?.replace('msg-', '');
    const m = allMessages.find(x => x.id === msgId);
    const text = ((m?.text || '') + (m?.author || '')).toLowerCase();
    if (text.includes(searchQuery)) {
      el.classList.add('search-match');
      el.classList.remove('search-hidden');
      count++;
      // highlight term in text
      if (m?.text) {
        const textEl = el.querySelector('.msg-text');
        if (textEl) {
          const highlighted = renderText(m.text).replace(
            new RegExp(`(${escHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
            '<mark>$1</mark>'
          );
          textEl.innerHTML = highlighted;
        }
      }
    } else {
      el.classList.remove('search-match');
      el.classList.add('search-hidden');
    }
  });
  document.getElementById('searchResultsCount').textContent = count ? `Найдено: ${count}` : 'Ничего не найдено';
}

// ── IMPROVEMENT 2: Date dividers ──
function formatDateDivider(ts) {
  if (!ts) return null;
  const d = new Date(ts.seconds * 1000);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return 'Сегодня';
  if (diff < 172800000) return 'Вчера';
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
}

// ── FEED ──
function startFeed() {
  const q = query(collection(db, 'messages'), orderBy('ts', 'asc'));
  let firstLoad = true;
  onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const wasAtBottom = isAtBottom;
    const prevCount = allMessages.length;
    allMessages = msgs;
    renderFeed(msgs);
    // re-apply search if active
    if (searchQuery) applySearch();
    if (firstLoad) { scrollToBottom(false); firstLoad = false; }
    else if (wasAtBottom) { scrollToBottom(true); }
    else if (msgs.length > prevCount) {
      unreadCount += msgs.length - prevCount;
      const badge = document.getElementById('unreadBadge');
      badge.textContent = `+${unreadCount} новых`;
      badge.classList.add('show');
    }
  });
}

function renderFeed(msgs) {
  const feed = document.getElementById('feed');
  if (!msgs.length) {
    feed.innerHTML = '<div class="empty"><div class="icon">💬</div><p>Пока нет сообщений</p></div>';
    return;
  }
  let html = '';
  let lastDateLabel = null;
  msgs.forEach(m => {
    // Improvement 2: date dividers
    const dateLabel = formatDateDivider(m.ts);
    if (dateLabel && dateLabel !== lastDateLabel) {
      html += `<div class="date-divider"><span>${escHtml(dateLabel)}</span></div>`;
      lastDateLabel = dateLabel;
    }
    html += buildCard(m);
  });
  feed.innerHTML = html;
}

// Improvement 10: parse @mentions
function renderText(text) {
  const escaped = escHtml(text);
  return escaped.replace(/@(\w+)/g, '<span class="mention" onclick="scrollToUserMsg(\'$1\')">@$1</span>');
}

function buildCard(m) {
  const admin = m.author === 'admin123';
  const isOwn = m.author === currentUser;
  const isBanned = bannedUsers.has(m.author);
  const initials = (m.author || '?')[0].toUpperCase();
  const time = m.ts ? new Date(m.ts.seconds * 1000).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) : '';
  const isPinned = m.id === pinnedMsgId;

  // Reactions
  const reactions = m.reactions || {};
  const reactionHtml = REACTIONS.map(emoji => {
    const users = reactions[emoji] || [];
    if (!users.length) return '';
    const active = users.includes(currentUser) ? 'active' : '';
    return `<button class="reaction-btn ${active}" onclick="toggleReaction('${m.id}','${emoji}')">${emoji} <span>${users.length}</span></button>`;
  }).join('');

  const emojiPickerHtml = `
    <div style="position:relative">
      <button class="emoji-picker-btn" onclick="toggleEmojiPicker('${m.id}')">＋</button>
      <div class="emoji-popup" id="picker-${m.id}">
        ${REACTIONS.map(e => `<button onclick="toggleReaction('${m.id}','${e}');closeAllPickers()">${e}</button>`).join('')}
      </div>
    </div>`;

  // Reply quote
  let replyHtml = '';
  if (m.replyTo) {
    const orig = allMessages.find(x => x.id === m.replyTo.id);
    const txt = orig ? (orig.text || '📷 фото') : (m.replyTo.text || '📷');
    replyHtml = `<div class="reply-quote" onclick="scrollToMsg('${m.replyTo.id}')">
      <strong>${escHtml(m.replyTo.author)}</strong>
      ${escHtml(txt.slice(0, 80))}${txt.length > 80 ? '…' : ''}
    </div>`;
  }

  // Image with skeleton
  let imgHtml = '';
  if (m.imgUrl) {
    imgHtml = `<img class="msg-img" src="${m.imgUrl}" alt="photo"
      onclick="openLightbox('${m.imgUrl}')"
      loading="lazy"
      onload="this.previousElementSibling&&this.previousElementSibling.remove()"
    />`;
  }

  // Improvement 3: Edit button (own messages only, text only)
  let editBtn = '';
  if (isOwn && m.text && !m.imgUrl) {
    editBtn = `<button class="icon-btn edit-btn" onclick="startEdit('${m.id}')" title="Редактировать">✏️</button>`;
  }

  // Improvement 3: Editable text area
  const editAreaHtml = `<div class="edit-area-wrap" id="editWrap-${m.id}">
    <textarea id="editInput-${m.id}" rows="2">${escHtml(m.text || '')}</textarea>
    <div class="edit-btns">
      <button class="edit-save-btn" onclick="saveEdit('${m.id}')">Сохранить</button>
      <button class="edit-cancel-btn" onclick="cancelEdit('${m.id}')">Отмена</button>
    </div>
  </div>`;

  // Improvement 4: Read receipts (status)
  let statusHtml = '';
  if (isOwn) {
    const readBy = m.readBy || [];
    const readCount = readBy.filter(u => u !== currentUser).length;
    statusHtml = `<span class="msg-status ${readCount > 0 ? 'read' : ''}" title="${readCount > 0 ? 'Прочитано' : 'Доставлено'}">
      ${readCount > 0 ? '✓✓' : '✓'}
    </span>`;
  }

  // Action buttons
  const canDelete = isOwn || isAdmin;
  const canBan = isAdmin && m.author !== 'admin123';
  const canPin = isAdmin;

  let actionsHtml = `<div class="msg-actions">
    <button class="icon-btn" onclick="replyMessage('${m.id}')" title="Ответить">↩</button>
    ${editBtn}
    ${canPin ? `<button class="icon-btn" onclick="pinMessage('${m.id}','${escHtml(m.author)}','${escHtml((m.text||'').slice(0,60))}')" title="${isPinned ? 'Открепить' : 'Закрепить'}">📌</button>` : ''}
    ${canDelete ? `<button class="icon-btn delete-btn" onclick="deleteMessage('${m.id}')" title="Удалить">🗑</button>` : ''}
    ${canBan ? `<button class="icon-btn ban-btn-inline" onclick="toggleBan('${m.author}',${isBanned})">${isBanned ? '✅' : '🚫'}</button>` : ''}
  </div>`;

  const liked = likedMsgs.includes(m.id);
  const likeCount = (m.likes || []).length;

  return `
    <div class="msg-card ${admin ? 'admin-msg' : ''} ${isOwn ? 'own-msg' : ''} ${isPinned ? 'pinned-card' : ''}" id="msg-${m.id}">
      <div class="msg-header">
        <div class="avatar ${admin ? 'admin-avatar' : ''}">${admin ? '👑' : initials}</div>
        <div class="msg-meta">
          <div class="msg-name">
            ${admin ? '<span class="admin-tag">ADMIN</span>' : ''}
            ${escHtml(m.author)}
            ${isBanned ? '<span style="font-size:11px;color:var(--danger)">🚫</span>' : ''}
            ${isOwn && !admin ? '<span style="font-size:10px;color:var(--accent)">вы</span>' : ''}
            ${m.edited ? '<span class="edited-tag">(ред.)</span>' : ''}
          </div>
          <div class="msg-time">${time}${isPinned ? ' 📌' : ''}</div>
        </div>
        ${statusHtml}
      </div>
      ${replyHtml}
      ${m.text ? `<div class="msg-text" id="msgText-${m.id}">${renderText(m.text)}</div>` : ''}
      ${editAreaHtml}
      ${imgHtml}
      <div class="msg-footer">
        <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${m.id}')">
          ${liked ? '❤️' : '🤍'} ${likeCount}
        </button>
        <div class="reaction-wrap">${reactionHtml}${emojiPickerHtml}</div>
        ${actionsHtml}
      </div>
    </div>`;
}

// ── FIX + Improvement 7: SEND with resumable upload ──
window.sendMessage = async () => {
  if (bannedUsers.has(currentUser) && !isAdmin) return;
  const text = document.getElementById('msgInput').value.trim();
  if (!text && !selectedFile) return;

  document.getElementById('sendBtn').disabled = true;
  await setTyping(false);

  let imgUrl = null;

  if (selectedFile) {
    try {
      imgUrl = await uploadFileWithProgress(selectedFile);
    } catch (e) {
      showToast('❌ Ошибка загрузки фото: ' + (e.message || e));
      document.getElementById('sendBtn').disabled = false;
      hideUploadProgress();
      return;
    }
  }

  const msgData = {
    author: currentUser,
    text: text || '',
    imgUrl: imgUrl || null,
    likes: [],
    reactions: {},
    readBy: [currentUser],
    edited: false,
    ts: serverTimestamp()
  };

  if (replyTo) {
    msgData.replyTo = { id: replyTo.id, author: replyTo.author, text: replyTo.text || '' };
  }

  await addDoc(collection(db, 'messages'), msgData);

  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';
  updateCharCounter('');
  clearPhoto();
  clearReply();
  document.getElementById('sendBtn').disabled = false;
};

// ── FIX: Upload with progress using uploadBytesResumable ──
function uploadFileWithProgress(file) {
  return new Promise((resolve, reject) => {
    // Validate file size (max 5MB)
    if (file.size > 5 * 1024 * 1024) {
      reject(new Error('Файл слишком большой (макс. 5MB)'));
      return;
    }

    const storageRef = ref(storage, `chat-photos/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`);
    const uploadTask = uploadBytesResumable(storageRef, file);

    showUploadProgress();

    uploadTask.on('state_changed',
      (snapshot) => {
        const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('uploadLabel').textContent = `Загрузка... ${pct}%`;
      },
      (error) => {
        hideUploadProgress();
        // Friendly error messages
        if (error.code === 'storage/unauthorized') {
          reject(new Error('Нет прав доступа к хранилищу. Проверьте Firebase Storage Rules.'));
        } else if (error.code === 'storage/canceled') {
          reject(new Error('Загрузка отменена'));
        } else {
          reject(new Error(error.message));
        }
      },
      async () => {
        hideUploadProgress();
        const url = await getDownloadURL(uploadTask.snapshot.ref);
        resolve(url);
      }
    );
  });
}

function showUploadProgress() {
  const el = document.getElementById('uploadProgress');
  el.classList.add('active');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('uploadLabel').textContent = 'Загрузка фото...';
}

function hideUploadProgress() {
  document.getElementById('uploadProgress').classList.remove('active');
}

// ── DELETE ──
window.deleteMessage = async (msgId) => {
  if (!confirm('Удалить сообщение?')) return;
  await deleteDoc(doc(db, 'messages', msgId));
  showToast('🗑 Удалено');
};

// ── Improvement 3: EDIT ──
window.startEdit = (msgId) => {
  const wrap = document.getElementById('editWrap-' + msgId);
  const textEl = document.getElementById('msgText-' + msgId);
  if (!wrap) return;
  wrap.style.display = 'block';
  if (textEl) textEl.style.display = 'none';
  const inp = document.getElementById('editInput-' + msgId);
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
};

window.cancelEdit = (msgId) => {
  const wrap = document.getElementById('editWrap-' + msgId);
  const textEl = document.getElementById('msgText-' + msgId);
  if (wrap) wrap.style.display = 'none';
  if (textEl) textEl.style.display = '';
};

window.saveEdit = async (msgId) => {
  const inp = document.getElementById('editInput-' + msgId);
  if (!inp) return;
  const newText = inp.value.trim();
  if (!newText) { showToast('Нельзя сохранить пустое сообщение'); return; }
  await updateDoc(doc(db, 'messages', msgId), { text: newText, edited: true });
  showToast('✏️ Сохранено');
};

// ── Improvement 4: Mark as read ──
function markRead(msgId) {
  const ref2 = doc(db, 'messages', msgId);
  updateDoc(ref2, { readBy: arrayUnion(currentUser) }).catch(() => {});
}

// Mark visible messages as read
function markVisibleAsRead() {
  allMessages.forEach(m => {
    if (m.author !== currentUser && !(m.readBy || []).includes(currentUser)) {
      markRead(m.id);
    }
  });
}

// ── LIKES ──
window.toggleLike = async (msgId) => {
  const already = likedMsgs.includes(msgId);
  const ref2 = doc(db, 'messages', msgId);
  if (already) {
    likedMsgs = likedMsgs.filter(x => x !== msgId);
    const snap = await getDoc(ref2);
    const likes = (snap.data().likes || []).filter(l => !l.startsWith(currentUser + '_'));
    await updateDoc(ref2, { likes });
  } else {
    likedMsgs.push(msgId);
    await updateDoc(ref2, { likes: arrayUnion(currentUser + '_' + Date.now()) });
  }
  localStorage.setItem('fmine_likes', JSON.stringify(likedMsgs));
};

// ── REACTIONS ──
window.toggleReaction = async (msgId, emoji) => {
  const ref2 = doc(db, 'messages', msgId);
  const snap = await getDoc(ref2);
  const reactions = snap.data().reactions || {};
  const users = reactions[emoji] || [];
  if (users.includes(currentUser)) {
    reactions[emoji] = users.filter(u => u !== currentUser);
  } else {
    reactions[emoji] = [...users, currentUser];
  }
  await updateDoc(ref2, { reactions });
};

window.toggleEmojiPicker = (msgId) => {
  const picker = document.getElementById('picker-' + msgId);
  if (!picker) return;
  const isOpen = picker.classList.contains('open');
  closeAllPickers();
  if (!isOpen) picker.classList.add('open');
};

window.closeAllPickers = () => {
  document.querySelectorAll('.emoji-popup').forEach(p => p.classList.remove('open'));
};
document.addEventListener('click', (e) => {
  if (!e.target.closest('.emoji-picker-btn') && !e.target.closest('.emoji-popup')) closeAllPickers();
  if (!e.target.closest('#composeEmojiBtn') && !e.target.closest('#composeEmojiPanel')) {
    document.getElementById('composeEmojiPanel').classList.remove('open');
  }
});

// ── REPLY ──
window.replyMessage = (msgId) => {
  const msg = allMessages.find(m => m.id === msgId);
  if (!msg) return;
  replyTo = { id: msgId, author: msg.author, text: msg.text || '' };
  document.getElementById('replyAuthorLabel').textContent = msg.author;
  document.getElementById('replyTextLabel').textContent = (msg.text || '📷').slice(0, 60);
  document.getElementById('replyPreview').style.display = 'flex';
  document.getElementById('msgInput').focus();
};

window.clearReply = () => {
  replyTo = null;
  document.getElementById('replyPreview').style.display = 'none';
};

window.scrollToMsg = (msgId) => {
  const el = document.getElementById('msg-' + msgId);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('highlight-msg');
    setTimeout(() => el.classList.remove('highlight-msg'), 2000);
  }
};

// ── BAN ──
window.toggleBan = async (username, currentlyBanned) => {
  const banRef = doc(db, 'meta', 'banned');
  const snap = await getDoc(banRef);
  let users = snap.exists() ? (snap.data().users || []) : [];
  if (currentlyBanned) {
    users = users.filter(u => u !== username);
    bannedUsers.delete(username);
    showToast(`✅ ${username} разбанен`);
  } else {
    users.push(username);
    bannedUsers.add(username);
    showToast(`🚫 ${username} заблокирован`);
  }
  await setDoc(banRef, { users });
  updateComposeState();
};

// ── Improvement 9: PIN MESSAGE ──
window.pinMessage = async (msgId, author, text) => {
  const pinRef = doc(db, 'meta', 'pinned');
  if (pinnedMsgId === msgId) {
    // Unpin
    await deleteDoc(pinRef).catch(() => {});
    pinnedMsgId = null;
    document.getElementById('pinnedBanner').style.display = 'none';
    showToast('📌 Откреплено');
  } else {
    await setDoc(pinRef, { msgId, author, text });
    pinnedMsgId = msgId;
    document.getElementById('pinnedBanner').style.display = 'block';
    document.getElementById('pinnedAuthor').textContent = author + ':';
    document.getElementById('pinnedText').textContent = text || '📷 фото';
    showToast('📌 Закреплено');
  }
};

window.scrollToPinned = () => {
  if (pinnedMsgId) scrollToMsg(pinnedMsgId);
};

async function loadPinned() {
  const snap = await getDoc(doc(db, 'meta', 'pinned'));
  if (snap.exists()) {
    const d = snap.data();
    pinnedMsgId = d.msgId;
    document.getElementById('pinnedBanner').style.display = 'block';
    document.getElementById('pinnedAuthor').textContent = (d.author || '') + ':';
    document.getElementById('pinnedText').textContent = d.text || '📷 фото';
  }
}

// ── PHOTO ──
window.handlePhoto = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  attachFile(file);
};

function attachFile(file) {
  if (file.size > 5 * 1024 * 1024) { showToast('❌ Макс. размер 5MB'); return; }
  selectedFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('photoThumb').src = url;
  document.getElementById('photoName').textContent = file.name;
  document.getElementById('photoPreviewWrap').style.display = 'flex';
}

window.clearPhoto = () => {
  selectedFile = null;
  document.getElementById('photoInput').value = '';
  document.getElementById('photoPreviewWrap').style.display = 'none';
};

// Paste image
document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { attachFile(file); showToast('📷 Изображение вставлено'); }
    }
  }
});

// ── Improvement 8: LIGHTBOX + DOWNLOAD ──
window.openLightbox = (url) => {
  lightboxCurrentUrl = url;
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = () => {
  document.getElementById('lightbox').classList.remove('open');
};
window.downloadImage = async () => {
  if (!lightboxCurrentUrl) return;
  try {
    const resp = await fetch(lightboxCurrentUrl);
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fmine-photo-' + Date.now() + '.jpg';
    a.click();
    showToast('⬇ Скачивание...');
  } catch {
    window.open(lightboxCurrentUrl, '_blank');
  }
};

// ── Improvement 5: CHAR COUNTER ──
function updateCharCounter(val) {
  const counter = document.getElementById('charCounter');
  const len = val.length;
  if (len < 600) { counter.style.display = 'none'; return; }
  counter.style.display = 'block';
  counter.textContent = `${len}/${MAX_CHARS}`;
  counter.className = len >= MAX_CHARS ? 'danger' : len >= 800 ? 'warn' : '';
}

// ── Improvement 6: COMPOSE EMOJI ──
window.toggleComposeEmoji = () => {
  const panel = document.getElementById('composeEmojiPanel');
  panel.classList.toggle('open');
};

// Build emoji buttons
const emojiPanel = document.getElementById('composeEmojiPanel');
emojiPanel.innerHTML = COMPOSE_EMOJIS.map(e =>
  `<button onclick="insertEmoji('${e}')">${e}</button>`
).join('');

window.insertEmoji = (emoji) => {
  const inp = document.getElementById('msgInput');
  const start = inp.selectionStart;
  const end = inp.selectionEnd;
  const val = inp.value;
  inp.value = val.slice(0, start) + emoji + val.slice(end);
  inp.selectionStart = inp.selectionEnd = start + emoji.length;
  inp.focus();
  handleInput(inp);
};

// ── Improvement 10: scroll to user's first mention ──
window.scrollToUserMsg = (username) => {
  const msg = allMessages.find(m => m.author === username);
  if (msg) scrollToMsg(msg.id);
};

// ── KEYBOARD / INPUT ──
window.handleKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.handleInput = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  updateCharCounter(el.value);
  // Typing indicator
  setTyping(true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => setTyping(false), 3000);
  // Block overly long messages
  if (el.value.length > MAX_CHARS) {
    el.value = el.value.slice(0, MAX_CHARS);
    showToast(`❌ Макс. ${MAX_CHARS} символов`);
  }
};

// ── UTILS ──
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

// ── INIT ──
if (initAuth()) {
  Promise.all([loadBannedUsers(), initPresence(), loadPinned()]).then(() => {
    startFeed();
    startTypingListener();
    // Periodically mark messages as read when user is active
    setInterval(() => { if (isAtBottom) markVisibleAsRead(); }, 5000);
  });
}
</script>
</body>
</html>
