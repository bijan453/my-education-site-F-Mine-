<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль пользователя</title>
<style>
  @media (max-width: 768px){
  h1{ font-size:24px; }
  button{ width:100%; }
}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#3a3a6a);
  color:white;
  text-align:center;
}

/* контейнер */
.container{
  max-width:700px;
  margin:80px auto;
  padding:20px;
}

/* карточки */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
  animation:fadeIn 0.8s ease;
}

/* анимация */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* заголовки */
h1{
  font-size:36px;
  text-shadow:0 0 15px gold;
}

h2{
  margin-bottom:15px;
  color:gold;
  text-shadow:0 0 10px gold;
}

/* имя */
.username{
  font-size:20px;
  font-weight:bold;
  color:#fff;
  text-shadow:0 0 8px gold;
}

/* прогресс линия */
.progress-line{
  width:90%;
  background:#333;
  border-radius:12px;
  margin:15px auto;
  height:22px;
  position:relative;
  overflow:hidden;
}

/* заполнение */
.progress-fill{
  height:100%;
  width:0%;
  border-radius:12px;
  background:linear-gradient(90deg,#6c63ff,gold);
  transition:0.6s;
}

/* текст */
.progress-text{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  line-height:22px;
  font-weight:bold;
}

/* олимпиады */
.olymp-item{
  margin:10px 0;
  font-size:18px;
  padding:10px;
  border-radius:10px;
  background:rgba(0,0,0,0.2);
  transition:0.3s;
}

.olymp-item:hover{
  box-shadow:0 0 15px gold;
}

/* кнопка */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6c63ff,#4a47d1);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 0 20px gold;
}
</style>
</head>
<body>

<div class="container">

  <!-- Профиль -->
  <div class="card">
    <h1>👤 Профиль</h1>
    <p>Привет, <span class="username" id="usernameDisplay"></span></p>
  </div>

  <!-- Прогресс обучения -->
  <div class="card">
    <h2>📚 Прогресс обучения</h2>

    <div class="progress-line">
      <div class="progress-fill" id="math7Fill"></div>
      <div class="progress-text" id="math7Text">7 класс: 0%</div>
    </div>

    <div class="progress-line">
      <div class="progress-fill" id="math8Fill"></div>
      <div class="progress-text" id="math8Text">8 класс: 0%</div>
    </div>

    <div class="progress-line">
      <div class="progress-fill" id="math9Fill"></div>
      <div class="progress-text" id="math9Text">9 класс: 0%</div>
    </div>

    <div class="progress-line">
      <div class="progress-fill" id="math10Fill"></div>
      <div class="progress-text" id="math10Text">10 класс: 0%</div>
    </div>
  </div>

  <!-- Олимпиада -->
  <div class="card">
    <h2>🏆 Math Olympiad</h2>

    <div class="olymp-item" id="olymp7">7 класс: 0%</div>
    <div class="olymp-item" id="olymp8">8 класс: 0%</div>
    <div class="olymp-item" id="olymp9">9 класс: 0%</div>
    <div class="olymp-item" id="olymp10">10 класс: 0%</div>
  </div>

  <button onclick="location.reload()">🔄 Обновить прогресс</button>

</div>

<script>
// =======================
// 👤 USER SYSTEM (FIXED)
// =======================
let user = localStorage.getItem('currentUser') || 'guest';
document.getElementById('usernameDisplay').innerText = user;

// =======================
// 📊 PROGRESS SYSTEM (FIXED)
// =======================

// считаем прогресс по классам
function getProgress(classNum){
  let key = user + '_math' + classNum + '_percent';
  let percent = localStorage.getItem(key);

  if(percent === null) return 0;

  percent = parseInt(percent);
  if(isNaN(percent)) return 0;

  return percent;
}

// =======================
// 🏆 OLYMPIAD SYSTEM (FIXED)
// =======================
function getOlymp(classNum){
  let key = user + '_olymp_' + classNum;
  let val = localStorage.getItem(key);

  if(!val) return 0;

  val = val.replace('%','');
  val = parseInt(val);

  return isNaN(val) ? 0 : val;
}

// =======================
// 📊 RENDER UI
// =======================
function updateUI(){

  ['7','8','9','10'].forEach(g => {

    // --- math progress ---
    let percent = getProgress(g);

    let fill = document.getElementById('math'+g+'Fill');
    let text = document.getElementById('math'+g+'Text');

    if(fill) fill.style.width = percent + '%';
    if(text) text.innerText = g + ' класс: ' + percent + '%';

    // --- olymp ---
    let olymp = getOlymp(g);
    let el = document.getElementById('olymp'+g);

    if(el){
      el.innerHTML =
        '<span style="color:gold;font-weight:bold;">' +
        olymp + '%</span>';
    }
  });
}

// =======================
// 🔄 AUTO UPDATE (FIXED)
// =======================
window.addEventListener('storage', function(){
  updateUI();
});

// =======================
// ▶ FIRST LOAD
// =======================
updateUI();

// =======================
// 🔄 MANUAL REFRESH BUTTON FIX
// =======================
function refresh(){
  updateUI();
}
</script>

</body>
</html>
