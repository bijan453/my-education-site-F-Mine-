<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#1e1e2f,#3a3a6a);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box {
    width:95%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 30px rgba(108,99,255,0.6);
    text-align:center;
}

.logo span {
    font-weight:bold;
    font-size:28px;
    animation:goldBlink 2s infinite;
}
.logo span:nth-child(2){animation-delay:0.3s;}
.logo span:nth-child(3){animation-delay:0.6s;}
.logo span:nth-child(4){animation-delay:0.9s;}
.logo span:nth-child(5){animation-delay:1.2s;}
.logo span:nth-child(6){animation-delay:1.5s;}

@keyframes goldBlink {
    0%,100%{color:white;}
    50%{color:gold;text-shadow:0 0 10px gold;}
}

input {
    width:85%;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    outline:none;
    display:block;
}

button {
    width:85%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#6c63ff,#4a47d1);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.alt {
    background:#444;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="box">

<div class="logo">
<span>F</span><span>-</span><span>M</span><span>i</span><span>n</span><span>e</span>
</div>

<h2 id="title">Регистрация</h2>

<!-- REGISTER -->
<div id="register">

<input id="nick" placeholder="Ник">
<input id="email" placeholder="Email">
<input id="passReg" type="password" placeholder="Пароль">

<button onclick="sendCode()">📩 Получить код</button>
<button class="alt" onclick="showLogin()">🔵 Войти</button>

<div id="codeBox" class="hidden">
    <input id="code" type="password" placeholder="Код">
</div>

<button id="finishBtn" class="hidden" onclick="finishRegister()">Создать аккаунт</button>

</div>

<!-- LOGIN -->
<div id="login" class="hidden">

<input id="loginNick" placeholder="Ник">
<input id="loginPass" type="password" placeholder="Пароль">

<button onclick="login()">Войти</button>
<button class="alt" onclick="back()">Назад</button>

</div>

</div>

<script>

(function(){
    emailjs.init("Y9LA_RWTTvSW0hk_w");
})();

let code = "";
let temp = null;

// ================= REGISTER =================
function sendCode(){

    let nick = document.getElementById("nick").value.trim();
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("passReg").value.trim();

    if(!nick ||!email|| !pass){
        alert("Заполни все поля");
        return;
    }

    // 🔴 НИК ЗАНЯТ
    if(localStorage.getItem("user_" + nick)){
        alert("Этот ник уже занят");
        return;
    }

    code = Math.floor(100000 + Math.random()*900000).toString();
    temp = {nick,email,pass};

    emailjs.send("service_tj46uwp","template_aglasg4",{
        from_name:nick,
        code:code,
        reply_to:email
    })
    .then(()=>{
        alert("Код отправлен");
        document.getElementById("codeBox").classList.remove("hidden");
        document.getElementById("finishBtn").classList.remove("hidden");
    })
    .catch(err=>{
        console.log(err);
        alert("Ошибка EmailJS");
    });
}

// ================= FINISH REGISTER =================
function finishRegister(){

    let inputCode = document.getElementById("code").value.trim();

    if(inputCode !== code){
        alert("Неверный код");
        return;
    }

    localStorage.setItem("user_" + temp.nick, JSON.stringify({
        password: temp.pass
    }));

    alert("Аккаунт создан!");
    showLogin();

    document.getElementById("loginNick").value = temp.nick;
}
// ================= LOGIN =================
function login(){

    let nick = document.getElementById("loginNick").value.trim();
    let pass = document.getElementById("loginPass").value.trim();

    let user = localStorage.getItem("user_" + nick);

    if(!user){
        alert("Аккаунт не найден");
        return;
    }

    let data = JSON.parse(user);

    if(data.password !== pass){
        alert("Неверный пароль");
        return;
    }

    localStorage.setItem("currentUser", nick);

    alert("Вход выполнен!");
    window.location.href = "lobby.html";
}

// ================= SWITCH =================
function showLogin(){
    document.getElementById("register").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("title").innerText = "Вход";
}

function back(){
    document.getElementById("register").classList.remove("hidden");
    document.getElementById("login").classList.add("hidden");
    document.getElementById("title").innerText = "Регистрация";
}

</script>

</body>
</html>
