<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#1e1e2f,#3a3a6a);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box {
    width:95%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 30px rgba(108,99,255,0.6);
    text-align:center;
}

.logo {
    display:flex;
    justify-content:center;
}

.logo span {
    font-weight:bold;
    font-size:28px;
    animation:goldBlink 2s infinite;
}
.logo span:nth-child(2){animation-delay:0.3s;}
.logo span:nth-child(3){animation-delay:0.6s;}
.logo span:nth-child(4){animation-delay:0.9s;}
.logo span:nth-child(5){animation-delay:1.2s;}
.logo span:nth-child(6){animation-delay:1.5s;}

@keyframes goldBlink {
    0%,100%{color:white;}
    50%{color:gold;text-shadow:0 0 10px gold;}
}

input {
    width:85%;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    outline:none;
    display:block;
    box-sizing:border-box;
}

button {
    width:85%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#6c63ff,#4a47d1);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.alt {
    background:#444;
}

.hidden { display:none; }

#toastBox{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;
}

.toast{
    padding:12px 18px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    animation:slideIn 0.3s ease;
    box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.success{ background:#4caf50; }
.error{ background:#f44336; }
.info{ background:#6c63ff; }

@keyframes slideIn{
    from{opacity:0; transform:translateX(50px);}
    to{opacity:1; transform:translateX(0);}
}

.small-link {
    margin-top:10px;
    cursor:pointer;
    text-decoration:underline;
    color:#cfcfff;
    font-size:14px;
}

.small-text {
    font-size:13px;
    color:#ddd;
    margin-top:8px;
    line-height:1.4;
}

.step-title {
    margin: 12px 0 6px;
    font-size: 14px;
    color: #e8e8ff;
}

.code-box{
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.14);
    font-family:monospace;
    word-break:break-all;
}
</style>
</head>

<body>

<div class="box">
    <div class="logo">
        <span>F</span><span>-</span><span>M</span><span>i</span><span>n</span><span>e</span>
    </div>

    <h2 id="title">Регистрация</h2>

    <div class="language-select" style="margin-bottom:10px;">
      <button id="btnRU" class="alt" onclick="setLang('RU')" style="width:auto;min-width:74px;">RU</button>
      <button id="btnEN" class="alt" onclick="setLang('EN')" style="width:auto;min-width:74px;">EN</button>
    </div>

    <!-- REGISTER -->
    <div id="register">
        <input id="nick" placeholder="Ник">
        <input id="email" placeholder="Email">
        <input id="passReg" type="password" placeholder="Пароль">

        <button onclick="sendCode()" id="registerBtn">📩 Получить код</button>
        <button class="alt" onclick="showLogin()" id="goLoginBtn">🔵 Войти</button>

        <div id="codeBox" class="hidden">
            <div class="step-title" id="regStepTitle">Введите код из письма</div>
            <input id="code" type="password" placeholder="Код">
          
        </div>

        <button id="finishBtn" class="hidden" onclick="finishRegister()">Создать аккаунт</button>
    </div>

    <!-- LOGIN -->
    <div id="login" class="hidden">
        <input id="loginNick" placeholder="Ник">
        <input id="loginPass" type="password" placeholder="Пароль">

        <button onclick="login()" id="loginBtn">Войти</button>
        <button class="alt" onclick="back()" id="backBtn">Назад</button>

        <div class="small-link" onclick="showForgot()" id="forgotLink">Забыли пароль?</div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgot" class="hidden">
        <div class="step-title" id="fp1">Шаг 1 — введите никнейм</div>
        <input id="forgotNick" placeholder="Ник">

        <div class="step-title" id="fp2">Шаг 2 — введите Gmail</div>
        <input id="forgotEmail" placeholder="Email">

        <button onclick="sendResetCode()" id="sendResetBtn">📩 Получить код</button>

        <div id="resetCodeBox" class="hidden">
            <div class="step-title" id="fp3">Шаг 3 — введите код из письма</div>
            <input id="resetCode" type="password" placeholder="Код из email">
            <div id="resetCodeHint" class="code-box hidden"></div>
            <button onclick="verifyResetCode()" id="verifyResetBtn">✅ Подтвердить код</button>
        </div>

        <div id="newPasswordBox" class="hidden">
            <div class="step-title" id="fp4">Шаг 4 — введите новый пароль</div>
            <input id="newPassword" type="password" placeholder="Новый пароль">
            <button onclick="saveNewPassword()" id="savePassBtn">🔐 Сохранить новый пароль</button>
        </div>

        <button class="alt" onclick="backFromForgot()" id="backForgotBtn">Назад</button>

        <div class="small-text" id="hintText">
            Код проверяется в Firebase, а nickname уже не получится создать второй раз.
        </div>
    </div>
</div>

<div id="toastBox"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  deleteDoc,
  runTransaction
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3mpP7UjMrqbq-X_bmDfBQkZGbwTy6aVc",
  authDomain: "fmine-auth.firebaseapp.com",
  projectId: "fmine-auth",
  storageBucket: "fmine-auth.firebasestorage.app",
  messagingSenderId: "219769927531",
  appId: "1:219769927531:web:fbd45a0876f32927d23e2e",
  measurementId: "G-ETT9HCQRQD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

(function(){
    emailjs.init("Y9LA_RWTTvSW0hk_w");
})();

let lang = localStorage.getItem("fmine_lang") || "RU";

let regState = {
  code: "",
  nick: "",
  email: "",
  password: ""
};

let resetState = {
  code: "",
  nick: "",
  email: "",
  verified: false
};

const UI = {
  RU: {
    titleReg: "Регистрация",
    titleLogin: "Вход",
    titleForgot: "Восстановление пароля",
    nick: "Ник",
    email: "Email",
    pass: "Пароль",
    passNew: "Новый пароль",
    getCode: "📩 Получить код",
    create: "Создать аккаунт",
    login: "Войти",
    back: "Назад",
    forgot: "Забыли пароль?",
    regCodeLabel: "Введите код из письма",
    fp1: "Шаг 1 — введите никнейм",
    fp2: "Шаг 2 — введите Gmail",
    fp3: "Шаг 3 — введите код из письма",
    fp4: "Шаг 4 — введите новый пароль",
    hint: "Код проверяется в Firebase, а одинаковый nickname создать второй раз нельзя.",
    regOk: "Код отправлен. Введи его ниже.",
    regCreated: "Аккаунт создан!",
    loginOk: "Вход выполнен!",
    resetOk: "Код отправлен на email.",
    resetVerified: "Код подтверждён",
    passOk: "Пароль обновлён!",
    mismatchEmail: "Email не совпадает с этим ником",
    error: "Ошибка",
    fillAll: "Заполни все поля",
    fillNickEmail: "Заполни ник и email",
    shortPass: "Пароль слишком короткий",
    notFound: "Аккаунт не найден",
    wrongPass: "Неверный пароль",
    badCode: "Неверный или просроченный код",
    nickEmailBusy: "Ник или email уже заняты",
    codeHint: "Код"
  },
  EN: {
    titleReg: "Registration",
    titleLogin: "Login",
    titleForgot: "Password recovery",
    nick: "Nick",
    email: "Email",
    pass: "Password",
    passNew: "New password",
    getCode: "📩 Get code",
    create: "Create account",
    login: "Login",
    back: "Back",
    forgot: "Forgot password?",
    regCodeLabel: "Enter the code from the email",
    fp1: "Step 1 — enter nickname",
    fp2: "Step 2 — enter Gmail",
    fp3: "Step 3 — enter the code from the email",
    fp4: "Step 4 — enter new password",
    hint: "The code is checked in Firebase, and the same nickname cannot be created twice.",
    regOk: "Code sent. Enter it below.",
    regCreated: "Account created!",
    loginOk: "Login successful!",
    resetOk: "Code sent to email.",
    resetVerified: "Code verified",
    passOk: "Password updated!",
    mismatchEmail: "Email does not match this nickname",
    error: "Error",
    fillAll: "Fill all fields",
    fillNickEmail: "Fill nick and email",
    shortPass: "Password is too short",
    notFound: "Account not found",
    wrongPass: "Wrong password",
    badCode: "Invalid or expired code",
    nickEmailBusy: "Nickname or email already exists",
    codeHint: "Code"
  }
};

function t(key){ return UI[lang][key]; }

function normalizeNick(nick){
  return String(nick || "").trim().toLowerCase();
}

function normalizeEmail(email){
  return String(email || "").trim().toLowerCase();
}

function userDocRef(nick){
  return doc(db, "users", normalizeNick(nick));
}

function emailDocRef(email){
  return doc(db, "emailIndex", normalizeEmail(email));
}

function pendingRegRef(nick){
  return doc(db, "pendingRegistrations", normalizeNick(nick));
}

function pendingResetRef(nick){
  return doc(db, "pendingResets", normalizeNick(nick));
}

async function hashPassword(text){
  const bytes = new TextEncoder().encode(String(text));
  const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

function randomDigits(len){
  let s = "";
  for(let i = 0; i < len; i++) s += Math.floor(Math.random() * 10);
  return s;
}

function showToast(msg, type="info"){
  let box = document.getElementById("toastBox");
  let toast = document.createElement("div");
  toast.className = "toast " + type;
  toast.innerText = msg;
  box.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function showSection(section){
  document.getElementById("register").classList.add("hidden");
  document.getElementById("login").classList.add("hidden");
  document.getElementById("forgot").classList.add("hidden");
  document.getElementById(section).classList.remove("hidden");
}

function applyLangText(){
  document.documentElement.lang = lang === "RU" ? "ru" : "en";
  document.getElementById("btnRU").textContent = "RU";
  document.getElementById("btnEN").textContent = "EN";
  document.getElementById("btnRU").classList.toggle("alt", lang !== "RU");
  document.getElementById("btnEN").classList.toggle("alt", lang !== "EN");

  document.getElementById("nick").placeholder = t("nick");
  document.getElementById("email").placeholder = t("email");
  document.getElementById("passReg").placeholder = t("pass");
  document.getElementById("registerBtn").textContent = t("getCode");
  document.getElementById("goLoginBtn").textContent = lang === "RU" ? "🔵 Войти" : "🔵 Login";
  document.getElementById("regStepTitle").textContent = t("regCodeLabel");
  document.getElementById("code").placeholder = lang === "RU" ? "Код" : "Code";
  document.getElementById("finishBtn").textContent = t("create");

  document.getElementById("loginNick").placeholder = t("nick");
  document.getElementById("loginPass").placeholder = t("pass");
  document.getElementById("loginBtn").textContent = t("login");
  document.getElementById("backBtn").textContent = t("back");
  document.getElementById("forgotLink").textContent = t("forgot");

  document.getElementById("fp1").textContent = t("fp1");
  document.getElementById("fp2").textContent = t("fp2");
  document.getElementById("fp3").textContent = t("fp3");
  document.getElementById("fp4").textContent = t("fp4");
  document.getElementById("forgotNick").placeholder = t("nick");
  document.getElementById("forgotEmail").placeholder = t("email");
  document.getElementById("resetCode").placeholder = lang === "RU" ? "Код из email" : "Code from email";
  document.getElementById("newPassword").placeholder = t("passNew");
  document.getElementById("sendResetBtn").textContent = t("getCode");
  document.getElementById("verifyResetBtn").textContent = lang === "RU" ? "✅ Подтвердить код" : "✅ Verify code";
  document.getElementById("savePassBtn").textContent = lang === "RU" ? "🔐 Сохранить новый пароль" : "🔐 Save new password";
  document.getElementById("backForgotBtn").textContent = t("back");
  document.getElementById("hintText").textContent = t("hint");

  document.getElementById("title").textContent =
    document.getElementById("forgot").classList.contains("hidden")
      ? (document.getElementById("login").classList.contains("hidden") ? t("titleReg") : t("titleLogin"))
      : t("titleForgot");
}

async function postJSON(url, body){
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok || data.ok === false){
    throw new Error(data.error || t("error"));
  }
  return data;
}

function showLogin(){
  showSection("login");
  document.getElementById("title").textContent = t("titleLogin");
}

function back(){
  showSection("register");
  document.getElementById("title").textContent = t("titleReg");
}

function showForgot(){
  showSection("forgot");
  document.getElementById("title").textContent = t("titleForgot");
  document.getElementById("resetCodeBox").classList.add("hidden");
  document.getElementById("newPasswordBox").classList.add("hidden");
  resetState = { code: "", nick: "", email: "", verified: false };
}

function backFromForgot(){
  showSection("login");
  document.getElementById("title").textContent = t("titleLogin");
}

async function sendCode(){
  const nick = document.getElementById("nick").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("passReg").value.trim();

  if(!nick || !email || !password){
    showToast(t("fillAll"), "error");
    return;
  }

  const nickNorm = normalizeNick(nick);
  const emailNorm = normalizeEmail(email);
  const passwordHash = await hashPassword(password);
  const code = randomDigits(6);

  try{
    await runTransaction(db, async (tx) => {
      const [userSnap, emailSnap, pendingNickSnap] = await Promise.all([
        tx.get(userDocRef(nickNorm)),
        tx.get(emailDocRef(emailNorm)),
        tx.get(pendingRegRef(nickNorm))
      ]);

      if(userSnap.exists() || emailSnap.exists() || pendingNickSnap.exists()){
        throw new Error(t("nickEmailBusy"));
      }

      tx.set(pendingRegRef(nickNorm), {
        nick,
        nickNorm,
        email,
        emailNorm,
        passwordHash,
        code,
        expiresAtMs: Date.now() + 10 * 60 * 1000
      });
    });

    try{
      await emailjs.send("service_tj46uwp", "template_aglasg4", {
        from_name: nick,
        code: code,
        reply_to: email
      });
    }catch(emailErr){
      await deleteDoc(pendingRegRef(nickNorm));
      throw emailErr;
    }

    regState = {
      code,
      nick: nickNorm,
      email: emailNorm,
      password
    };

    document.getElementById("codeBox").classList.remove("hidden");
    document.getElementById("finishBtn").classList.remove("hidden");
 
    showToast(t("regOk"), "success");
  }catch(e){
    showToast(e.message || t("error"), "error");
  }
}

async function finishRegister(){
  const inputCode = document.getElementById("code").value.trim();
  const nickNorm = regState.nick;
  const regRef = pendingRegRef(nickNorm);
  const userRef = userDocRef(nickNorm);
  const emailRef = emailDocRef(regState.email);

  if(!inputCode){
    showToast(lang === "RU" ? "Введите код" : "Enter code", "error");
    return;
  }

  try{
    const snap = await getDoc(regRef);
    if(!snap.exists()){
      throw new Error(t("badCode"));
    }

    const data = snap.data();
    if(data.code !== inputCode || data.expiresAtMs < Date.now()){
      throw new Error(t("badCode"));
    }

    await runTransaction(db, async (tx) => {
      const [userSnap, emailSnap] = await Promise.all([
        tx.get(userRef),
        tx.get(emailRef)
      ]);

      if(userSnap.exists() || emailSnap.exists()){
        throw new Error(t("nickEmailBusy"));
      }

      tx.set(userRef, {
        nick: data.nick,
        nickNorm: data.nickNorm,
        email: data.email,
        emailNorm: data.emailNorm,
        passwordHash: data.passwordHash,
        createdAtMs: Date.now()
      });

      tx.set(emailRef, {
        nick: data.nick,
        nickNorm: data.nickNorm
      });

      tx.delete(regRef);
    });

    localStorage.setItem("currentUser", data.nickNorm);
    showToast(t("regCreated"), "success");
    showLogin();
    document.getElementById("loginNick").value = data.nick;
    document.getElementById("loginPass").value = regState.password;
  }catch(e){
    showToast(e.message || t("error"), "error");
  }
}

async function login(){
  const nick = document.getElementById("loginNick").value.trim();
  const password = document.getElementById("loginPass").value.trim();

  if(!nick || !password){
    showToast(t("fillAll"), "error");
    return;
  }

  try{
    const nickNorm = normalizeNick(nick);
    const snap = await getDoc(userDocRef(nickNorm));

    if(!snap.exists()){
      throw new Error(t("notFound"));
    }

    const data = snap.data();
    const passwordHash = await hashPassword(password);

    if(data.passwordHash !== passwordHash){
      throw new Error(t("wrongPass"));
    }

    localStorage.setItem("currentUser", data.nickNorm);
    showToast(t("loginOk"), "success");
    window.location.href = "lobby.html";
  }catch(e){
    showToast(e.message || t("error"), "error");
  }
}

async function sendResetCode(){
  const nick = document.getElementById("forgotNick").value.trim();
  const email = document.getElementById("forgotEmail").value.trim();

  if(!nick || !email){
    showToast(t("fillNickEmail"), "error");
    return;
  }

  const nickNorm = normalizeNick(nick);
  const emailNorm = normalizeEmail(email);
  const resetRef = pendingResetRef(nickNorm);

  try{
    const userSnap = await getDoc(userDocRef(nickNorm));
    if(!userSnap.exists()){
      throw new Error(t("notFound"));
    }

    const user = userSnap.data();
    if(user.emailNorm !== emailNorm){
      throw new Error(t("mismatchEmail"));
    }

    const code = randomDigits(6);

    await runTransaction(db, async (tx) => {
      tx.set(resetRef, {
        nickNorm,
        emailNorm,
        code,
        expiresAtMs: Date.now() + 10 * 60 * 1000
      });
    });

    try{
      await emailjs.send("service_tj46uwp", "template_aglasg4", {
        from_name: nick,
        code: code,
        reply_to: email
      });
    }catch(emailErr){
      await deleteDoc(resetRef);
      throw emailErr;
    }

    resetState = { code, nick: nickNorm, email: emailNorm, verified: false };
    document.getElementById("resetCodeBox").classList.remove("hidden");
    document.getElementById("newPasswordBox").classList.add("hidden");
    document.getElementById("resetCodeHint").classList.remove("hidden");
    document.getElementById("resetCodeHint").textContent = `${t("codeHint")}: ${code}`;
    showToast(t("resetOk"), "success");
  }catch(e){
    showToast(e.message || t("error"), "error");
  }
}

async function verifyResetCode(){
  const code = document.getElementById("resetCode").value.trim();
  const resetRef = pendingResetRef(resetState.nick);

  if(!code){
    showToast(lang === "RU" ? "Введите код" : "Enter code", "error");
    return;
  }

  try{
    const snap = await getDoc(resetRef);
    if(!snap.exists()){
      throw new Error(t("badCode"));
    }

    const data = snap.data();
    if(data.code !== code || data.expiresAtMs < Date.now()){
      throw new Error(t("badCode"));
    }

    resetState.verified = true;
    resetState.code = code;
    document.getElementById("newPasswordBox").classList.remove("hidden");
    showToast(t("resetVerified"), "success");
  }catch(e){
    showToast(e.message || t("error"), "error");
  }
}

async function saveNewPassword(){
  const newPassword = document.getElementById("newPassword").value.trim();

  if(!resetState.verified){
    showToast(lang === "RU" ? "Сначала подтвердите код" : "Verify the code first", "error");
    return;
  }

  if(!newPassword || newPassword.length < 4){
    showToast(t("shortPass"), "error");
    return;
  }

  try{
    const userRef = userDocRef(resetState.nick);
    const resetRef = pendingResetRef(resetState.nick);
    const newHash = await hashPassword(newPassword);

    const snap = await getDoc(userRef);
    if(!snap.exists()){
      throw new Error(t("notFound"));
    }

    await setDoc(userRef, { passwordHash: newHash }, { merge: true });
    await deleteDoc(resetRef);

    showToast(t("passOk"), "success");
    showLogin();
    document.getElementById("loginNick").value = snap.data().nick || resetState.nick;
    document.getElementById("loginPass").value = newPassword;
  }catch(e){
    showToast(e.message || t("error"), "error");
  }
}

window.setLang = (l) => {
  lang = l;
  localStorage.setItem("fmine_lang", lang);
  applyLangText();
  showToast(lang === "RU" ? "Язык изменён" : "Language changed", "info");
};

window.sendCode = sendCode;
window.finishRegister = finishRegister;
window.login = login;
window.showLogin = showLogin;
window.back = back;
window.showForgot = showForgot;
window.backFromForgot = backFromForgot;
window.sendResetCode = sendResetCode;
window.verifyResetCode = verifyResetCode;
window.saveNewPassword = saveNewPassword;

applyLangText();
showSection("register");
document.getElementById("title").textContent = t("titleReg");
</script>
</body>
</html>
