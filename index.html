<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#1e1e2f,#3a3a6a);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box {
    width:95%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 30px rgba(108,99,255,0.6);
    text-align:center;
}

.logo span {
    font-weight:bold;
    font-size:28px;
    animation:goldBlink 2s infinite;
}
.logo span:nth-child(2){animation-delay:0.3s;}
.logo span:nth-child(3){animation-delay:0.6s;}
.logo span:nth-child(4){animation-delay:0.9s;}
.logo span:nth-child(5){animation-delay:1.2s;}
.logo span:nth-child(6){animation-delay:1.5s;}

@keyframes goldBlink {
    0%,100%{color:white;}
    50%{color:gold;text-shadow:0 0 10px gold;}
}

input {
    width:85%;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    outline:none;
    display:block;
    box-sizing:border-box;
}

button {
    width:85%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#6c63ff,#4a47d1);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.alt {
    background:#444;
}

.hidden { display:none; }

#toastBox{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;
}

.toast{
    padding:12px 18px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    animation:slideIn 0.3s ease;
}

.success{ background:#4caf50; }
.error{ background:#f44336; }
.info{ background:#6c63ff; }

@keyframes slideIn{
    from{opacity:0; transform:translateX(50px);}
    to{opacity:1; transform:translateX(0);}
}

.small-link {
    margin-top:10px;
    cursor:pointer;
    text-decoration:underline;
    color:#cfcfff;
    font-size:14px;
}

.small-text {
    font-size:13px;
    color:#ddd;
    margin-top:8px;
    line-height:1.4;
}

.step-title {
    margin: 12px 0 6px;
    font-size: 14px;
    color: #e8e8ff;
}
</style>
</head>

<body>

<div class="box">

    <div class="logo">
        <span>F</span><span>-</span><span>M</span><span>i</span><span>n</span><span>e</span>
    </div>

    <h2 id="title">Регистрация</h2>

    <!-- REGISTER -->
    <div id="register">
        <input id="nick" placeholder="Ник">
        <input id="email" placeholder="Email">
        <input id="passReg" type="password" placeholder="Пароль">

        <button onclick="sendCode()">📩 Получить код</button>
        <button class="alt" onclick="showLogin()">🔵 Войти</button>

        <div id="codeBox" class="hidden">
            <div class="step-title">Введите код из письма</div>
            <input id="code" type="password" placeholder="Код">
        </div>

        <button id="finishBtn" class="hidden" onclick="finishRegister()">Создать аккаунт</button>
    </div>

    <!-- LOGIN -->
    <div id="login" class="hidden">
        <input id="loginNick" placeholder="Ник">
        <input id="loginPass" type="password" placeholder="Пароль">

        <button onclick="login()">Войти</button>
        <button class="alt" onclick="back()">Назад</button>

        <div class="small-link" onclick="showForgot()">Забыли пароль?</div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgot" class="hidden">
        <div class="step-title">Шаг 1 — введите никнейм</div>
        <input id="forgotNick" placeholder="Ник">

        <div class="step-title">Шаг 2 — введите Gmail</div>
        <input id="forgotEmail" placeholder="Email">

        <button onclick="sendResetCode()">📩 Получить код</button>

        <div id="resetCodeBox" class="hidden">
            <div class="step-title">Шаг 3 — введите код из письма</div>
            <input id="resetCode" type="password" placeholder="Код из email">
            <button onclick="verifyResetCode()">✅ Подтвердить код</button>
        </div>

        <div id="newPasswordBox" class="hidden">
            <div class="step-title">Шаг 4 — введите новый пароль</div>
            <input id="newPassword" type="password" placeholder="Новый пароль">
            <button onclick="saveNewPassword()">🔐 Сохранить новый пароль</button>
        </div>

        <button class="alt" onclick="backFromForgot()">Назад</button>

        <div class="small-text">
            Код отправится только на тот email, который был привязан к этому нику при регистрации.
        </div>
    </div>

</div>

<div id="toastBox"></div>

<script>
(function(){
    emailjs.init("Y9LA_RWTTvSW0hk_w");
})();

let code = "";
let temp = null;

let resetNick = "";
let resetEmail = "";
let resetCode = "";
let resetVerified = false;

// =====================
// HELPERS
// =====================
function getUserKey(nick) {
    return "user_" + nick;
}

function showToast(msg, type="info"){
    let box = document.getElementById("toastBox");

    let toast = document.createElement("div");
    toast.className = "toast " + type;
    toast.innerText = msg;

    box.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}

function showSection(section) {
    document.getElementById("register").classList.add("hidden");
    document.getElementById("login").classList.add("hidden");
    document.getElementById("forgot").classList.add("hidden");
    document.getElementById(section).classList.remove("hidden");
}

function saveEmailIndex(email, nick) {
    let index = JSON.parse(localStorage.getItem("emailIndex")) || {};
    index[email.toLowerCase()] = nick;
    localStorage.setItem("emailIndex", JSON.stringify(index));
}

function findNickByEmail(email) {
    email = email.trim().toLowerCase();

    let index = JSON.parse(localStorage.getItem("emailIndex")) || {};
    if (index[email]) return index[email];

    for (let key in localStorage) {
        if (!key.startsWith("user_")) continue;
        try {
            let data = JSON.parse(localStorage.getItem(key));
            if (data && data.email && data.email.toLowerCase() === email) {
                return key.replace("user_", "");
            }
        } catch (e) {}
    }

    return null;
}

function getUserByNick(nick) {
    const raw = localStorage.getItem(getUserKey(nick));
    if (!raw) return null;
    try {
        return JSON.parse(raw);
    } catch {
        return null;
    }
}

function sendEmailTemplate(data) {
    return emailjs.send("service_tj46uwp", "template_aglasg4", data);
}

function randomDigits(len) {
    let s = "";
    for (let i = 0; i < len; i++) s += Math.floor(Math.random() * 10);
    return s;
}

// =====================
// REGISTER
// =====================
function sendCode(){
    let nick = document.getElementById("nick").value.trim();
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("passReg").value.trim();

    if(!nick || !email || !pass){
        showToast("Заполни все поля", "error");
        return;
    }

    if(localStorage.getItem(getUserKey(nick))){
        showToast("Этот ник уже занят", "error");
        return;
    }

    code = randomDigits(6);
    temp = { nick, email, pass };

    sendEmailTemplate({
        nick: nick,
        from_name: nick,
        reply_to: email,
        code: code,
        password: "",
        new_password: "",
        recovery_code: ""
    })
    .then(() => {
        showToast("Код отправлен", "success");
        document.getElementById("codeBox").classList.remove("hidden");
        document.getElementById("finishBtn").classList.remove("hidden");
    })
    .catch(err => {
        console.log(err);
        showToast("Ошибка EmailJS", "error");
    });
}

function finishRegister(){
    let inputCode = document.getElementById("code").value.trim();

    if(inputCode !== code){
        showToast("Неверный код", "error");
        return;
    }

    localStorage.setItem(getUserKey(temp.nick), JSON.stringify({
        password: temp.pass,
        email: temp.email
    }));

    saveEmailIndex(temp.email, temp.nick);
    localStorage.setItem("lastEmail", temp.email);
    localStorage.setItem("lastNick", temp.nick);

    showToast("Аккаунт создан!", "success");
    showLogin();

    document.getElementById("loginNick").value = temp.nick;
    document.getElementById("loginPass").value = temp.pass;
}

// =====================
// LOGIN
// =====================
function login(){
    let nick = document.getElementById("loginNick").value.trim();
    let pass = document.getElementById("loginPass").value.trim();

    let user = localStorage.getItem(getUserKey(nick));

    if(!user){
        showToast("Аккаунт не найден", "error");
        return;
    }

    let data = JSON.parse(user);

    if(data.password !== pass){
        showToast("Неверный пароль", "error");
        return;
    }

    localStorage.setItem("currentUser", nick);

    if(data.email) {
        localStorage.setItem("lastEmail", data.email);
        localStorage.setItem("lastNick", nick);
    }

    showToast("Вход выполнен!", "success");
    window.location.href = "lobby.html";
}

// =====================
// FORGOT PASSWORD FLOW
// =====================
function showForgot(){
    showSection("forgot");
    document.getElementById("title").innerText = "Восстановление пароля";

    const lastEmail = localStorage.getItem("lastEmail") || "";
    const lastNick = localStorage.getItem("lastNick") || "";

    document.getElementById("forgotEmail").value = lastEmail;
    document.getElementById("forgotNick").value = lastNick;

    document.getElementById("resetCodeBox").classList.add("hidden");
    document.getElementById("newPasswordBox").classList.add("hidden");

    resetNick = "";
    resetEmail = "";
    resetCode = "";
    resetVerified = false;
}

function backFromForgot(){
    showSection("login");
    document.getElementById("title").innerText = "Вход";
}

function sendResetCode(){
    let nick = document.getElementById("forgotNick").value.trim();
    let email = document.getElementById("forgotEmail").value.trim();

    if(!nick){
        showToast("Введите никнейм", "error");
        return;
    }

    if(!email){
        showToast("Введите email", "error");
        return;
    }

    const user = getUserByNick(nick);
    if(!user){
        showToast("Аккаунт с таким ником не найден", "error");
        return;
    }

    if(!user.email || user.email.toLowerCase() !== email.toLowerCase()){
        showToast("Этот email не совпадает с email этого аккаунта", "error");
        return;
    }

    resetNick = nick;
    resetEmail = email;
    resetCode = randomDigits(6);
    resetVerified = false;

    sendEmailTemplate({
        nick: nick,
        from_name: nick,
        reply_to: email,
        code: resetCode,
        password: "",
        new_password: "",
        recovery_code: ""
    })
    .then(() => {
        showToast("Код отправлен на email", "success");
        document.getElementById("resetCodeBox").classList.remove("hidden");
    })
    .catch(err => {
        console.log(err);
        showToast("Не удалось отправить код", "error");
    });
}

function verifyResetCode(){
    let inputCode = document.getElementById("resetCode").value.trim();

    if(!inputCode){
        showToast("Введите код", "error");
        return;
    }

    if(inputCode !== resetCode){
        showToast("Неверный код", "error");
        return;
    }

    resetVerified = true;
    document.getElementById("newPasswordBox").classList.remove("hidden");
    showToast("Код подтверждён", "success");
}

function saveNewPassword(){
    if(!resetVerified){
        showToast("Сначала подтвердите код", "error");
        return;
    }

    let newPass = document.getElementById("newPassword").value.trim();

    if(!newPass || newPass.length < 4){
        showToast("Пароль слишком короткий", "error");
        return;
    }

    const userKey = getUserKey(resetNick);
    let user = getUserByNick(resetNick);

    if(!user){
        showToast("Аккаунт не найден", "error");
        return;
    }

    user.password = newPass;
    localStorage.setItem(userKey, JSON.stringify(user));

    localStorage.setItem("lastEmail", resetEmail);
    localStorage.setItem("lastNick", resetNick);

    showToast("Пароль обновлён!", "success");

    showLogin();
    document.getElementById("loginNick").value = resetNick;
    document.getElementById("loginPass").value = newPass;

    resetNick = "";
    resetEmail = "";
    resetCode = "";
    resetVerified = false;
    document.getElementById("resetCode").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("resetCodeBox").classList.add("hidden");
    document.getElementById("newPasswordBox").classList.add("hidden");
}

// =====================
// SWITCH
// =====================
function showLogin(){
    showSection("login");
    document.getElementById("title").innerText = "Вход";
}

function back(){
    showSection("register");
    document.getElementById("title").innerText = "Регистрация";
}
</script>

</body>
</html>
