<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Физика</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root{--bg:#f4f6fb;--surface:#fff;--surface2:#f8f9fe;--surface3:#eef0f7;--border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);--indigo:#6366f1;--indigo2:#4f46e5;--text:#1e2235;--muted:#7b7fa0;--danger:#f43f5e;--green:#22c55e;--cyan:#06b6d4;--gold:#f59e0b;--radius:16px;--shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);--shadow:0 4px 14px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.03);--shadow-lg:0 10px 40px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);--shadow-xl:0 20px 60px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.05)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(99,102,241,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(6,182,212,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.82);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.logo{font-weight:800;font-size:20px;letter-spacing:-.5px;cursor:pointer}
.logo-f{background:linear-gradient(135deg,var(--indigo),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-rest{color:var(--text)}
.header-nav{display:flex;gap:8px;align-items:center}
.nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover{border-color:var(--indigo);color:var(--indigo);background:rgba(99,102,241,.04)}
.nav-btn.active{background:var(--indigo);color:white;border-color:var(--indigo);box-shadow:0 2px 10px rgba(99,102,241,.3)}
.view{display:none;position:relative;z-index:1;min-height:calc(100vh - 54px)}
.view.active{display:block}
#gradeView{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px}
.grade-title{font-size:36px;font-weight:800;margin-bottom:8px;text-align:center;color:var(--text)}
.grade-sub{color:var(--muted);font-size:15px;margin-bottom:40px;text-align:center}
.grade-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;max-width:600px;width:100%}
.grade-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 16px;text-align:center;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.grade-card:hover{border-color:var(--indigo);transform:translateY(-4px);box-shadow:var(--shadow-lg),0 0 0 1px rgba(99,102,241,.1)}
.grade-card .grade-num{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--indigo),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.grade-card .grade-label{font-size:13px;color:var(--muted);margin-top:4px}
.grade-card .grade-badge{position:absolute;top:10px;right:10px;background:var(--indigo);color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
#topicView{padding:30px 24px;max-width:900px;margin:0 auto}
.topic-head{margin-bottom:28px}
.topic-head h1{font-size:28px;font-weight:800;margin-bottom:4px}
.topic-head p{color:var(--muted);font-size:14px}
.topic-progress-bar{height:6px;background:var(--surface3);border-radius:6px;margin-top:14px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.04)}
.topic-progress-fill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--cyan));border-radius:6px;transition:width .4s;box-shadow:0 1px 4px rgba(99,102,241,.3)}
.topic-list{display:flex;flex-direction:column;gap:10px}
.topic-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .2s ease;box-shadow:var(--shadow-sm)}
.topic-card:hover{border-color:var(--indigo);background:rgba(99,102,241,.03);box-shadow:var(--shadow);transform:translateX(3px)}
.topic-card.done{border-color:rgba(34,197,94,.3)}
.topic-num{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--muted);transition:all .2s}
.topic-card.done .topic-num{background:rgba(34,197,94,.1);color:var(--green)}
.topic-card:hover .topic-num{background:rgba(99,102,241,.1);color:var(--indigo)}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:14px;font-weight:600}
.topic-arrow{color:var(--muted);font-size:16px;flex-shrink:0;transition:transform .2s}
.topic-card:hover .topic-arrow{transform:translateX(3px);color:var(--indigo)}
#lessonView.active{display:flex;height:calc(100vh - 54px)}
.lesson-back{position:fixed;top:64px;left:16px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;display:none;box-shadow:var(--shadow)}
.lesson-theory{flex:1;overflow-y:auto;padding:28px 32px 120px;border-right:1px solid var(--border)}
.lesson-practice{width:380px;flex-shrink:0;overflow-y:auto;padding:24px 20px 120px;background:var(--surface)}
.theory-section{margin-bottom:28px}
.theory-section h2{font-size:18px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.theory-section h2 .section-icon{font-size:20px}
.theory-section h3{font-size:15px;font-weight:600;margin:16px 0 8px;color:var(--indigo)}
.theory-section p,.theory-section li{font-size:14px;line-height:1.7;color:#4a4e6a}
.theory-section ul{padding-left:20px;margin:8px 0}
.theory-section li{margin-bottom:4px}
.theory-section .highlight-box{background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.12);border-radius:12px;padding:14px 18px;margin:12px 0;box-shadow:var(--shadow-sm)}
.theory-section .highlight-box.green{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.12)}
.theory-section .highlight-box.gold{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.12)}
.formula-block{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin:10px 0;text-align:center;font-size:18px;overflow-x:auto;box-shadow:var(--shadow-sm)}
.example-block{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin:12px 0;box-shadow:var(--shadow-sm)}
.example-block .step{display:flex;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.7}
.example-block .step-num{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:var(--indigo);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;box-shadow:0 2px 6px rgba(99,102,241,.3)}
.example-block .step-rule{color:var(--gold);font-size:11px;font-weight:600;display:block;margin-top:2px}
.context-box{background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(6,182,212,.04));border:1px solid rgba(99,102,241,.12);border-radius:var(--radius);padding:18px 20px;margin-bottom:24px;box-shadow:var(--shadow-sm)}
.context-box h3{font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.context-box p{font-size:14px;line-height:1.7;color:#4a4e6a}
.practice-head{margin-bottom:16px}
.practice-head h2{font-size:18px;font-weight:700;margin-bottom:4px}
.practice-head p{font-size:12px;color:var(--muted)}
.practice-stats{display:flex;gap:8px;margin-bottom:16px}
.stat-chip{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center;box-shadow:var(--shadow-sm)}
.stat-chip .stat-val{font-size:20px;font-weight:800}
.stat-chip .stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.stat-chip.correct .stat-val{color:var(--green)}
.stat-chip.wrong .stat-val{color:var(--danger)}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.task-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.task-formula{font-size:20px;text-align:center;padding:14px;background:var(--surface2);border-radius:12px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;min-height:50px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.task-input-row{display:flex;gap:8px}
.task-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;outline:none;text-align:center;transition:all .2s}
.task-input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.task-input.correct{border-color:var(--green);background:rgba(34,197,94,.05)}
.task-input.wrong{border-color:var(--danger);background:rgba(244,63,94,.05)}
.check-btn{background:var(--indigo);color:white;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.check-btn:hover{background:var(--indigo2);box-shadow:0 4px 14px rgba(99,102,241,.4);transform:translateY(-1px)}
.check-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.next-btn{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;margin-top:8px;display:none;box-shadow:var(--shadow-sm)}
.next-btn:hover{border-color:var(--indigo);color:var(--indigo);box-shadow:var(--shadow)}
.task-feedback{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6;display:none}
.task-feedback.correct{display:block;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:#16a34a}
.task-feedback.wrong{display:block;background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.15);color:var(--danger)}
.task-solution{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}
.task-type-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.task-type-tab{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s}
.task-type-tab.active{background:var(--indigo);color:white;border-color:var(--indigo);box-shadow:0 2px 8px rgba(99,102,241,.25)}
.task-type-tab:hover:not(.active){border-color:var(--indigo);color:var(--indigo);background:rgba(99,102,241,.03)}
.hint-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--gold);cursor:pointer;font-family:inherit;margin-top:8px;display:none;transition:all .12s}
.hint-btn:hover{border-color:var(--gold);background:rgba(245,158,11,.04)}
.hint-text{display:none;margin-top:8px;padding:10px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.12);border-radius:10px;font-size:12px;color:#b45309;line-height:1.6}
.ai-fab{position:fixed;bottom:24px;right:24px;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--cyan));border:none;color:white;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.35),0 2px 4px rgba(0,0,0,.1);transition:transform .2s,box-shadow .2s;display:none;align-items:center;justify-content:center}
.ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(99,102,241,.45),0 2px 6px rgba(0,0,0,.12)}
#lessonView.active ~ .ai-fab{display:flex}
.ai-panel{display:none;position:fixed;bottom:88px;right:24px;z-index:199;width:min(380px,calc(100vw - 40px));height:460px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);flex-direction:column;box-shadow:var(--shadow-xl);animation:slideUp .25s ease}
.ai-panel.open{display:flex}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.ai-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-head-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.4)}
.ai-head span{font-size:13px;font-weight:600;flex:1}
.ai-close{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6}
.ai-msg.user{align-self:flex-end;background:var(--indigo);color:white;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.ai-msg.bot{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm)}
.ai-typing{display:flex;gap:4px;padding:10px 14px}
.ai-typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:aiDot 1.2s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aiDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.ai-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:all .2s}
.ai-input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.ai-send{background:var(--indigo);color:white;border:none;border-radius:10px;width:38px;height:38px;font-size:15px;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.3);transition:all .15s}
.ai-send:hover{background:var(--indigo2);box-shadow:0 4px 12px rgba(99,102,241,.4)}
.ai-send:disabled{opacity:.4}
.ai-quick-btns{display:flex;gap:4px;padding:0 12px 8px;flex-wrap:wrap}
.ai-quick-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:10px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s}
.ai-quick-btn:hover{border-color:var(--indigo);color:var(--indigo);background:rgba(99,102,241,.03)}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:8px 18px;font-size:12px;font-weight:600;color:var(--text);opacity:0;pointer-events:none;transition:opacity .2s,bottom .2s;z-index:300;white-space:nowrap;box-shadow:var(--shadow-lg)}
#toast.show{opacity:1;bottom:100px}
@media(max-width:800px){#lessonView.active{flex-direction:column}.lesson-theory{border-right:none;border-bottom:1px solid var(--border);max-height:none;padding-bottom:20px}.lesson-practice{width:100%;padding-bottom:20px}.ai-panel{width:calc(100vw - 32px);right:16px;bottom:80px;height:380px}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d4d6e3;border-radius:6px}::-webkit-scrollbar-thumb:hover{background:#b8bac8}
.katex{font-size:inherit}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showGrades()"><span class="logo-f">F</span><span class="logo-rest">-Mine Физика</span></div>
  <div class="header-nav" id="headerNav"></div>
</header>

<div id="gradeView" class="view active">
  <div class="grade-title">Физика</div>
  <div class="grade-sub">Выбери свой класс, чтобы начать</div>
  <div class="grade-grid" id="gradeGrid"></div>
</div>

<div id="topicView" class="view"></div>
<div id="lessonView" class="view"></div>
<button class="lesson-back" id="lessonBack" onclick="goBack()">← Назад</button>

<button class="ai-fab" id="aiFab" onclick="toggleAi()">🤖</button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-head">
    <div class="ai-head-dot"></div>
    <span>F-Mine AI Помощник</span>
    <button class="ai-close" onclick="toggleAi()">✕</button>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="ai-msg bot">Привет! Я помогу с задачами по физике. Спроси что угодно 🧠</div>
  </div>
  <div class="ai-quick-btns" id="aiQuickBtns">
    <button class="ai-quick-btn" onclick="askAi('Объясни последний пример')">💡 Объясни пример</button>
    <button class="ai-quick-btn" onclick="askAi('Дай подсказку к текущей задаче')">🎯 Подсказка</button>
    <button class="ai-quick-btn" onclick="askAi('Покажи ещё один пример')">📝 Ещё пример</button>
  </div>
  <div class="ai-input-row">
    <input class="ai-input" id="aiInput" placeholder="Задай вопрос..." onkeydown="if(event.key==='Enter')sendAi()" />
    <button class="ai-send" onclick="sendAi()">→</button>
  </div>
</div>

<div id="toast"></div>

<script src="physics-lessons.js"></script>
<script>
const GRADES=[
  {id:7,label:'7 класс',badge:'Механика'},
  {id:8,label:'8 класс',badge:'Электричество'}
];
const TOPICS={
  7:[
    {id:'7.1',name:'Механическое движение. Скорость',icon:'🏃'},
    {id:'7.2',name:'Ускорение. Равноускоренное движение',icon:'📈'},
    {id:'7.3',name:'Свободное падение',icon:'🍎'},
    {id:'7.4',name:'Сила. Ньютон',icon:'💪'},
    {id:'7.5',name:'Второй и третий законы Ньютона',icon:'⚖️'},
    {id:'7.6',name:'Закон всемирного тяготения',icon:'🌍'},
    {id:'7.7',name:'Импульс. Закон сохранения',icon:'💥'},
    {id:'7.8',name:'Работа и мощность',icon:'⚡'},
    {id:'7.9',name:'Кинетическая и потенциальная энергия',icon:'🔋'},
    {id:'7.10',name:'Простые механизмы',icon:'⚙️'}
  ],
  8:[
    {id:'8.1',name:'Давление твёрдых тел',icon:'🪨'},
    {id:'8.2',name:'Давление жидкостей и газов',icon:'💧'},
    {id:'8.3',name:'Атмосферное давление',icon:'🌬️'},
    {id:'8.4',name:'Сила Архимеда',icon:'🏊'},
    {id:'8.5',name:'Температура и теплота',icon:'🌡️'},
    {id:'8.6',name:'Внутренняя энергия. КПД',icon:'🔥'},
    {id:'8.7',name:'Электрический ток. Сила тока',icon:'🔌'},
    {id:'8.8',name:'Напряжение и сопротивление',icon:'⚡'},
    {id:'8.9',name:'Закон Ома',icon:'📊'},
    {id:'8.10',name:'Электрическая мощность и энергия',icon:'💡'}
  ]
};

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function round2(v){return Math.round(v*100)/100}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function renderKatex(el){if(typeof renderMathInElement==='function')renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})}

let currentGrade=null,currentTopic=null,currentTaskType=0,stats={correct:0,wrong:0,streak:0},currentTask=null,aiOpen=false,aiHistory=[];

function showView(id){document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.style.display='none'});const t=document.getElementById(id);t.classList.add('active');t.style.display=''}
function showGrades(){currentGrade=null;currentTopic=null;document.getElementById('lessonBack').style.display='none';document.getElementById('aiFab').style.display='none';document.getElementById('aiPanel').classList.remove('open');document.getElementById('headerNav').innerHTML='';showView('gradeView')}
function showTopics(gid){
  currentGrade=gid;const topics=TOPICS[gid]||[];
  const completed=JSON.parse(localStorage.getItem('fmine_phys_topics')||'[]');
  const done=topics.filter(t=>completed.includes(t.id)).length;
  const pct=topics.length?Math.round(done/topics.length*100):0;
  document.getElementById('topicView').innerHTML=`
    <div class="topic-head"><h1>${gid} класс — Физика</h1><p>${topics.length} тем · Выполнено: ${done}/${topics.length}</p>
    <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:${pct}%"></div></div></div>
    <div class="topic-list">${topics.map((t,i)=>`<div class="topic-card ${completed.includes(t.id)?'done':''}" onclick="openLesson('${t.id}')"><div class="topic-num">${completed.includes(t.id)?'✓':i+1}</div><div class="topic-info"><div class="topic-name">${t.icon} ${t.name}</div></div><div class="topic-arrow">›</div></div>`).join('')}</div>`;
  showView('topicView');
  document.getElementById('headerNav').innerHTML=`<button class="nav-btn" onclick="showGrades()">← Классы</button>`;
}
function openLesson(tid){
  currentTopic=tid;const lesson=LESSONS[tid];
  if(!lesson){showToast('⚠️ Тема в разработке');return}
  stats={correct:0,wrong:0,streak:0};renderLesson(lesson);showView('lessonView');
  document.getElementById('lessonBack').style.display='';
  document.getElementById('aiFab').style.display='flex';
  document.getElementById('headerNav').innerHTML=`<button class="nav-btn" onclick="showTopics(${currentGrade})">← Темы</button><button class="nav-btn active">${TOPICS[currentGrade]?.find(t=>t.id===tid)?.icon||'📐'} ${lesson.title.slice(0,30)}...</button>`;
}
function goBack(){if(currentTopic){showTopics(currentGrade)}else{showGrades()}}

function renderLesson(lesson){
  const el=document.getElementById('lessonView');
  let th=`<div class="context-box"><h3>🌍 Контекст</h3><p>${lesson.context}</p></div>`;
  lesson.theory.forEach(s=>{th+=`<div class="theory-section"><h2><span class="section-icon">${s.icon}</span> ${s.title}</h2>${s.html}</div>`});
  th+=`<div class="theory-section"><h2><span class="section-icon">📝</span> Разбор примеров</h2>`;
  lesson.examples.forEach(ex=>{th+=`<div class="example-block"><h3>${ex.title}</h3>`;ex.steps.forEach((st,j)=>{th+=`<div class="step"><div class="step-num">${j+1}</div><div>${st.text}<span class="step-rule">${st.rule}</span></div></div>`});th+=`</div>`});
  th+=`</div>`;
  let pr=`<div class="practice-head"><h2>🎯 Практика</h2><p>Решай задачи и проверяй ответ</p></div>
    <div class="practice-stats"><div class="stat-chip correct"><div class="stat-val" id="statCorrect">0</div><div class="stat-label">Верно</div></div><div class="stat-chip wrong"><div class="stat-val" id="statWrong">0</div><div class="stat-label">Ошибки</div></div><div class="stat-chip"><div class="stat-val" id="statStreak">0</div><div class="stat-label">Серия</div></div></div>
    <div class="task-type-tabs" id="taskTypeTabs">${lesson.taskTypes.map((tt,i)=>`<button class="task-type-tab ${i===0?'active':''}" onclick="switchTaskType(${i})">${tt.icon} ${tt.name}</button>`).join('')}</div>
    <div id="taskArea"></div>`;
  el.innerHTML=`<div class="lesson-theory">${th}</div><div class="lesson-practice">${pr}</div>`;
  setTimeout(()=>{renderKatex(el);generateTask()},100);
}

function switchTaskType(i){currentTaskType=i;document.querySelectorAll('.task-type-tab').forEach((t,j)=>t.classList.toggle('active',j===i));generateTask()}
function generateTask(){
  const lesson=LESSONS[currentTopic];if(!lesson)return;
  const tt=lesson.taskTypes[currentTaskType];const params=tt.generate();
  currentTask={...tt.template(...Object.values(params)),typeIdx:currentTaskType};
  const area=document.getElementById('taskArea');
  area.innerHTML=`<div class="task-card"><div class="task-label">Задача</div><div class="task-formula" id="taskFormula">${currentTask.text}</div><div class="task-input-row"><input class="task-input" id="taskInput" type="text" placeholder="Ответ..." onkeydown="if(event.key==='Enter')checkAnswer()" autofocus /><button class="check-btn" id="checkBtn" onclick="checkAnswer()">Проверить</button></div><button class="hint-btn" id="hintBtn" onclick="showHint()">💡 Подсказка</button><div class="hint-text" id="hintText"></div><div class="task-feedback" id="taskFeedback"></div><button class="next-btn" id="nextBtn" onclick="generateTask()">Следующая задача →</button></div>`;
  setTimeout(()=>{renderKatex(area);document.getElementById('taskInput')?.focus()},50);
}
function checkAnswer(){
  const input=document.getElementById('taskInput');const val=input.value.trim().replace(/\s/g,'');if(!val)return;
  const correct=String(currentTask.answer);const ok=val===correct;
  input.classList.remove('correct','wrong');input.classList.add(ok?'correct':'wrong');input.disabled=true;document.getElementById('checkBtn').disabled=true;
  const fb=document.getElementById('taskFeedback');
  if(ok){stats.correct++;stats.streak++;fb.className='task-feedback correct';fb.innerHTML=`✅ Верно! ${stats.streak>2?`🔥 Серия: ${stats.streak}`:''}`}
  else{stats.wrong++;stats.streak=0;fb.className='task-feedback wrong';fb.innerHTML=`❌ Неверно. Правильный ответ: <b>${currentTask.answer}</b><div class="task-solution">${currentTask.solution}</div>`}
  document.getElementById('statCorrect').textContent=stats.correct;document.getElementById('statWrong').textContent=stats.wrong;document.getElementById('statStreak').textContent=stats.streak;
  document.getElementById('nextBtn').style.display='';document.getElementById('hintBtn').style.display='none';
}
function showHint(){const ht=document.getElementById('hintText');ht.style.display='block';ht.textContent='💡 '+currentTask.hint}

function toggleAi(){aiOpen=!aiOpen;document.getElementById('aiPanel').classList.toggle('open',aiOpen);if(aiOpen)document.getElementById('aiInput').focus()}
async function askAi(text){
  addAiMsg(text,'user');showAiTyping();
  try{const lesson=LESSONS[currentTopic];const ctx=lesson?`Текущая тема: ${lesson.title}. Задача: ${currentTask?.text||'нет'}. Ответ: ${currentTask?.answer||'?'}`:'Физика';
  const r=await fetch('https://my-education-site-f-mine-production.up.railway.app/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:`Ты — репетитор по физике. Отвечай кратко. Используй LaTeX ($...$). ${ctx}`},...aiHistory.slice(-6),{role:'user',content:text}]})});
  const d=await r.json();removeAiTyping();addAiMsg(d.reply||d.error||'Не могу ответить','bot');aiHistory.push({role:'user',content:text});aiHistory.push({role:'assistant',content:d.reply||''})}
  catch(e){removeAiTyping();addAiMsg('❌ Ошибка соединения с AI','bot')}
}
function sendAi(){const i=document.getElementById('aiInput');const v=i.value.trim();if(!v)return;i.value='';askAi(v)}
function addAiMsg(text,role){const c=document.getElementById('aiMessages');const d=document.createElement('div');d.className=`ai-msg ${role}`;d.innerHTML=text;c.appendChild(d);c.scrollTop=c.scrollHeight;setTimeout(()=>renderKatex(d),50)}
function showAiTyping(){const c=document.getElementById('aiMessages');const d=document.createElement('div');d.className='ai-typing';d.id='aiTyping';d.innerHTML='<span></span><span></span><span></span>';c.appendChild(d);c.scrollTop=c.scrollHeight}
function removeAiTyping(){document.getElementById('aiTyping')?.remove()}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('gradeGrid').innerHTML=GRADES.map(g=>`<div class="grade-card" onclick="showTopics(${g.id})"><div class="grade-badge">${g.badge}</div><div class="grade-num">${g.id}</div><div class="grade-label">${g.label}</div></div>`).join('');
});
</script>
</body>
</html>
