<!DOCTYPE html>
<html>
<body>
<h2>Test Page</h2>
<div id="out">Loading...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
document.getElementById('out').textContent = 'Chess loaded: ' + (typeof Chess);
fetch('/api/puzzle/random?level=easy')
  .then(r => r.json())
  .then(d => {
    document.getElementById('out').textContent += ' | Puzzle: ' + d.id + ' ' + d.fen.slice(0,20);
    const g = new Chess(d.fen);
    document.getElementById('out').textContent += ' | Game OK, turn=' + g.turn();
  })
  .catch(e => {
    document.getElementById('out').textContent = 'ERROR: ' + e.message;
  });
</script>
</body>
</html>
