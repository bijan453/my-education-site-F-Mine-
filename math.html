<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Математика</title>
<style>
  :root{
    --bg1:#1e1e2f;
    --bg2:#3a3a6a;
    --card:rgba(255,255,255,0.06);
    --card2:rgba(255,255,255,0.10);
    --text:#ffffff;
    --muted:#cfd3ff;
    --accent:#6c63ff;
    --accent2:#574bff;
    --ok:#4caf50;
    --bad:#f44336;
    --warn:#ffcc00;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    text-align:center;
    transition:0.5s;
    min-height:100vh;
  }

  body.light{
    background:linear-gradient(135deg,#f5f5f5,#d0d0ff);
    color:#222;
  }

  .container{
    width:min(1100px,100%);
    margin:0 auto;
    padding:22px;
    animation:fadeIn 0.8s ease;
  }

  @keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
  }

  h1{
    font-size:36px;
    margin:8px 0 18px;
  }

  .user-info{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:14px;
    flex-direction:column;
  }

  .user-info img{
    width:80px;
    height:80px;
    border-radius:50%;
    cursor:pointer;
    object-fit:cover;
    margin-bottom:10px;
    border:2px solid rgba(255,255,255,0.25);
    box-shadow:0 0 20px rgba(108,99,255,0.3);
  }

  .user-info span{
    font-weight:bold;
    font-size:20px;
  }

  .toolbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }

  .screen{
    margin-top:14px;
    padding:18px;
    border-radius:18px;
    background:var(--card);
    backdrop-filter:blur(12px);
    box-shadow:0 0 24px rgba(0,0,0,0.18);
  }

  .screen-title{
    margin:4px 0 16px;
    font-size:26px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:14px;
    justify-items:stretch;
    margin-top:10px;
  }

  .level-grid{
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:10px;
    margin-top:12px;
  }

  button{
    padding:14px 16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:var(--accent);
    color:white;
    font-size:16px;
    transition:0.25s;
    width:100%;
    box-shadow:0 6px 16px rgba(0,0,0,0.18);
  }

  button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
    background:var(--accent2);
  }

  button.secondary{
    background:#444;
  }

  button.secondary:hover{
    background:#555;
  }

  button.ghost{
    background:transparent;
    border:1px solid rgba(255,255,255,0.22);
    box-shadow:none;
  }

  body.light button.secondary{
    background:#666;
  }

  .card-btn{
    text-align:left;
    padding:16px;
    white-space:normal;
    line-height:1.35;
  }

  .card-btn strong{
    display:block;
    font-size:17px;
    margin-bottom:4px;
  }

  .card-btn small{
    display:block;
    opacity:0.86;
    font-size:13px;
  }

  .tiny{
    display:block;
    margin-top:6px;
    font-size:12px;
    opacity:0.85;
  }

  .task-box{
    margin-top:8px;
  }

  .result{
    margin-top:14px;
    font-size:20px;
    min-height:28px;
  }

  .solution{
    margin-top:10px;
    opacity:0.88;
    min-height:24px;
    line-height:1.45;
  }

  .progress{
    margin-top:10px;
    font-weight:bold;
  }

  .progress-bar{
    width:min(820px,100%);
    height:15px;
    background:#444;
    margin:12px auto 0;
    border-radius:10px;
    overflow:hidden;
  }

  #progressFill, #taskProgressFill{
    width:0%;
    height:100%;
    background:var(--warn);
    transition:0.35s;
  }

  input{
    padding:12px 14px;
    border-radius:12px;
    border:none;
    margin-top:15px;
    font-size:18px;
    width:min(520px,100%);
    text-align:center;
    outline:none;
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:14px;
  }

  .controls button{
    width:auto;
    min-width:160px;
  }

  .nav-row{
    margin-top:18px;
  }

  .hidden{ display:none; }

  .hint-box{
    margin-top:10px;
    padding:12px 14px;
    border-radius:12px;
    background:var(--card2);
    text-align:left;
    line-height:1.45;
    max-width:820px;
    margin-left:auto;
    margin-right:auto;
  }

  .footer{
    margin-top:28px;
    padding:10px;
    font-size:15px;
    opacity:0.8;
  }

  .footer.dark-glow p{
    text-shadow:0 0 10px #6c63ff;
  }

  @media (max-width: 768px){
    h1{ font-size:24px; }
    .screen-title{ font-size:22px; }
    .grid{ grid-template-columns:1fr; gap:12px; }
    .level-grid{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
    button{ width:100%; max-width:none; font-size:16px; }
    .controls button{ width:100%; min-width:unset; }
    input{ width:100%; font-size:16px; }
    .container{ padding:14px; }
  }

  @media (max-width: 480px){
    .level-grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
    .user-info img{ width:68px; height:68px; }
    .user-info span{ font-size:18px; }
  }
</style>
</head>

<body>
<div class="container">

  <div class="user-info">
    <img id="avatar" src="default-avatar.png" alt="avatar">
    <span id="nickname">Пользователь</span>
  </div>

  <h1>📚 Математика</h1>

  <div class="toolbar">
    <button onclick="toggleTheme()">🌓 Сменить тему</button>
    <button id="exitBtn" class="secondary" onclick="goLobby()">⬅ Выйти в лобби</button>
  </div>

  <div id="classScreen" class="screen">
    <h2 class="screen-title">Выбери класс</h2>
    <div id="classGrid" class="grid"></div>
  </div>

  <div id="topicScreen" class="screen hidden">
    <h2 class="screen-title" id="topicScreenTitle">Выбери тему</h2>
    <div id="topicGrid" class="grid"></div>
    <div class="nav-row">
      <button class="secondary" onclick="backToClasses()">⬅ Назад</button>
    </div>
  </div>

  <div id="levelScreen" class="screen hidden">
    <h2 class="screen-title" id="levelScreenTitle">Выбери уровень</h2>
    <div class="progress" id="topicProgress"></div>
    <div class="progress-bar"><div id="progressFill"></div></div>
    <div id="levelGrid" class="level-grid"></div>
    <div class="nav-row">
      <button class="secondary" onclick="backToTopics()">⬅ Назад</button>
    </div>
  </div>

  <div id="taskScreen" class="screen hidden">
    <h2 class="screen-title" id="taskScreenTitle">Уровень</h2>
    <div class="progress" id="taskProgress"></div>
    <div class="progress-bar"><div id="taskProgressFill"></div></div>

    <div class="task-box">
      <p id="question" style="font-size:22px; line-height:1.45; margin:18px 0 8px;"></p>
      <input id="answer" autocomplete="off" placeholder="Ответ">
      <div class="controls">
        <button onclick="checkAnswer()">Проверить</button>
        <button onclick="showHint()">💡 Подсказка</button>
        <button id="nextBtn" class="hidden" onclick="nextTask()">Далее</button>
      </div>
      <div class="result" id="result"></div>
      <div class="solution" id="solution"></div>
    </div>

    <div class="nav-row">
      <button class="secondary" onclick="backToLevels()">⬅ К уровням</button>
    </div>
  </div>

  <div class="footer dark-glow">
    <p>Учись по классам, темам и уровням. Каждый уровень содержит 10 задач.</p>
  </div>
</div>

<script>
function goLobby(){
  if(document.referrer){
    window.history.back();
  } else {
    window.location.href = "lobby.html";
  }
}

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("mathTheme", document.body.classList.contains("light") ? "light" : "dark");
}

function loadTheme(){
  const t = localStorage.getItem("mathTheme") || "dark";
  if(t === "light") document.body.classList.add("light");
}

const user = JSON.parse(localStorage.getItem("userData")) || { nickname:"Пользователь", avatar:"default-avatar.png" };
document.getElementById("nickname").innerText = user.nickname || "Пользователь";
document.getElementById("avatar").src = user.avatar || "default-avatar.png";

const CLASSES = {
  "7": {
    title: "7 класс",
    topics: [
      { id:"integers", title:"Числа и действия", desc:"Сложение, вычитание, умножение, деление" },
      { id:"linear", title:"Линейные уравнения", desc:"Простые уравнения с x" },
      { id:"fractions", title:"Дроби", desc:"Сложение и вычитание дробей" },
      { id:"powers", title:"Степени", desc:"Квадраты и кубы" },
      { id:"roots", title:"Корни", desc:"Квадратные корни" },
      { id:"mixed", title:"Смешанные", desc:"Разные простые примеры" }
    ]
  },
  "8": {
    title: "8 класс",
    topics: [
      { id:"linear2", title:"Линейные уравнения", desc:"Уравнения в 2 шага" },
      { id:"brackets", title:"Скобки", desc:"Уравнения со скобками" },
      { id:"fractions2", title:"Дроби", desc:"Дроби с разными знаменателями" },
      { id:"powers2", title:"Степени", desc:"Степени и действия" },
      { id:"roots2", title:"Корни", desc:"Корни посложнее" },
      { id:"mixed2", title:"Смешанные", desc:"Разные задания" }
    ]
  },
  "9": {
    title: "9 класс",
    topics: [
      { id:"quadratic", title:"Квадратные уравнения", desc:"Уравнения с двумя корнями" },
      { id:"factor", title:"Разложение", desc:"Скобки и раскрытие" },
      { id:"functions", title:"Функции", desc:"Подставь значение x" },
      { id:"powers3", title:"Степени", desc:"Степенные выражения" },
      { id:"roots3", title:"Корни", desc:"Корни и упрощение" },
      { id:"mixed3", title:"Смешанные", desc:"Разные задачи" }
    ]
  },
  "10": {
    title: "10 класс",
    topics: [
      { id:"inequalities", title:"Неравенства", desc:"Линейные неравенства" },
      { id:"quadratic2", title:"Квадратные уравнения", desc:"Посложнее" },
      { id:"trig", title:"Тригонометрия", desc:"sin, cos, tan" },
      { id:"logs", title:"Логарифмы", desc:"Простые логарифмы" },
      { id:"exponents", title:"Показательные", desc:"Степенные уравнения" },
      { id:"mixed4", title:"Смешанные", desc:"Разные темы" }
    ]
  }
};

const TOPIC_GENERATORS = {
  integers: genArithmetic,
  linear: genOneStepEq,
  fractions: genFractionsSame,
  powers: genPowersBasic,
  roots: genRootsBasic,
  mixed: genMixedBasic,

  linear2: genTwoStepEq,
  brackets: genBracketsEq,
  fractions2: genFractionsDiff,
  powers2: genPowersAdvanced,
  roots2: genRootsAdvanced,
  mixed2: genMixedAdvanced8,

  quadratic: genQuadraticRoots,
  factor: genFactorExpand,
  functions: genFunctionEval,
  powers3: genPowerLaws,
  roots3: genRootsSimplify,
  mixed3: genMixedAdvanced9,

  inequalities: genInequalities,
  quadratic2: genQuadraticRootsHard,
  trig: genTrig,
  logs: genLogs,
  exponents: genExponentials,
  mixed4: genMixedAdvanced10
};

let currentClass = "7";
let currentTopic = null;
let currentLevel = 1;
let currentTasks = [];
let taskIndex = 0;

function progressKey(cls, topic){
  const uid = localStorage.getItem("currentUser") || user.nickname || "guest";
  return `mathProgress_${uid}_${cls}_${topic}`;
}

function getProgress(cls, topic){
  return JSON.parse(localStorage.getItem(progressKey(cls, topic)) || '{"highestCompleted":0}');
}

function saveProgress(cls, topic, data){
  localStorage.setItem(progressKey(cls, topic), JSON.stringify(data));
}

function unlockFor(cls, topic){
  const p = getProgress(cls, topic);
  return Math.min(16, (p.highestCompleted || 0) + 1);
}

function normalizeText(str){
  return String(str)
    .toLowerCase()
    .replace(/ё/g, "е")
    .replace(/[–−]/g, "-")
    .replace(/×/g, "*")
    .replace(/·/g, "*")
    .replace(/\s+/g, "")
    .replace(/,/g, ".")
    .trim();
}

function gcd(a, b){
  a = Math.abs(a);
  b = Math.abs(b);
  while(b){
    [a, b] = [b, a % b];
  }
  return a || 1;
}

function simplifyFraction(n, d){
  if(d < 0){ n = -n; d = -d; }
  const g = gcd(n, d);
  return { n:n / g, d:d / g };
}

function fracToString(n, d){
  const f = simplifyFraction(n, d);
  if(f.d === 1) return String(f.n);
  if(f.n === 0) return "0";
  return `${f.n}/${f.d}`;
}

function parseFractionLike(input){
  const s = normalizeText(input);
  if(/^[-+]?\d+\/[-+]?\d+$/.test(s)){
    const [n, d] = s.split("/").map(Number);
    if(d === 0) return null;
    return { type:"fraction", value:n / d };
  }
  if(/^[-+]?\d+(\.\d+)?$/.test(s)){
    return { type:"number", value:parseFloat(s) };
  }
  return null;
}

function numberChecker(expected){
  return (user) => {
    const s = normalizeText(user);
    const m = s.match(/-?\d+(\.\d+)?/);
    if(!m) return false;
    return Math.abs(parseFloat(m[0]) - expected) < 1e-9;
  };
}

function fractionChecker(expectedN, expectedD){
  const ex = simplifyFraction(expectedN, expectedD);
  return (user) => {
    const p = parseFractionLike(user);
    if(!p) return false;
    return Math.abs(p.value - (ex.n / ex.d)) < 1e-6;
  };
}

function textChecker(expected){
  const ex = normalizeText(expected);
  return (user) => normalizeText(user) === ex;
}

function rootsChecker(r1, r2){
  const ex = [r1, r2].map(Number).sort((a,b)=>a-b);
  return (user) => {
    const s = normalizeText(user).replace(/x1|x2|x=|корни|root|roots/g, "");
    const nums = (s.match(/-?\d+(\.\d+)?/g) || []).map(Number).sort((a,b)=>a-b);
    if(nums.length < 2) return false;
    const got = [...new Set(nums)].slice(0,2).sort((a,b)=>a-b);
    return got.length === 2 && Math.abs(got[0] - ex[0]) < 1e-9 && Math.abs(got[1] - ex[1]) < 1e-9;
  };
}

function inequalityChecker(expected){
  const ex = normalizeText(expected);
  const m = ex.match(/^x([<>]=?)(-?\d+)$/);
  if(!m){
    return (user) => normalizeText(user) === ex;
  }
  const op = m[1];
  const v = m[2];
  const reverse = op.includes(">") ? `${v}<x` : `${v}>x`;
  const reverseEq = op === ">=" ? `${v}<=x` : op === "<=" ? `${v}>=x` : reverse;
  return (user) => {
    const u = normalizeText(user);
    return u === ex || u === reverse || u === reverseEq;
  };
}

function makeTask(q, solution, hint, check){
  return { q, solution, hint, check };
}

function rnd(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr){
  return arr[rnd(0, arr.length - 1)];
}

function generateTasksForLevel(cls, topic, level){
  const gen = TOPIC_GENERATORS[topic];
  const out = [];
  for(let i=0; i<10; i++){
    out.push(gen(level, i));
  }
  return out;
}

/* ===== Generators ===== */

function genArithmetic(level, i){
  const max = 6 + level * 2;
  if(i % 4 === 0){
    const a = rnd(1, max);
    const b = rnd(1, max);
    return makeTask(
      `${a} + ${b} = ?`,
      String(a + b),
      "Сложи числа.",
      numberChecker(a + b)
    );
  }
  if(i % 4 === 1){
    const a = rnd(1, max);
    const b = rnd(1, a + max);
    const big = Math.max(a, b), small = Math.min(a, b);
    return makeTask(
      `${big} - ${small} = ?`,
      String(big - small),
      "Вычти меньшее из большего.",
      numberChecker(big - small)
    );
  }
  if(i % 4 === 2){
    const a = rnd(2, 6 + level);
    const b = rnd(2, 6 + level);
    return makeTask(
      `${a} × ${b} = ?`,
      String(a * b),
      "Умножь числа.",
      numberChecker(a * b)
    );
  }
  const a = rnd(2, 6 + level);
  const b = rnd(2, 6 + level);
  const prod = a * b;
  return makeTask(
    `${prod} ÷ ${a} = ?`,
    String(b),
    "Раздели произведение на один множитель.",
    numberChecker(b)
  );
}

function genOneStepEq(level, i){
  const k = rnd(2, 5 + level);
  const x = rnd(1, 10 + level);
  if(i % 4 === 0){
    const b = rnd(1, 10 + level);
    const c = k * x + b;
    return makeTask(
      `${k}x + ${b} = ${c}`,
      `x = ${x}`,
      "Перенеси число вправо и раздели на коэффициент.",
      numberChecker(x)
    );
  }
  if(i % 4 === 1){
    const b = rnd(1, 10 + level);
    const c = k * x - b;
    return makeTask(
      `${k}x - ${b} = ${c}`,
      `x = ${x}`,
      "Сначала прибавь число, потом раздели.",
      numberChecker(x)
    );
  }
  if(i % 4 === 2){
    const c = k * x;
    return makeTask(
      `${k}x = ${c}`,
      `x = ${x}`,
      "Раздели обе части на коэффициент.",
      numberChecker(x)
    );
  }
  const c = x;
  return makeTask(
    `x + ${k} = ${c + k}`,
    `x = ${c}`,
    "Вычти число из правой части.",
    numberChecker(c)
  );
}

function genFractionsSame(level, i){
  const d = rnd(2, 9);
  const a = rnd(1, d + level);
  const b = rnd(1, d + level);
  if(i % 2 === 0){
    const n = a + b;
    return makeTask(
      `${a}/${d} + ${b}/${d} = ?`,
      fracToString(n, d),
      "Знаменатели одинаковые, сложи числители.",
      fractionChecker(n, d)
    );
  }
  const n = Math.max(a, b) - Math.min(a, b);
  return makeTask(
    `${Math.max(a, b)}/${d} - ${Math.min(a, b)}/${d} = ?`,
    fracToString(n, d),
    "Знаменатели одинаковые, вычти числители.",
    fractionChecker(n, d)
  );
}

function genPowersBasic(level, i){
  const n = rnd(2, 8 + level);
  if(i % 2 === 0){
    return makeTask(
      `${n}² = ?`,
      String(n * n),
      "Возведи число в квадрат.",
      numberChecker(n * n)
    );
  }
  const m = rnd(2, 5 + Math.floor(level / 2));
  return makeTask(
    `${m}³ = ?`,
    String(m * m * m),
    "Возведи число в куб.",
    numberChecker(m * m * m)
  );
}

function genRootsBasic(level, i){
  const n = rnd(2, 12 + level);
  const sq = n * n;
  if(i % 2 === 0){
    return makeTask(
      `√${sq} = ?`,
      String(n),
      "Найди число, квадрат которого равен подкоренному.",
      numberChecker(n)
    );
  }
  const k = rnd(2, 4 + Math.floor(level / 4));
  const val = (k * n) * (k * n);
  return makeTask(
    `√${val} = ?`,
    String(k * n),
    "Это полный квадрат.",
    numberChecker(k * n)
  );
}

function genMixedBasic(level, i){
  const pickType = i % 4;
  if(pickType === 0) return genArithmetic(level + 1, i);
  if(pickType === 1) return genOneStepEq(level + 1, i);
  if(pickType === 2) return genFractionsSame(level + 1, i);
  return genRootsBasic(level + 1, i);
}

function genTwoStepEq(level, i){
  const k = rnd(2, 6 + level);
  const x = rnd(1, 12 + level);
  if(i % 4 === 0){
    const b = rnd(1, 8 + level);
    const c = k * x + b;
    return makeTask(
      `${k}x + ${b} = ${c}`,
      `x = ${x}`,
      "Перенеси число и раздели на коэффициент.",
      numberChecker(x)
    );
  }
  if(i % 4 === 1){
    const b = rnd(1, 8 + level);
    const c = k * x - b;
    return makeTask(
      `${k}x - ${b} = ${c}`,
      `x = ${x}`,
      "Сначала прибавь число, потом раздели.",
      numberChecker(x)
    );
  }
  if(i % 4 === 2){
    const c = k * x;
    return makeTask(
      `${k}x = ${c}`,
      `x = ${x}`,
      "Раздели на коэффициент.",
      numberChecker(x)
    );
  }
  const b = rnd(1, 8 + level);
  const c = x + b;
  return makeTask(
    `x + ${b} = ${c}`,
    `x = ${x}`,
    "Вычти число.",
    numberChecker(x)
  );
}

function genBracketsEq(level, i){
  const a = rnd(2, 5 + level);
  const x = rnd(1, 10 + level);
  const b = rnd(1, 8 + level);
  const c = a * (x + b);
  if(i % 2 === 0){
    return makeTask(
      `${a}(x + ${b}) = ${c}`,
      `x = ${x}`,
      "Сначала раскрой скобки, потом найди x.",
      numberChecker(x)
    );
  }
  const c2 = a * (x - b);
  return makeTask(
    `${a}(x - ${b}) = ${c2}`,
    `x = ${x}`,
    "Раздели на коэффициент, потом перенеси число.",
    numberChecker(x)
  );
}

function genFractionsDiff(level, i){
  const d1 = pick([2,3,4,5,6,7,8,9]);
  let d2 = pick([2,3,4,5,6,7,8,9]);
  while(d2 === d1) d2 = pick([2,3,4,5,6,7,8,9]);
  const a = rnd(1, 9 + level);
  const b = rnd(1, 9 + level);
  const op = i % 2 === 0 ? "+" : "-";
  const n = op === "+"
    ? a * d2 + b * d1
    : Math.max(a * d2, b * d1) - Math.min(a * d2, b * d1);
  const sign = op === "+" ? "+" : "-";
  const den = d1 * d2;
  return makeTask(
    `${a}/${d1} ${sign} ${b}/${d2} = ?`,
    fracToString(n, den),
    "Приведи дроби к общему знаменателю.",
    fractionChecker(n, den)
  );
}

function genPowersAdvanced(level, i){
  const a = rnd(2, 5 + level);
  const b = rnd(2, 5 + level);
  if(i % 3 === 0){
    return makeTask(
      `${a}² + ${b}² = ?`,
      String(a*a + b*b),
      "Сначала возведи в квадрат, потом сложи.",
      numberChecker(a*a + b*b)
    );
  }
  if(i % 3 === 1){
    return makeTask(
      `${a}³ - ${b} = ?`,
      String(a*a*a - b),
      "Сначала куб, потом вычитание.",
      numberChecker(a*a*a - b)
    );
  }
  return makeTask(
    `2^${a} + 2^${b} = ?`,
    String((2**a) + (2**b)),
    "Посчитай каждую степень отдельно.",
    numberChecker((2**a) + (2**b))
  );
}

function genRootsAdvanced(level, i){
  const a = rnd(2, 10 + level);
  if(i % 2 === 0){
    const sq = a * a;
    return makeTask(
      `√${sq} = ?`,
      String(a),
      "Это полный квадрат.",
      numberChecker(a)
    );
  }
  const k = rnd(2, 4 + Math.floor(level / 4));
  const n = a * a * k * k;
  return makeTask(
    `√${n} = ?`,
    String(a * k),
    "Можно вынести множитель из-под корня.",
    numberChecker(a * k)
  );
}

function genMixedAdvanced8(level, i){
  const pickType = i % 5;
  if(pickType === 0) return genTwoStepEq(level, i);
  if(pickType === 1) return genBracketsEq(level, i);
  if(pickType === 2) return genFractionsDiff(level, i);
  if(pickType === 3) return genPowersAdvanced(level, i);
  return genRootsAdvanced(level, i);
}

function genQuadraticRoots(level, i){
  const r1 = rnd(1, 5 + Math.floor(level / 2));
  const r2 = rnd(1, 5 + Math.floor(level / 2));
  const s = r1 + r2;
  const p = r1 * r2;
  const sign = i % 2 === 0 ? "-" : "-";
  return makeTask(
    `x² - ${s}x + ${p} = 0`,
    `x = ${r1}, x = ${r2}`,
    "Подбери такие числа, чтобы их сумма и произведение совпали.",
    rootsChecker(r1, r2)
  );
}

function genFactorExpand(level, i){
  const a = rnd(1, 6 + level);
  const b = rnd(1, 6 + level);
  if(i % 2 === 0){
    const ans = `x²+${a+b}x+${a*b}`;
    return makeTask(
      `(x + ${a})(x + ${b}) = ?`,
      ans,
      "Перемножь каждый член в скобках.",
      textChecker(ans)
    );
  }
  const ans = `x²+${b-a}x-${a*b}`;
  return makeTask(
    `(x - ${a})(x + ${b}) = ?`,
    ans,
    "Раскрой скобки по очереди.",
    textChecker(ans)
  );
}

function genFunctionEval(level, i){
  const a = rnd(1, 8 + level);
  const b = rnd(0, 8 + level);
  const x = rnd(1, 10 + level);
  const ans = a * x + b;
  if(i % 2 === 0){
    return makeTask(
      `f(x) = ${a}x + ${b}, f(${x}) = ?`,
      String(ans),
      "Подставь значение x в функцию.",
      numberChecker(ans)
    );
  }
  const c = rnd(1, 10 + level);
  const ans2 = a * c - b;
  return makeTask(
    `f(x) = ${a}x - ${b}, f(${c}) = ?`,
    String(ans2),
    "Подставь число в формулу.",
    numberChecker(ans2)
  );
}

function genPowerLaws(level, i){
  const base = pick([2,3,4,5]);
  const p = rnd(2, 4 + Math.floor(level / 3));
  const q = rnd(2, 4 + Math.floor(level / 3));
  const ans = base ** (p + q);
  if(i % 2 === 0){
    return makeTask(
      `${base}^${p} × ${base}^${q} = ?`,
      String(ans),
      "При умножении степеней с одинаковым основанием складывай показатели.",
      numberChecker(ans)
    );
  }
  const ans2 = (base ** p) * (base ** q);
  return makeTask(
    `${base}^${p} × ${base}^${q} = ?`,
    String(ans2),
    "Сначала посчитай каждую степень.",
    numberChecker(ans2)
  );
}

function genRootsSimplify(level, i){
  const a = rnd(2, 9 + level);
  if(i % 2 === 0){
    const sq = a * a;
    return makeTask(
      `√${sq} = ?`,
      String(a),
      "Найди полный квадрат.",
      numberChecker(a)
    );
  }
  const k = rnd(2, 4);
  const n = a * a * k * k;
  return makeTask(
    `√${n} = ?`,
    String(a * k),
    "Упростить корень можно через разложение на квадраты.",
    numberChecker(a * k)
  );
}

function genMixedAdvanced9(level, i){
  const pickType = i % 5;
  if(pickType === 0) return genQuadraticRoots(level, i);
  if(pickType === 1) return genFactorExpand(level, i);
  if(pickType === 2) return genFunctionEval(level, i);
  if(pickType === 3) return genPowerLaws(level, i);
  return genRootsSimplify(level, i);
}

function genInequalities(level, i){
  const x = rnd(1, 10 + level);
  const a = rnd(2, 6 + level);
  const b = rnd(1, 8 + level);
  const c = a * x + b;
  if(i % 2 === 0){
    return makeTask(
      `${a}x + ${b} > ${c}`,
      `x > ${x}`,
      "Сначала убери число, потом раздели на коэффициент.",
      inequalityChecker(`x > ${x}`)
    );
  }
  return makeTask(
    `${a}x - ${b} ≤ ${c - 2*b}`,
    `x ≤ ${x - 1}`,
    "Внимательно работай со знаком неравенства.",
    inequalityChecker(`x <= ${x - 1}`)
  );
}

function genQuadraticRootsHard(level, i){
  const r1 = rnd(1, 8 + level);
  const r2 = rnd(1, 8 + level);
  const s = r1 + r2;
  const p = r1 * r2;
  const ans = `x = ${r1}, x = ${r2}`;
  return makeTask(
    `x² - ${s}x + ${p} = 0`,
    ans,
    "Ищи два числа: их сумма и произведение должны подойти.",
    rootsChecker(r1, r2)
  );
}

function genTrig(level, i){
  const options = [
    { q:"sin 0° = ?", a:"0", h:"Синус нуля равен нулю.", c:numberChecker(0) },
    { q:"cos 0° = ?", a:"1", h:"Косинус нуля равен 1.", c:numberChecker(1) },
    { q:"sin 30° = ?", a:"1/2", h:"Запомни special angle.", c:fractionChecker(1,2) },
    { q:"cos 60° = ?", a:"1/2", h:"Это тоже 1/2.", c:fractionChecker(1,2) },
    { q:"tan 45° = ?", a:"1", h:"Тангенс 45° равен 1.", c:numberChecker(1) }
  ];
  return makeTask(options[i % options.length].q, options[i % options.length].a, options[i % options.length].h, options[i % options.length].c);
}

function genLogs(level, i){
  const options = [
    { q:"log₂(8) = ?", a:3, h:"2³ = 8.", c:numberChecker(3) },
    { q:"log₃(27) = ?", a:3, h:"3³ = 27.", c:numberChecker(3) },
    { q:"log₅(25) = ?", a:2, h:"5² = 25.", c:numberChecker(2) },
    { q:"log₁₀(100) = ?", a:2, h:"10² = 100.", c:numberChecker(2) },
    { q:"log₂(32) = ?", a:5, h:"2⁵ = 32.", c:numberChecker(5) }
  ];
  const o = options[i % options.length];
  return makeTask(o.q, String(o.a), o.h, o.c);
}

function genExponentials(level, i){
  const options = [
    { q:"2^x = 8", a:3, h:"Подбери степень 2.", c:numberChecker(3) },
    { q:"3^x = 9", a:2, h:"3² = 9.", c:numberChecker(2) },
    { q:"5^x = 25", a:2, h:"5² = 25.", c:numberChecker(2) },
    { q:"2^x = 32", a:5, h:"2⁵ = 32.", c:numberChecker(5) },
    { q:"4^x = 16", a:2, h:"4² = 16.", c:numberChecker(2) }
  ];
  const o = options[i % options.length];
  return makeTask(o.q, String(o.a), o.h, o.c);
}

function genMixedAdvanced10(level, i){
  const pickType = i % 5;
  if(pickType === 0) return genInequalities(level, i);
  if(pickType === 1) return genQuadraticRootsHard(level, i);
  if(pickType === 2) return genTrig(level, i);
  if(pickType === 3) return genLogs(level, i);
  return genExponentials(level, i);
}

function renderClasses(){
  const grid = document.getElementById("classGrid");
  grid.innerHTML = "";
  Object.entries(CLASSES).forEach(([cls, data]) => {
    const btn = document.createElement("button");
    btn.className = "card-btn";
    btn.innerHTML = `<strong>${data.title}</strong><small>Открой темы этого класса</small>`;
    btn.onclick = () => selectClass(cls);
    grid.appendChild(btn);
  });
}

function renderTopics(){
  const grid = document.getElementById("topicGrid");
  const data = CLASSES[currentClass];
  document.getElementById("topicScreenTitle").textContent = data.title + " — выбери тему";
  grid.innerHTML = "";

  data.topics.forEach(topic => {
    const p = getProgress(currentClass, topic.id);
    const unlocked = unlockFor(currentClass, topic.id);
    const btn = document.createElement("button");
    btn.className = "card-btn";
    btn.innerHTML = `
      <strong>${topic.title}</strong>
      <small>${topic.desc}</small>
      <span class="tiny">Уровень: ${Math.min(16, p.highestCompleted + 1)}/16</span>
    `;
    btn.onclick = () => openTopic(topic.id);
    grid.appendChild(btn);
  });
}

function renderLevels(){
  const grid = document.getElementById("levelGrid");
  const topic = getTopicMeta(currentClass, currentTopic);
  const prog = getProgress(currentClass, currentTopic);
  const unlocked = unlockFor(currentClass, currentTopic);

  document.getElementById("levelScreenTitle").textContent = `${topic.title} — уровни`;
  document.getElementById("topicProgress").textContent = `Прогресс темы: ${Math.min(16, prog.highestCompleted)}/16`;
  document.getElementById("progressFill").style.width = `${Math.min(100, (prog.highestCompleted / 16) * 100)}%`;

  grid.innerHTML = "";
  for(let level=1; level<=16; level++){
    const btn = document.createElement("button");
    const done = level <= prog.highestCompleted;
    const locked = level > unlocked;
    btn.textContent = done ? `✓ ${level}` : `${level}`;
    btn.style.opacity = locked ? "0.45" : "1";
    btn.disabled = locked;
    btn.onclick = () => startLevel(level);
    grid.appendChild(btn);
  }
}

function getTopicMeta(cls, topicId){
  return CLASSES[cls].topics.find(t => t.id === topicId);
}

function selectClass(cls){
  currentClass = cls;
  currentTopic = null;
  document.getElementById("classScreen").classList.add("hidden");
  document.getElementById("topicScreen").classList.remove("hidden");
  document.getElementById("levelScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
  renderTopics();
}

function backToClasses(){
  document.getElementById("classScreen").classList.remove("hidden");
  document.getElementById("topicScreen").classList.add("hidden");
  document.getElementById("levelScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
}

function openTopic(topicId){
  currentTopic = topicId;
  document.getElementById("classScreen").classList.add("hidden");
  document.getElementById("topicScreen").classList.add("hidden");
  document.getElementById("levelScreen").classList.remove("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
  renderLevels();
}

function backToTopics(){
  document.getElementById("classScreen").classList.add("hidden");
  document.getElementById("topicScreen").classList.remove("hidden");
  document.getElementById("levelScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
}

function backToLevels(){
  document.getElementById("classScreen").classList.add("hidden");
  document.getElementById("topicScreen").classList.add("hidden");
  document.getElementById("levelScreen").classList.remove("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
}

function startLevel(level){
  currentLevel = level;
  currentTasks = generateTasksForLevel(currentClass, currentTopic, level);
  taskIndex = 0;

  document.getElementById("classScreen").classList.add("hidden");
  document.getElementById("topicScreen").classList.add("hidden");
  document.getElementById("levelScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.remove("hidden");

  document.getElementById("taskScreenTitle").textContent = `${getTopicMeta(currentClass, currentTopic).title} — уровень ${currentLevel}/16`;
  loadTask();
}

function loadTask(){
  const t = currentTasks[taskIndex];
  document.getElementById("question").innerText = t.q;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("solution").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");

  document.getElementById("taskProgress").innerText = `Задание ${taskIndex + 1} / ${currentTasks.length}`;
  document.getElementById("taskProgressFill").style.width = `${((taskIndex + 1) / currentTasks.length) * 100}%`;
}

function checkAnswer(){
  const userAns = document.getElementById("answer").value;
  const task = currentTasks[taskIndex];

  if(task.check(userAns)){
    document.getElementById("result").innerText = "✅ Правильно!";
    document.getElementById("solution").innerText = "";
    document.getElementById("nextBtn").classList.remove("hidden");
  } else {
    document.getElementById("result").innerText = "❌ Неправильно";
    document.getElementById("solution").innerText = "Решение: " + task.solution;
  }
}

function showHint(){
  const task = currentTasks[taskIndex];
  document.getElementById("solution").innerText = task.hint;
}

function nextTask(){
  if(taskIndex < currentTasks.length - 1){
    taskIndex++;
    loadTask();
  } else {
    completeLevel();
  }
}

function completeLevel(){
  const p = getProgress(currentClass, currentTopic);
  if(currentLevel > p.highestCompleted){
    p.highestCompleted = currentLevel;
  }
  saveProgress(currentClass, currentTopic, p);
  alert(`🎉 Уровень ${currentLevel} завершён!`);

  renderLevels();
  backToLevels();
}

document.getElementById("answer").addEventListener("keydown", e => {
  if(e.key === "Enter") checkAnswer();
});

function init(){
  loadTheme();
  renderClasses();
}
init();
</script>
