<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Hub</title>
<style>
:root{
  --bg1:#101827;
  --bg2:#2d4f77;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.12);
  --text:#fff;
  --muted:rgba(255,255,255,.76);
  --ok:#37c96d;
  --bad:#ff5d5d;
  --warn:#ffcc00;
  --shadow:0 18px 40px rgba(0,0,0,.22);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
}
body.light{
  background:linear-gradient(135deg,#f4f8ff,#d8e5ff);
  color:#1d2333;
}
.container{
  width:min(1140px,100%);
  margin:0 auto;
  padding:18px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.brand{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.brand h1{
  margin:0;
  font-size:28px;
  line-height:1.1;
}
.brand p{
  margin:0;
  font-size:13px;
  opacity:.78;
}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
button{
  border:none;
  border-radius:14px;
  padding:12px 14px;
  background:linear-gradient(135deg,#6c63ff,#4a47d1);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition:.18s ease;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}
button:hover{
  transform:translateY(-1px);
  filter:brightness(1.05);
}
button.secondary{
  background:#444;
}
button.ghost{
  background:transparent;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:none;
}
body.light button.secondary{
  background:#666;
}
.card{
  margin-top:14px;
  padding:18px;
  border-radius:22px;
  background:var(--card);
  backdrop-filter:blur(14px);
  box-shadow:var(--shadow);
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.level-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
.option-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.card-btn{
  text-align:left;
  padding:16px;
  white-space:normal;
  line-height:1.35;
}
.card-btn strong{
  display:block;
  font-size:17px;
  margin-bottom:4px;
}
.card-btn small{
  display:block;
  opacity:.86;
  font-size:13px;
}
.hidden{display:none}
.small{
  font-size:13px;
  opacity:.88;
  line-height:1.45;
}
.progress{
  margin-top:10px;
  font-weight:700;
}
.bar{
  width:min(820px,100%);
  height:14px;
  background:#444;
  border-radius:999px;
  margin:10px auto 0;
  overflow:hidden;
}
.fill{
  width:0%;
  height:100%;
  background:var(--warn);
  transition:.3s;
}
.q{
  font-size:22px;
  line-height:1.5;
  margin:18px 0 10px;
}
.option-btn{
  text-align:left;
  min-height:58px;
}
.option-btn.selected{
  outline:2px solid rgba(255,255,255,.55);
}
.option-btn.correct{
  background:var(--ok);
}
.option-btn.wrong{
  background:var(--bad);
}
.result{
  margin-top:14px;
  font-size:20px;
  min-height:28px;
}
.solution{
  margin-top:10px;
  min-height:24px;
  line-height:1.45;
  opacity:.92;
}
.nav-row{
  margin-top:16px;
}
.footer{
  margin-top:24px;
  opacity:.82;
  text-align:center;
  font-size:14px;
}
.top-stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:14px;
}
.stat{
  padding:14px 16px;
  border-radius:18px;
  background:var(--card2);
}
.stat b{
  display:block;
  font-size:18px;
  margin-bottom:4px;
}
.stat span{
  font-size:13px;
  opacity:.85;
}
.loading{
  text-align:center;
  padding:20px 10px;
  font-size:18px;
  opacity:.9;
}
@media (max-width:768px){
  .grid,.option-grid,.top-stats{grid-template-columns:1fr}
  .level-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .brand h1{font-size:22px}
  button{width:100%}
  .container{padding:14px}
}
@media (max-width:480px){
  .level-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">
      <h1 id="pageTitle">📚</h1>
      <p id="pageSubtitle">Гибридные вопросы для biology / history, математика для physics</p>
    </div>
    <div class="toolbar">
      <button class="ghost" type="button" onclick="toggleTheme()">🌓 Тема</button>
      <button class="secondary" type="button" onclick="goLobby()">⬅ Лобби</button>
    </div>
  </div>

  <div class="top-stats">
    <div class="stat"><b id="statClass">4</b><span>класса</span></div>
    <div class="stat"><b id="statTopic">0</b><span>тем</span></div>
    <div class="stat"><b id="statLevel">16</b><span>уровней</span></div>
  </div>

  <div class="card" id="screen-class">
    <h2>Выбери класс</h2>
    <div id="classGrid" class="grid" style="margin-top:12px;"></div>
  </div>

  <div class="card hidden" id="screen-topic">
    <h2 id="topicTitle">Выбери тему</h2>
    <div id="topicGrid" class="grid" style="margin-top:12px;"></div>
    <div class="nav-row"><button class="secondary" type="button" onclick="backToClass()">⬅ Назад</button></div>
  </div>

  <div class="card hidden" id="screen-level">
    <h2 id="levelTitle">Выбери уровень</h2>
    <div class="progress" id="topicProgress"></div>
    <div class="bar"><div id="progressFill" class="fill"></div></div>
    <div id="levelGrid" class="level-grid" style="margin-top:12px;"></div>
    <div class="nav-row"><button class="secondary" type="button" onclick="backToTopics()">⬅ Назад</button></div>
  </div>

  <div class="card hidden" id="screen-task">
    <h2 id="taskTitle">Уровень</h2>
    <div class="progress" id="taskProgress"></div>
    <div class="bar"><div id="taskProgressFill" class="fill"></div></div>
    <div id="taskBody">
      <p class="q" id="question"></p>
      <div id="optionGrid" class="option-grid"></div>
      <div class="nav-row" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px;">
        <button type="button" onclick="checkAnswer()">Проверить</button>
        <button type="button" onclick="showHint()">💡 Подсказка</button>
        <button id="nextBtn" class="hidden" type="button" onclick="nextTask()">Далее</button>
      </div>
      <div id="result" class="result"></div>
      <div id="solution" class="solution"></div>
    </div>
    <div class="nav-row"><button class="secondary" type="button" onclick="backToLevels()">⬅ К уровням</button></div>
  </div>

  <div class="footer">Кнопка уровня теперь открывает экран сразу, а вопросы подгружаются после этого.</div>
</div>

function goLobby(){ location.href = "lobby.html"; }
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem(THEME_KEY, document.body.classList.contains("light") ? "light" : "dark");
}
function loadTheme(){
  if((localStorage.getItem(THEME_KEY) || "dark") === "light") document.body.classList.add("light");
}
loadTheme();

function showScreen(name){
  ["screen-class","screen-topic","screen-level","screen-task"].forEach(id => {
    document.getElementById(id).classList.toggle("hidden", id !== name);
  });
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function unique(arr){ return Array.from(new Set(arr)); }
function normalize(text){
  return String(text).toLowerCase()
    .replace(/ё/g,"е")
    .replace(/[–−]/g,"-")
    .replace(/\s+/g," ")
    .trim();
}
function questionKey(task){ return normalize(task.q || ""); }
function decodeHtml(str){
  const ta = document.createElement("textarea");
  ta.innerHTML = str;
  return ta.value;
}
function makeMCQ(q, correct, wrongs, hint, solution){
  const options = shuffle([correct].concat(wrongs));
  return { q, options, answer: options.indexOf(correct), hint, solution };
}
function makeNumericMCQ(q, correctValue, wrongValues, unit, hint, solution){
  const correctText = unit ? (String(correctValue) + " " + unit) : String(correctValue);
  const wrongTexts = wrongValues.map(v => unit ? (String(v) + " " + unit) : String(v));
  const options = shuffle(unique([correctText].concat(wrongTexts)));
  return { q, options, answer: options.indexOf(correctText), hint, solution };
}

function progressKey(cls, topic){
  return SUBJECT + "_progress_" + currentUser + "_" + cls + "_" + topic;
}
function getProgress(cls, topic){
  try{
    return JSON.parse(localStorage.getItem(progressKey(cls, topic)) || '{"highestCompleted":0}');
  }catch(e){
    return { highestCompleted:0 };
  }
}
function saveProgress(cls, topic, data){
  localStorage.setItem(progressKey(cls, topic), JSON.stringify(data));
}
function unlockFor(cls, topic){
  const p = getProgress(cls, topic);
  return Math.min(16, (p.highestCompleted || 0) + 1);
}
function setLastLesson(payload){
  localStorage.setItem(currentUser + "_" + SUBJECT + "_last", JSON.stringify({
    classNum: payload.classNum,
    topic: payload.topic,
    level: payload.level,
    time: Date.now()
  }));
}
function getRecentKeys(){
  try{
    return JSON.parse(localStorage.getItem(SUBJECT + "_recent_" + currentUser) || "[]");
  }catch(e){
    return [];
  }
}
function rememberKey(k){
  const arr = getRecentKeys();
  arr.unshift(k);
  localStorage.setItem(SUBJECT + "_recent_" + currentUser, JSON.stringify(unique(arr).slice(0,180)));
}

async function fetchWithTimeout(url, ms){
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  try{
    const res = await fetch(url, { signal: controller.signal });
    return await res.json();
  }finally{
    clearTimeout(id);
  }
}

async function fetchOpenTDBQuestions(count){
  if(SUBJECT === "physics") return [];
  const category = SUBJECT === "history" ? 23 : 17;
  const reqs = Array.from({length: count}, () => fetchWithTimeout(
    "https://opentdb.com/api.php?amount=1&type=multiple&category=" + category,
    3500
  ).then(data => {
    if(!data.results || !data.results.length) return null;
    const r = data.results[0];
    const correct = decodeHtml(r.correct_answer);
    const wrongs = r.incorrect_answers.map(decodeHtml);
    const options = shuffle([correct].concat(wrongs));
    return {
      q: decodeHtml(r.question),
      options,
      answer: options.indexOf(correct),
      hint: "Подумай по теме и выбери самый точный вариант.",
      solution: "Правильный ответ: " + correct + "."
    };
  }).catch(() => null));

  const res = await Promise.all(reqs);
  return res.filter(Boolean);
}

function genPhysicsTask(topic, level, i){
  if(topic === "motion"){
    if(i % 2 === 0){
      const s = 60 + ((level * 17 + i * 7) % 150);
      const t = 2 + ((level + i) % 6);
      const v = Math.round((s / t) * 10) / 10;
      return makeNumericMCQ(
        "Тело прошло " + s + " м за " + t + " с. Чему равна скорость?",
        v,
        [Math.round((v + 1.5) * 10) / 10, Math.round((v + 3) * 10) / 10, Math.max(0.1, Math.round((v - 1) * 10) / 10)],
        "м/с",
        "Используй формулу v = s / t.",
        "v = " + s + " / " + t + " = " + v + " м/с."
      );
    }
    const v = 10 + ((level * 3 + i) % 30);
    const t = 2 + ((level + i) % 6);
    const s = v * t;
    return makeNumericMCQ(
      "Скорость тела " + v + " м/с, время " + t + " с. Какой путь оно пройдет?",
      s,
      [s + 10, Math.max(1, s - 10), s + 20],
      "м",
      "Используй s = v × t.",
      "s = " + v + " × " + t + " = " + s + " м."
    );
  }

  if(topic === "density"){
    if(i % 2 === 0){
      const m = 200 + ((level * 19 + i * 13) % 700);
      const V = 50 + ((level * 11 + i * 9) % 350);
      const rho = Math.round((m / V) * 10) / 10;
      return makeNumericMCQ(
        "Масса тела " + m + " г, объём " + V + " см³. Чему равна плотность?",

        [Math.round((rho + 0.5) * 10) / 10, Math.round((rho + 1) * 10) / 10, Math.max(0.1, Math.round((rho - 0.4) * 10) / 10)],

        "Используй ρ = m / V.",
        "ρ = " + m + " / " + V + " = " + rho + " г/см³."
      );
    }
    const rho = [0.8,1,2,2.5,7.8][(level + i) % 5];
    const V = 50 + ((level * 7 + i * 5) % 180);
    const m = Math.round(rho * V);
    return makeNumericMCQ(
      "Плотность вещества " + rho + " г/см³, объём " + V + " см³. Найди массу.",
      m,
      [m + 50, Math.max(1, m - 30), m + 20],
      "г",
      "Используй m = ρ × V.",
      "m = " + rho + " × " + V + " = " + m + " г."

  }

  if(topic === "force"){
    if(i % 2 === 0){
      const m = 2 + ((level + i) % 9);
      const a = 1 + ((level * 2 + i) % 6);
      const F = m * a;
      return makeNumericMCQ(
        "Масса тела " + m + " кг, ускорение " + a + " м/с². Чему равна сила?",
        F,
        [F + 2, F + 4, Math.max(1, F - 2)],
        "Н",
        "Используй F = m × a.",
        "F = " + m + " × " + a + " = " + F + " Н."
      );
    }
    return makeMCQ(
      "Что измеряют в ньютонах?",

    );

  if(topic === "pressure"){

      const p = Math.round((F / S) * 10) / 10;

  if(topic === "optics"){
    if(i % 2 === 0){
      const v = 300;
      const f = 50 + ((level * 3 + i) % 50);
      const l = Math.round((v / f) * 10) / 10;
      return makeNumericMCQ(
        "Скорость волны " + v + " м/с, частота " + f + " Гц. Найди длину волны.",
        l,
        [Math.round((l + 0.5) * 10) / 10, Math.max(0.1, Math.round((l - 0.4) * 10) / 10), Math.round((l + 1) * 10) / 10],

  if(topic === "electricAdvanced"){

function buildLocalTask(level, i){
  if(SUBJECT === "physics"){
    const topic = currentTopic;
    return genPhysicsTask(topic, level, i);
  }
  const bank = APP[SUBJECT].local;
  const row = bank[(level + i) % bank.length];
  return makeMCQ(row.q, row.c, row.w, row.h, row.s);
}

async function loadDeckForLevel(level){
  const deck = [];
  const seen = new Set(getRecentKeys().map(normalize));

  if(SUBJECT !== "physics"){
    const apiQuestions = await fetchOpenTDBQuestions(6);
    for(const q of apiQuestions){
      const key = questionKey(q);
      if(!seen.has(key)){
        seen.add(key);
        deck.push(q);
      }
      if(deck.length >= 10) break;
    }
  }

  let i = 0;
  while(deck.length < 10 && i < 80){
    const q = buildLocalTask(level, i);
    const key = questionKey(q);
    if(!seen.has(key)){
      seen.add(key);
      deck.push(q);
    }
    i++;
  }

  while(deck.length < 10){
    const q = buildLocalTask(level, i + 100);
    const key = questionKey(q);
    if(!seen.has(key)){
      seen.add(key);
      deck.push(q);
    }else{
      deck.push(q);
    }
    i++;
  }

  rememberKeyBulk(deck);
  return deck.slice(0,10);
}

function rememberKeyBulk(tasks){
  const arr = getRecentKeys();
  for(const t of tasks){
    const k = questionKey(t);
    if(!arr.includes(k)) arr.unshift(k);
  }
  localStorage.setItem(SUBJECT + "_recent_" + currentUser, JSON.stringify(arr.slice(0,180)));
}

function renderClasses(){
  const grid = document.getElementById("classGrid");
  grid.innerHTML = "";
  Object.keys(SPEC.classes).forEach(function(cls){
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "card-btn";
    btn.innerHTML = "<strong>" + cls + " класс</strong><small>Открой темы этого класса</small>";
    btn.onclick = function(){ selectClass(cls); };
    grid.appendChild(btn);
  });
}

function renderTopics(){
  const grid = document.getElementById("topicGrid");
  document.getElementById("topicTitle").textContent = currentClass + " класс — выбери тему";
  grid.innerHTML = "";
  SPEC.classes[currentClass].forEach(function(topicId){
    const topic = SPEC.meta[currentClass][topicId];
    const p = getProgress(currentClass, topicId);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "card-btn";
    btn.innerHTML =
      "<strong>" + topic.title + "</strong>" +
      "<small>" + topic.desc + "</small>" +
      "<span class='small'>Уровень: " + Math.min(16, (p.highestCompleted || 0) + 1) + "/16</span>";
    btn.onclick = function(){ openTopic(topicId); };
    grid.appendChild(btn);
  });
}

function renderTopicLevels(){
  const topic = SPEC.meta[currentClass][currentTopic];
  const prog = getProgress(currentClass, currentTopic);
  document.getElementById("levelTitle").textContent = topic.title + " — уровни";
  document.getElementById("topicProgress").textContent = "Прогресс темы: " + Math.min(16, prog.highestCompleted || 0) + "/16";
  document.getElementById("progressFill").style.width = Math.min(100, ((prog.highestCompleted || 0) / 16) * 100) + "%";

  const unlocked = unlockFor(currentClass, currentTopic);
  const grid = document.getElementById("levelGrid");
  grid.innerHTML = "";

  for(let level=1; level<=16; level++){
    const btn = document.createElement("button");
    btn.type = "button";
    const done = level <= (prog.highestCompleted || 0);
    const locked = level > unlocked;
    btn.textContent = done ? ("✓ " + level) : String(level);
    btn.disabled = locked;
    btn.style.opacity = locked ? "0.45" : "1";
    btn.onclick = function(){ startLevel(level); };
    grid.appendChild(btn);
  }
}

function selectClass(cls){
  currentClass = cls;
  showScreen("screen-topic");
  renderTopics();
}
function openTopic(topicId){
  currentTopic = topicId;
  showScreen("screen-level");
  renderTopicLevels();
}
function backToClass(){
  showScreen("screen-class");
}
function backToTopics(){
  showScreen("screen-topic");
}
function backToLevels(){
  showScreen("screen-level");
}

function renderTask(){
  const t = currentTasks[taskIndex];
  if(!t){
    document.getElementById("question").textContent = "Загрузка...";
    document.getElementById("optionGrid").innerHTML = "";
    document.getElementById("result").textContent = "";
    document.getElementById("solution").textContent = "";
    document.getElementById("nextBtn").classList.add("hidden");
    return;
  }

  selectedOption = null;
  checked = false;
  optionButtons = [];

  document.getElementById("question").innerText = t.q;
  document.getElementById("result").innerText = "";
  document.getElementById("solution").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("taskProgress").innerText = "Вопрос " + (taskIndex + 1) + " / " + currentTasks.length;
  document.getElementById("taskProgressFill").style.width = (((taskIndex + 1) / currentTasks.length) * 100) + "%";

  const grid = document.getElementById("optionGrid");
  grid.innerHTML = "";
  t.options.forEach(function(opt, idx){
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-btn secondary";
    btn.textContent = opt;
    btn.onclick = function(){ selectOption(idx, btn); };
    optionButtons.push(btn);
    grid.appendChild(btn);
  });
}

function selectOption(index, button){
  if(checked) return;
  selectedOption = index;
  optionButtons.forEach(function(b){ b.classList.remove("selected"); });
  button.classList.add("selected");
}

function checkAnswer(){
  if(checked) return;
  const task = currentTasks[taskIndex];
  if(!task){
    return;
  }
  if(selectedOption === null){
    document.getElementById("result").innerText = "Выбери вариант ответа.";
    return;
  }

  checked = true;
  optionButtons.forEach(function(btn, idx){
    btn.disabled = true;
    if(idx === task.answer) btn.classList.add("correct");
    if(idx === selectedOption && selectedOption !== task.answer) btn.classList.add("wrong");
  });

  if(selectedOption === task.answer){
    document.getElementById("result").innerText = "✅ Правильно!";
    document.getElementById("solution").innerText = "";
  }else{
    document.getElementById("result").innerText = "❌ Неправильно";
    document.getElementById("solution").innerText = "Правильный ответ: " + task.options[task.answer] + ". " + (task.solution || "");
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

function showHint(){
  const task = currentTasks[taskIndex];
  if(task) document.getElementById("solution").innerText = task.hint || "";
}

function nextTask(){
  if(taskIndex < currentTasks.length - 1){
    taskIndex++;
    renderTask();
  }else{
    const p = getProgress(currentClass, currentTopic);
    if(currentLevel > (p.highestCompleted || 0)) p.highestCompleted = currentLevel;
    saveProgress(currentClass, currentTopic, p);
    renderTopicLevels();
    backToLevels();
  }
}

function startLevel(level){
  currentLevel = level;
  currentTasks = [];
  taskIndex = 0;
  showScreen("screen-task");
  document.getElementById("taskTitle").textContent = SPEC.meta[currentClass][currentTopic].title + " — уровень " + level + "/16";
  document.getElementById("question").textContent = "Загрузка вопросов...";
  document.getElementById("optionGrid").innerHTML = "";
  document.getElementById("result").textContent = "";
  document.getElementById("solution").textContent = "";
  document.getElementById("nextBtn").classList.add("hidden");

  setTimeout(async function(){
    try{
      currentTasks = await loadDeckForLevel(level);
    }catch(e){
      currentTasks = [];
    }
    if(!currentTasks.length){
      currentTasks = [buildLocalTask(level, 0)];
    }
    taskIndex = 0;
    renderTask();
  }, 10);
}

renderClasses();
showScreen("screen-class");
</script>
