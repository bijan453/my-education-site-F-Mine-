<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат-бот Математика</title>
<style>
    @media (max-width: 768px){
  h1{ font-size:24px; }
  button{ width:100%; }
}
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#3a3a6a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  width:90%;
  max-width:600px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.3);
}
h1 {
  text-align:center;
  font-size:2.5rem;
  margin-bottom:10px;
}
#chat {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:10px;
  height:400px;
  overflow-y:auto;
  margin-bottom:15px;
  background: rgba(0,0,0,0.1);
}
.message {
  margin:5px 0;
}
.user { color:#6c63ff; }
.bot { color:#ffd700; }
input { width:70%; padding:10px; border-radius:10px; border:none; margin-right:5px; font-size:16px;}
button { padding:10px 15px; border-radius:10px; border:none; background:#6c63ff; color:white; cursor:pointer; margin:2px;}
.thinking { display:inline-block; }
.dot {
  display:inline-block;
  width:18px; height:18px;
  background:gray;
  border-radius:50%;
  margin:0 3px;
  animation:bounce 1s infinite;
}
.dot:nth-child(2) { animation-delay:0.2s; }
.dot:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce {
  0%,80%,100% { transform:scale(0); }
  40% { transform:scale(1); }
}
.language-select { margin-bottom:10px;}
</style>
</head>
<body>
<div class="container">
<h1>🤖 Математика Бот</h1>
<div class="language-select">
  <button id="btnRU" onclick="setLang('RU')">RU</button>
  <button id="btnEN" onclick="setLang('EN')">EN</button>
</div>
<div id="chat"></div>
<input id="userInput" placeholder="Введите вопрос">
<button id="sendBtn" onclick="sendMessage()">Отправить</button>
<button id="voiceBtn" onclick="startVoice()">🎤 Говорить</button>
<button id="exitBtn" onclick="goLobby()">⬅ Выйти в лобби</button>
</div>
<script>
// =======================
// 💀 FINAL FIXED VERSION (ALL BUGS FIXED + SUPER EXPLANATIONS + SQRT SUPPORT)
// =======================

var chat = document.getElementById('chat');
var lang = 'RU';
var recognition;

// =======================
// 🔤 LANGUAGE
// =======================
var placeholders = {RU:'Введите вопрос', EN:'Enter your question'};
var sendBtnTexts = {RU:'Отправить', EN:'Send'};
var exitBtnTexts = {RU:'⬅ Выйти в лобби', EN:'⬅ Back'};
var voiceBtnTexts = {RU:'🎤 Говорить', EN:'🎤 Speak'};

function setLang(l){
    lang = l;
    document.getElementById('userInput').placeholder = placeholders[l];
    document.getElementById('sendBtn').textContent = sendBtnTexts[l];
    document.getElementById('exitBtn').textContent = exitBtnTexts[l];
    document.getElementById('voiceBtn').textContent = voiceBtnTexts[l];
    addMessage('Система', l==='RU'?'Язык изменён':'Language changed','bot');
}

function goLobby(){
    window.location.href='lobby.html';
}

function addMessage(sender,text,cls){
    var div=document.createElement('div');
    div.classList.add('message',cls);
    div.textContent = sender + ': ' + text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// =======================
// ⏳ THINKING DOTS (RESTORED)
// =======================
function showThinking(){
    var thinking=document.createElement('div');
    thinking.id='thinking';
    thinking.classList.add('thinking');

    for(var i=0;i<3;i++){
        var dot=document.createElement('div');
        dot.classList.add('dot');
        thinking.appendChild(dot);
    }

    chat.appendChild(thinking);
}

function hideThinking(){
    var t=document.getElementById('thinking');
    if(t) t.remove();
}

// =======================
// SEND
// =======================
function sendMessage(){
    var input=document.getElementById('userInput');
    var text=input.value.trim();
    if(!text) return;

    addMessage('Вы',text,'user');
    input.value='';
    showThinking();

    setTimeout(function(){
        hideThinking();
        var res = bot(text);
        addMessage('Бот',res.text,'bot');
        if(res.graph) drawGraph(res.graph);
    },800);
}

// =======================
// VOICE FIXED
// =======================
function startVoice(){
    if(!('webkitSpeechRecognition' in window)){
        alert('Не поддерживается');
        return;
    }

    recognition = new webkitSpeechRecognition();
    recognition.lang = (lang==='RU'?'ru-RU':'en-US');

    recognition.onresult = function(e){
        var text = e.results[0][0].transcript;
        document.getElementById('userInput').value = text;
        sendMessage();
    };

    recognition.start();
}

// =======================
// NORMALIZE (🔥 SQRT ADDED)
// =======================
function norm(t){
    return t.toLowerCase()
    .replace(/\s+/g,'')
    .replace(/²/g,'^2')
    .replace(/³/g,'^3')
    .replace(/x2/g,'x^2')
    .replace(/x3/g,'x^3')

    // ➕ SQRT SUPPORT (ADDED)
    .replace(/√/g,'Math.sqrt')
    .replace(/кореньиз/g,'Math.sqrt')
    .replace(/sqrt/g,'Math.sqrt')

    // ➕ implicit multiplication fixes
    .replace(/(\d)(Math\.sqrt)/g,'$1*$2')
    .replace(/x(Math\.sqrt)/g,'x*$1')

    // basic ops
    .replace(/плюс/g,'+')
    .replace(/минус/g,'-');
}

// =======================
// 🧠 SUPER EXPLANATION ENGINE
// =======================
function explainLinear(a,b,c,x){
    return `\n📘 Объяснение:\n1) Переносим b: ${a}x = ${c} - (${b})\n2) Считаем: ${a}x = ${c-b}\n3) Делим: x = ${x}`;
}

function explainQuadratic(a,b,c,D,x1,x2){
    return `\n📘 Объяснение:\n1) D = b² - 4ac = ${D}\n2) Подставляем формулу\n3) x1 = ${x1}\n4) x2 = ${x2}`;
}

function explainBiquadratic(a,b,c,roots){
    return `\n📘 Объяснение:\n1) y = x² замена\n2) решаем квадратное\n3) обратно x = ±√y\n4) ответ: ${roots.join(', ')}`;
}

// =======================
// BOT
// =======================
function bot(text){
    let original = text.toLowerCase();
    text = norm(text);

    // GRAPH
    if(original.includes('граф')||original.includes('нарисуй')||original.includes('plot')){
        return {text:'Рисую график...', graph:text.replace('y=','')};
    }

    // QUADRATIC
    let q = text.match(/([-+]?\d*)x\^2([-+]?\d*)x([-+]?\d*)=0/);
    if(q){
        let a=parseFloat(q[1])||1;
        let b=parseFloat(q[2])||0;
        let c=parseFloat(q[3])||0;
        let D=b*b-4*a*c;

        if(D<0) return {text:`D=${D}\nНет корней`};

        let x1=(-b+Math.sqrt(D))/(2*a);
        let x2=(-b-Math.sqrt(D))/(2*a);

        return {
            text:`Квадратное уравнение:\nD=${D}\nx1=${x1}\nx2=${x2}` + explainQuadratic(a,b,c,D,x1,x2)
        };
    }

    // BIQUADRATIC
    let bq = text.match(/([-+]?\d*)x\^4([-+]?\d*)x\^2([-+]?\d*)=0/);
    if(bq){
        let a=parseFloat(bq[1])||1;
        let b=parseFloat(bq[2])||0;
        let c=parseFloat(bq[3])||0;

        let D=b*b-4*a*c;
        if(D<0) return {text:'Нет корней'};

        let y1=(-b+Math.sqrt(D))/(2*a);
        let y2=(-b-Math.sqrt(D))/(2*a);

        let roots=[];

        if(y1>=0){ roots.push(Math.sqrt(y1),-Math.sqrt(y1)); }
        if(y2>=0){ roots.push(Math.sqrt(y2),-Math.sqrt(y2)); }

        return {
            text:'Биквадратное уравнение:\nКорни: '+roots.map(r=>r.toFixed(2)).join(', ') + explainBiquadratic(a,b,c,roots.map(r=>r.toFixed(2)))
        };
    }

    // SIMPLE EVAL
    try{
        let res = Function('return '+text)();

let pretty = res;

// если это число — пробуем сделать дробь
if(typeof res === 'number' && isFinite(res)){
    let frac = toFraction(res);
    if(frac) pretty = frac + " (" + res + ")";
}

return {text:'Ответ: '+pretty};

    }catch{
        return {text:'Не понимаю 😢'};
    }
}

// =======================
// GRAPH
// =======================
function drawGraph(expr){
    let old=document.getElementById('graph');
    if(old) old.remove();

    let canvas=document.createElement('canvas');
    canvas.id='graph';
    canvas.width=400;
    canvas.height=400;
    chat.appendChild(canvas);

    let ctx=canvas.getContext('2d');

    ctx.beginPath();
    for(let px=0;px<400;px++){
        let x=(px-200)/20;
        let y;
        try{ y=Function('x','return '+expr)(x); }
        catch{ continue; }
        let py=200-y*20;
        if(px===0) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
    }
    ctx.stroke();
}

// =======================
// ENTER
// =======================
document.getElementById('userInput').addEventListener('keydown', function(e){
    if(e.key==='Enter') sendMessage();
});
function toFraction(decimal){
    const tolerance = 1.0E-10;
    let h1=1, h2=0, k1=0, k2=1;
    let b = decimal;
    do {
        let a = Math.floor(b);
        let aux = h1; h1 = a*h1 + h2; h2 = aux;
        aux = k1; k1 = a*k1 + k2; k2 = aux;
        b = 1/(b-a);
    } while(Math.abs(decimal - h1/k1) > decimal * tolerance);

    return h1 + "/" + k1;
}

</script>

</body>
</html>
