<script>
    let userStats = JSON.parse(localStorage.getItem("userStats")) || {
    messages: 0,
    level: 1
};

    let chatHistory = JSON.parse(localStorage.getItem("chatHistory")) || [];

// =======================
// 💀 FINAL FIXED VERSION (ALL BUGS FIXED + SUPER EXPLANATIONS + SQRT SUPPORT)
// =======================

var chat = document.getElementById('chat');
var lang = 'RU';
var recognition;
let lastProblem = null;



// =======================
// 🔤 LANGUAGE
// =======================
var placeholders = {RU:'Введите вопрос', EN:'Enter your question'};
var sendBtnTexts = {RU:'Отправить', EN:'Send'};
var exitBtnTexts = {RU:'⬅ Выйти в лобби', EN:'⬅ Back'};
var voiceBtnTexts = {RU:'🎤 Говорить', EN:'🎤 Speak'};

function setLang(l){
    lang = l;
    document.getElementById('userInput').placeholder = placeholders[l];
    document.getElementById('sendBtn').textContent = sendBtnTexts[l];
    document.getElementById('exitBtn').textContent = exitBtnTexts[l];
    document.getElementById('voiceBtn').textContent = voiceBtnTexts[l];
    addMessage('Система', l==='RU'?'Язык изменён':'Language changed','bot');
}

function goLobby(){
    window.location.href='lobby.html';
}

function addMessage(sender,text,cls){
    var div=document.createElement('div');
    div.classList.add('message',cls);
    div.textContent = sender + ': ' + text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    chatHistory.push({sender, text, cls});
localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

}

// =======================
// ⏳ THINKING DOTS (RESTORED)
// =======================
function showThinking(){
    var thinking=document.createElement('div');
    thinking.id='thinking';
    thinking.classList.add('thinking');

    for(var i=0;i<3;i++){
        var dot=document.createElement('div');
        dot.classList.add('dot');
        thinking.appendChild(dot);
    }

    chat.appendChild(thinking);
}

function hideThinking(){
    var t=document.getElementById('thinking');
    if(t) t.remove();
}

// =======================
// SEND
// =======================
function sendMessage(){
    var input=document.getElementById('userInput');
    var text=input.value.trim();
    if(!text) return;

    addMessage('Вы',text,'user');
    userStats.messages++;

if(userStats.messages % 10 === 0){
    userStats.level++;
    addMessage("Система", "🎉 Уровень повышен: " + userStats.level, "bot");
}

localStorage.setItem("userStats", JSON.stringify(userStats));

    input.value='';
    showThinking();

    setTimeout(function(){
        hideThinking();
        var res = bot(text);
        typeMessage('Бот',res.text,'bot');
        if(res.graph) drawGraph(res.graph);

// =======================
// VOICE FIXED
// =======================
function startVoice(){
    if(!('webkitSpeechRecognition' in window)){
        alert('Не поддерживается');
        return;
    }

    recognition = new webkitSpeechRecognition();
    recognition.lang = (lang==='RU'?'ru-RU':'en-US');

    recognition.onresult = function(e){
        var text = e.results[0][0].transcript;
        document.getElementById('userInput').value = text;
        sendMessage();
    };

    recognition.start();
}

// =======================
// NORMALIZE (🔥 SQRT ADDED)
// =======================
function norm(t){
    return t.toLowerCase()

    // пробелы
    .replace(/\s+/g,'')

    // степени
    .replace(/²/g,'^2')
    .replace(/³/g,'^3')
    .replace(/x2/g,'x^2')
    .replace(/y2/g,'y^2')
    .replace(/x\*x/g,'x^2')
    .replace(/y\*y/g,'y^2')

    // sqrt
    .replace(/√/g,'Math.sqrt')
    .replace(/кореньиз/g,'Math.sqrt')
    .replace(/sqrt/g,'Math.sqrt')

    // умножение
    .replace(/(\d)(x)/g,'$1*$2')
    .replace(/(\d)(y)/g,'$1*$2')

    // слова
    .replace(/плюс/g,'+')
    .replace(/минус/g,'-')
}
// =======================
// 📘 LINEAR SOLVER
// =======================
function solveLinear(eq){

    let parts = eq.split('=');
    if(parts.length !== 2) return null;

    let left = parts[0];
    let right = parts[1];

    try{
        // приводим к виду ax + b
        let a = 0, b = 0;

        left.replace(/([+-]?\d*)x/g, m=>{
            a += parseFloat(m.replace('x','')) || 1;
        });

        left.replace(/([+-]?\d+)(?!x)/g, m=>{
            b += parseFloat(m);
        });

        let c = Function('return '+right)();

        let x = (c - b) / a;

        return {
            text:`📘 Линейное уравнение:

1) Переносим:
${a}x + ${b} = ${c}

2) ${a}x = ${c} - ${b}

3) ${a}x = ${c-b}

4) x = ${x}`
        };

    }catch{
        return null;
    }
}
// =======================
// 📘 SYSTEM 2x2
// =======================
function solveSystemFull(text){

    let lines = text.split(';');
    if(lines.length !== 2) return null;

    let eq1 = lines[0];
    let eq2 = lines[1];

    try{
        // коэффициенты
        let [a1,b1,c1] = parseEq(eq1);
        let [a2,b2,c2] = parseEq(eq2);

        let D = a1*b2 - a2*b1;
        let Dx = c1*b2 - c2*b1;
        let Dy = a1*c2 - a2*c1;

        let x = Dx / D;
        let y = Dy / D;

        return {
            text:`📘 Система:

D = ${D}

x = ${x}
y = ${y}`
        };

    }catch{
        return null;
    }
}
// =======================
// 📘 INEQUALITY
// =======================
function solveInequality(text){

    if(text.includes('>')){
        let [l,r] = text.split('>');
        let x = Function('return ('+r+') - ('+l+')')();
        return {text:`x > ${x}`};
    }

    if(text.includes('<')){
        let [l,r] = text.split('<');
        let x = Function('return ('+r+') - ('+l+')')();
        return {text:`x < ${x}`};
    }

    return null;
}
// =======================
// 📘 VIETA
// =======================
function vieta(a,b,c){

    let sum = -b/a;
    let mult = c/a;

    return `
📘 Теорема Виета:

x1 + x2 = ${sum}
x1 * x2 = ${mult}
`;
}


function parseEq(eq){
    let [l,r] = eq.split('=');

    let a = 0, b = 0;

    l.replace(/([+-]?\d*)x/g, m=>{
        a += parseFloat(m)||1;
    });

    l.replace(/([+-]?\d*)y/g, m=>{
        b += parseFloat(m)||1;
    });

    let c = Function('return '+r)();

    return [a,b,c];
}
// =======================
// 📘 ABSOLUTE VALUE
// =======================
function solveModule(text){

    let m = text.match(/\|(.+)\|=(.+)/);
    if(!m) return null;

    let expr = m[1];
    let val = parseFloat(m[2]);

    let x1 = Function('return '+expr.replace('x','('+val+')'))();
    let x2 = Function('return '+expr.replace('x','(-'+val+')'))();

    return {
        text:`📘 Модуль:

|${expr}| = ${val}

1) ${expr} = ${val}
2) ${expr} = -${val}

(решение упрощённое)`
    };
}
// =======================
// 📘 FRACTION EQUATION
// =======================
function solveFraction(text){

    if(!text.includes('/')) return null;

    try{
        let parts = text.split('=');
        if(parts.length!==2) return null;

        let left = parts[0];
        let right = parts[1];

        return {
            text:`📘 Дробное уравнение:

${left} = ${right}

👉 Умножаем всё на общий знаменатель

(дальше решается как линейное)`
        };

    }catch{
        return null;
    }
}

// =======================
// 📘 SQRT EQUATION
// =======================
function solveSqrt(text){

    if(!text.includes('Math.sqrt')) return null;

    try{
        let parts = text.split('=');
        let left = parts[0];
        let right = parts[1];

        return {
            text:`📘 Иррациональное:

${left} = ${right}

👉 Возводим в квадрат обе части

(решение продолжается)`
        };

    }catch{
        return null;
    }
}


// =======================
// 🧠 SUPER EXPLANATION ENGINE
// =======================
function explainLinear(a,b,c,x){
    return `\n📘 Объяснение:\n1) Переносим b: ${a}x = ${c} - (${b})\n2) Считаем: ${a}x = ${c-b}\n3) Делим: x = ${x}`;
}

function explainQuadratic(a,b,c,D,x1,x2){
    return `

📘 Подробное объяснение:

1) Дано:
a=${a}, b=${b}, c=${c}

2) Формула дискриминанта:
D = b² - 4ac

3) Считаем:
D = ${b}² - 4·${a}·${c} = ${D}

4) Формула корней:
x = (-b ± √D) / 2a

5) Подставляем:

x1 = (${ -b } + √${D}) / ${2*a} = ${x1}

x2 = (${ -b } - √${D}) / ${2*a} = ${x2}

✅ Ответ:
x1 = ${x1}
x2 = ${x2}
`;
}


function explainBiquadratic(a,b,c,roots){
    return `\n📘 Объяснение:\n1) y = x² замена\n2) решаем квадратное\n3) обратно x = ±√y\n4) ответ: ${roots.join(', ')}`;
}

// =======================
// BOT
// =======================
function bot(text){
    let original = text.toLowerCase();
    if(/^[a-zA-Z\s?!.]+$/.test(text)){
    lang = 'EN';
}else{
    lang = 'RU';
}

    text = norm(text);
    // 💬 CHAT CHECK FIRST
let chat = chatReply(text);
if(chat) return {text: chat};

    // линейное
let lin = solveLinear(text);
if(lin) return lin;

// система 2x2
let sys2 = solveSystemFull(text);
if(sys2) return sys2;

// неравенства
let ineq = solveInequality(text);
if(ineq) return ineq;

    // =======================
// 🧠 SMART COMMANDS
// =======================

if(text.includes('реши') || text.includes('solve')){
    let clean = text.replace('реши','').replace('solve','');
    
    let sys = solveSystem(clean);
    if(sys) return sys;
}

if(text.includes('проверь') || text.includes('check')){
    let clean = text.replace('проверь','').replace('check','');
    
    let check = checkSolution(clean);
    if(check) return check;
}


    // GRAPH
    if(original.includes('граф')||original.includes('нарисуй')||original.includes('plot')){
        return {text:'Рисую график...', graph:text.replace('y=','')};
    }

    // QUADRATIC
    let q = text.match(/([-+]?\d*)x\^2([-+]?\d*)x([-+]?\d*)=0/);
    if(q){
        lastProblem = text;

        let a=parseFloat(q[1])||1;
        let b=parseFloat(q[2])||0;
        let c=parseFloat(q[3])||0;
        let D=b*b-4*a*c;

        if(D<0) return {text:`D=${D}\nНет корней`};

        let x1=(-b+Math.sqrt(D))/(2*a);
        let x2=(-b-Math.sqrt(D))/(2*a);

        return {
            text:`Квадратное уравнение:\nD=${D}\nx1=${x1}\nx2=${x2}` + explainQuadratic(a,b,c,D,x1,x2)
        };
    }

    // BIQUADRATIC
    let bq = text.match(/([-+]?\d*)x\^4([-+]?\d*)x\^2([-+]?\d*)=0/);
    if(bq){
        let a=parseFloat(bq[1])||1;
        let b=parseFloat(bq[2])||0;
        let c=parseFloat(bq[3])||0;

        let D=b*b-4*a*c;
        if(D<0) return {text:'Нет корней'};

        let y1=(-b+Math.sqrt(D))/(2*a);
        let y2=(-b-Math.sqrt(D))/(2*a);

        let roots=[];

        if(y1>=0){ roots.push(Math.sqrt(y1),-Math.sqrt(y1)); }
        if(y2>=0){ roots.push(Math.sqrt(y2),-Math.sqrt(y2)); }

        return {
            text:'Биквадратное уравнение:\nКорни: '+roots.map(r=>r.toFixed(2)).join(', ') + explainBiquadratic(a,b,c,roots.map(r=>r.toFixed(2)))
        };
    }

    // SIMPLE EVAL
    // =======================
// 🧠 AUTO DETECT (БЕЗ "РЕШИ")
// =======================

// система уравнений (через ;)
if(text.includes(';')){
    let sys = solveSystem(text);
    if(sys) return sys;
}

// квадратное (без команды)
let q_auto = text.match(/([-+]?\d*)x\^2([-+]?\d*)x([-+]?\d*)=0/);
if(q_auto){
    let a=parseFloat(q_auto[1])||1;
    let b=parseFloat(q_auto[2])||0;
    let c=parseFloat(q_auto[3])||0;

    let D=b*b-4*a*c;

    if(D<0) return {text:`D=${D}\nНет корней`};

    let x1=(-b+Math.sqrt(D))/(2*a);
    let x2=(-b-Math.sqrt(D))/(2*a);

    return {
        text:`Квадратное уравнение:
D=${D}
x1=${x1}
x2=${x2}` + explainQuadratic(a,b,c,D,x1,x2)
    };
}

    try{
        let res = Function('return '+text)();

let pretty = res;

// если это число — пробуем сделать дробь
if(typeof res === 'number' && isFinite(res)){
    let frac = toFraction(res);
    if(frac) pretty = frac + " (" + res + ")";
}

return {text:'Ответ: '+pretty};

    }catch{
        return {text:'Не понимаю 😢'};
    }
}

// =======================
// GRAPH
// =======================
function drawGraph(expr){
    let old=document.getElementById('graph');
    if(old) old.remove();

    let canvas=document.createElement('canvas');
    canvas.id='graph';
    canvas.width=400;
    canvas.height=400;
    chat.appendChild(canvas);

    let ctx=canvas.getContext('2d');

    ctx.beginPath();
    for(let px=0;px<400;px++){
        let x=(px-200)/20;
        let y;
        try{ y=Function('x','return '+expr)(x); }
        catch{ continue; }
        let py=200-y*20;
        if(px===0) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
    }
    ctx.stroke();
}

// =======================
// ENTER
// =======================
document.getElementById('userInput').addEventListener('keydown', function(e){
    if(e.key==='Enter') sendMessage();
});
function toFraction(decimal){
    const tolerance = 1.0E-10;
    let h1=1, h2=0, k1=0, k2=1;
    let b = decimal;
    do {
        let a = Math.floor(b);
        let aux = h1; h1 = a*h1 + h2; h2 = aux;
        aux = k1; k1 = a*k1 + k2; k2 = aux;
        b = 1/(b-a);
    } while(Math.abs(decimal - h1/k1) > decimal * tolerance);

    return h1 + "/" + k1;
}
// =======================
// 🧠 SYSTEM SOLVER
// =======================
function solveSystem(text){

    // пример: x+y=10;x=5
    let parts = text.split(';');

    if(parts.length !== 2) return null;

    try{
        let eq1 = parts[0];
        let eq2 = parts[1];

        // если x=...
        if(eq2.startsWith('x=')){
            let x = Function('return '+eq2.replace('x=',''))();

            let y = Function('x','return '+eq1.split('=')[1])(x);

            return {
                text:`📘 Система:

1) Подставляем x=${x}
2) Получаем y=${y}

✅ Ответ:
x=${x}
y=${y}`
            };
        }

    }catch{
        return null;
    }

    return null;
}
// =======================
// 🧠 CHECK SOLUTION
// =======================
// =======================
// 📘 CHECK PRO
// =======================
function checkSolution(text){

    let parts = text.split(';');
    if(parts.length !== 2) return null;

    try{
        let eq = parts[0];
        let ans = parts[1];

        let x = parseFloat(ans.split('=')[1]);

        let left = Function('x','return '+eq.split('=')[0])(x);
        let right = Function('return '+eq.split('=')[1])();

        let correct = Math.abs(left-right) < 0.0001;

        if(correct){
            return {text:`✅ Верно!\n${left} ≈ ${right}`};
        }else{
            return {
                text:`❌ Неверно

${left} ≠ ${right}

👉 Попробуй ещё`
            };
        }

    }catch{
        return null;
    }
}

    if(t.includes("скучно") || t.includes("boring")){
        return isEN
        ? "Let's solve something hard 😏"
        : "Давай решим сложный пример 😏";
    }

    if(t.includes("не понимаю")){
        
        return isEN
        ? "Let's go step by step 📘"
        : "Разберём по шагам 📘";
    }

    if(t.includes("шутка") || t.includes("joke")){
        return isEN
        ? "Why math? Because of problems 😂"
        : "Почему математика? Потому что проблемы 😂";
    }

    // =========================
    // ❓ DEFAULT
    // =========================
    return isEN
    ? "I don't understand 🤔 Try math"
    : "Я не понял 🤔 Напиши пример";
    if(
    t.includes("проверь") ||
    t.includes("check") ||
    t.includes("verify") ||
    (t.includes("=") && t.includes("?")) ||
    t.startsWith("check")
){

    // 🔥 вытаскиваем выражение типа 2+2=5
    let exprMatch = text.match(/(.+)=\s*(-?\d+(\.\d+)?)/);

    if(!exprMatch){
        return isEN
        ? "Send like: 2+2=5 or check 2+2=5"
        : "Напиши как: 2+2=5 или check 2+2=5";
    }

    let leftSide = exprMatch[1];
    let rightSide = parseFloat(exprMatch[2]);

    let correctValue;

    try{
        correctValue = Function("return " + leftSide)();
    }catch{
        return isEN
        ? "Can't calculate expression 🤔"
        : "Не могу вычислить выражение 🤔";
    }

    if(Math.abs(correctValue - rightSide) < 0.0001){
        return isEN
        ? "✅ Correct!"
        : "✅ Правильно!";
    } else {
        return isEN
        ? `❌ Wrong. ${leftSide} = ${correctValue}, not ${rightSide}`
        : `❌ Неправильно. ${leftSide} = ${correctValue}, а не ${rightSide}`;
    }
}


if(t.includes("реши ещё") || t.includes("next step")){
    return isEN
    ? "Send next step or value 👍"
    : "Отправь следующий шаг 👍";
}

}

document.getElementById('userInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        if(e.shiftKey) return; // Shift+Enter = новая строка (если textarea)
        
        e.preventDefault();

        let input = document.getElementById('userInput');
        if(input.value.trim() === "") return;

        sendMessage();
    }
});
function clearChat(){
    chatHistory = [];
    localStorage.removeItem("chatHistory");
    chat.innerHTML = "";
}
function typeMessage(sender, text, cls){

    let div = document.createElement("div");
    div.classList.add("message", cls);
    chat.appendChild(div);

    let i = 0;
    let interval = setInterval(()=>{
        div.textContent = sender + ": " + text.slice(0,i);
        i++;

        if(i > text.length){
            clearInterval(interval);
        }
    }, 20);
}
function extractNumber(str){
    let match = str.match(/-?\d+(\.\d+)?/);
    return match ? parseFloat(match[0]) : null;
}
function smartExtract(text){

    if(!text) return null;

    let t = text.toLowerCase();

    // 1. обычные числа
    let numMatch = t.match(/-?\d+(\.\d+)?/);
    if(numMatch) return parseFloat(numMatch[0]);

    // 2. дроби 1/2
    let frac = t.match(/(-?\d+)\s*\/\s*(\d+)/);
    if(frac){
        return parseFloat(frac[1]) / parseFloat(frac[2]);
    }

    // 3. приближённые слова
    if(t.includes("ноль")) return 0;
    if(t.includes("один")) return 1;
    if(t.includes("два")) return 2;

    return null;
}
