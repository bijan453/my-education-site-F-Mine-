<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Mine | Friends</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#1e1e2f,#3a3a6a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:95%;
    max-width:600px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}

h2{
    color:gold;
    text-align:center;
}

#chat{
    height:300px;
    overflow-y:auto;
    border:1px solid rgba(255,255,255,0.2);
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
    background:rgba(0,0,0,0.2);
}

.msg{
    margin:5px 0;
}

.admin{
    color:gold;
    font-weight:bold;
}

input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:linear-gradient(135deg,#6c63ff,#4a47d1);
    color:white;
    cursor:pointer;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}
</style>
</head>

<body>

<div class="box">

<h2>📢 Новости проекта F-Mine</h2>

<div id="chat"></div>

<input id="text" placeholder="Написать сообщение">

<button id="sendBtn" onclick="sendMessage()">Отправить</button>

</div>

<script>

function isAdmin(){
    return localStorage.getItem("currentUser") === "admin123";
}

let chat = document.getElementById("chat");

let messages = JSON.parse(localStorage.getItem("friends_chat") || "[]");

function render(){
    chat.innerHTML = "";
    messages.forEach(m=>{
        let div = document.createElement("div");
        div.classList.add("msg");
        div.innerHTML = (m.admin ? "👑 ADMIN: " : "👤 USER: ") + m.text;
        if(m.admin) div.classList.add("admin");
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
}

render();

function sendMessage(){

    if(!isAdmin()){
        alert("Только admin123 может писать!");
        return;
    }

    let text = document.getElementById("text").value.trim();

    if(!text) return;

    messages.push({
        text:text,
        admin:true
    });

    localStorage.setItem("friends_chat", JSON.stringify(messages));

    document.getElementById("text").value = "";
    render();
}

if(!isAdmin()){
    document.getElementById("sendBtn").disabled = true;
    document.getElementById("text").placeholder = "Только admin123 может писать";
}
function isAdmin(){
    let user = localStorage.getItem("currentUser");
    return user === "admin123";
}
</script>

</body>
</html>
