<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F-Mine | Олимпиада</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  getDocs,
  query,
  orderBy,
  limit,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3mpP7UjMrqbq-X_bmDfBQkZGbwTy6aVc",
  authDomain: "fmine-auth.firebaseapp.com",
  projectId: "fmine-auth",
  storageBucket: "fmine-auth.firebasestorage.app",
  messagingSenderId: "219769927531",
  appId: "1:219769927531:web:fbd45a0876f32927d23e2e",
  measurementId: "G-ETT9HCQRQD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = localStorage.getItem("currentUser") || "guest";
const profile = JSON.parse(localStorage.getItem("user_" + user) || "{}");
const nick = profile.nickname || user;
const avatar = profile.avatar || "https://via.placeholder.com/96";

const CLASS_LABELS = {7:"7 класс", 8:"8 класс", 9:"9 класс", 10:"10 класс"};
const TOPIC_HINTS = {
  7:"Быстрые вычисления, дроби и уравнения",
  8:"Скобки, дроби, корни и уравнения",
  9:"Квадратные уравнения, функции и степени",
  10:"Неравенства, логарифмы, тригонометрия"
};

const state = {
  classNum: 7,
  questions: [],
  index: 0,
  correct: 0,
  wrong: 0,
  points: 0,
  currentShownAt: 0,
  questionLimit: 12,
  leaderboardMode: "total"
};

const $ = id => document.getElementById(id);
const json = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };

function normalize(s){
  return String(s)
    .toLowerCase()
    .replace(/ё/g,"е")
    .replace(/\s+/g,"")
    .replace(/×/g,"*")
    .replace(/·/g,"*")
    .replace(/,/g,".")
    .trim();
}
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b] = [b, a%b]; } return a || 1; }
function simplifyFrac(n,d){ if(d < 0){ n = -n; d = -d; } const g = gcd(n,d); return [n/g, d/g]; }
function fracString(n,d){ const [a,b] = simplifyFrac(n,d); return b === 1 ? String(a) : `${a}/${b}`; }

function parseFracAns(ans){
  const s = normalize(ans);
  const m = s.match(/^(-?\d+)(?:\/(-?\d+))?$/);
  if(!m) return null;
  const n = Number(m[1]);
  const d = m[2] ? Number(m[2]) : 1;
  if(!d) return null;
  return simplifyFrac(n,d);
}
function numberCheck(expected){
  return v => {
    const s = normalize(v);
    const m = s.match(/-?\d+(\.\d+)?/);
    if(!m) return false;
    return Math.abs(Number(m[0]) - expected) < 1e-9;
  };
}
function fracCheck(expectedN, expectedD){
  const [en, ed] = simplifyFrac(expectedN, expectedD);
  return v => {
    const p = parseFracAns(v);
    if(!p) return false;
    return p[0] === en && p[1] === ed;
  };
}
function rootPairCheck(a,b){
  const ex = [Number(a), Number(b)].sort((x,y)=>x-y);
  return v => {
    const s = normalize(v).replace(/x=/g,"").replace(/корни/g,"").replace(/root/g,"");
    const nums = (s.match(/-?\d+(\.\d+)?/g) || []).map(Number).sort((x,y)=>x-y);
    if(nums.length < 2) return false;
    return Math.abs(nums[0]-ex[0]) < 1e-9 && Math.abs(nums[1]-ex[1]) < 1e-9;
  };
}
function textCheck(expected){
  const ex = normalize(expected);
  return v => normalize(v) === ex;
}
function question(q, answer, hint, explain, checker){
  return { q, answer, hint, explain, checker };
}
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[rnd(0, arr.length-1)]; }

function gen7(){
  const a = rnd(2,9), b = rnd(1,9), c = rnd(1,9);
  const set = [
    question(`${a} + ${b} = ?`, a+b, "Сложи числа.", `Ответ: ${a}+${b}=${a+b}`, numberCheck(a+b)),
    question(`${a} × ${b} = ?`, a*b, "Умножь числа.", `Ответ: ${a}×${b}=${a*b}`, numberCheck(a*b)),
    question(`${a}x = ${a*c}`, c, "Раздели обе части на коэффициент.", `x=${c}`, numberCheck(c)),
    question(`x + ${b} = ${c+b}`, c, "Вычти число справа.", `x=${c}`, numberCheck(c)),
    question(`${a}/${b} + 1/${b} = ?`, fracString(a+1,b), "Знаменатели одинаковые.", `Сложи числители: ${a+1}/${b}`, fracCheck(a+1,b)),
    question(`√${c*c} = ?`, c, "Это полный квадрат.", `√${c*c}=${c}`, numberCheck(c)),
    question(`${a}² = ?`, a*a, "Возведи в квадрат.", `${a}²=${a*a}`, numberCheck(a*a)),
    question(`${a}³ = ?`, a*a*a, "Возведи в куб.", `${a}³=${a*a*a}`, numberCheck(a*a*a))
  ];
  return pick(set);
}
function gen8(){
  const x = rnd(2,9), a = rnd(2,7), b = rnd(1,8);
  const set = [
    question(`${a}x + ${b} = ${a*x+b}`, x, "Перенеси число и раздели.", `x=${x}`, numberCheck(x)),
    question(`${a}(x + ${b}) = ${a*(x+b)}`, x, `Сначала раздели на ${a}.`, `x=${x}`, numberCheck(x)),
    question(`${a}(x - ${b}) = ${a*(x-b)}`, x, "Сначала раздели, потом перенеси.", `x=${x}`, numberCheck(x)),
    question(`${a}/${b} + 1/${b} = ?`, fracString(a+1,b), "Одинаковый знаменатель.", `Ответ ${fracString(a+1,b)}`, fracCheck(a+1,b)),
    question(`√${(a*b)*(a*b)} = ?`, a*b, "Корень из квадрата.", `√${(a*b)*(a*b)}=${a*b}`, numberCheck(a*b)),
    question(`${a}² + ${b} = ?`, a*a+b, "Сначала квадрат.", `Ответ ${a*a+b}`, numberCheck(a*a+b)),
    question(`${a}³ - ${b} = ?`, a*a*a-b, "Сначала куб.", `Ответ ${a*a*a-b}`, numberCheck(a*a*a-b)),
    question(`${a}x - ${b} = ${a*x-b}`, x, `Добавь ${b} и раздели.`, `x=${x}`, numberCheck(x))
  ];
  return pick(set);
}
function gen9(){
  const r1 = rnd(1,7), r2 = rnd(1,7), a = rnd(2,6), x = rnd(1,9), b = rnd(1,9);
  const s = r1 + r2, p = r1*r2;
  const set = [
    question(`x² - ${s}x + ${p} = 0`, `${r1}, ${r2}`, "Ищи два числа: сумма и произведение.", `Корни: ${r1} и ${r2}`, rootPairCheck(r1, r2)),
    question(`f(x)=${a}x+${r1}, f(${x})=?`, a*x+r1, "Подставь x в формулу.", `f(${x})=${a*x+r1}`, numberCheck(a*x+r1)),
    question(`${a}² × ${a}³ = ?`, a**5, "При умножении степеней складывай показатели.", `${a}^5=${a**5}`, numberCheck(a**5)),
    question(`x² - ${a*a} = 0`, `${a}, -${a}`, "Разность квадратов.", `x=±${a}`, rootPairCheck(a, -a)),
    question(`(x + ${r1})(x + ${r2}) = ?`, `x² + ${s}x + ${p}`, "Раскрой скобки.", `Ответ: x² + ${s}x + ${p}`, textCheck(`x² + ${s}x + ${p}`)),
    question(`√${a*a} + √${r1*r1} = ?`, a + r1, "Найди оба корня.", `Ответ ${a + r1}`, numberCheck(a+r1)),
    question(`x² - ${a}x + ${b} = 0`, "любые корни", "Тут нужен подбор корней.", `Подбери корни, если возможно.`, v => normalize(v).length > 0),
    question(`${a}³ - ${r1}² = ?`, a**3 - r1**2, "Сначала степени.", `Ответ ${a**3 - r1**2}`, numberCheck(a**3 - r1**2))
  ];
  return pick(set);
}
function gen10(){
  const x = rnd(2,9), a = rnd(2,5), b = rnd(1,6);
  const set = [
    question(`2^x = ${2**x}`, x, "Пойми, какая степень нужна.", `x=${x}`, numberCheck(x)),
    question(`log₂(${2**x}) = ?`, x, "Логарифм — обратная степень.", `Ответ ${x}`, numberCheck(x)),
    question(`sin 30° = ?`, "1/2", "Запомни базовые значения.", `Ответ 1/2`, fracCheck(1,2)),
    question(`cos 60° = ?`, "1/2", "Запомни базовые значения.", `Ответ 1/2`, fracCheck(1,2)),
    question(`x + ${a} > ${a+x}`, `x > ${x}`, "Вычти число слева и справа.", `x > ${x}`, textCheck(`x > ${x}`)),
    question(`${a}x - ${b} = ${a*x-b}`, x, "Перенеси и раздели.", `x=${x}`, numberCheck(x)),
    question(`x² - ${2*x}x + ${x*x} = 0`, x, "Это полный квадрат.", `x=${x}`, numberCheck(x)),
    question(`log₁₀(${10**b}) = ?`, b, "10 в степени равно аргументу.", `Ответ ${b}`, numberCheck(b))
  ];
  return pick(set);
}

function buildQuestion(classNum){
  if(classNum === 7) return gen7();
  if(classNum === 8) return gen8();
  if(classNum === 9) return gen9();
  return gen10();
}
function generateRun(classNum){
  const arr = [];
  const used = new Set();
  while(arr.length < state.questionLimit){
    const q = buildQuestion(classNum);
    if(used.has(q.q)) continue;
    used.add(q.q);
    arr.push(q);
  }
  return arr;
}

function safeSetText(id, text){
  const el = $(id);
  if(el) el.textContent = text;
}

function renderClassCards(){
  document.querySelectorAll("[data-class]").forEach(btn => {
    btn.classList.toggle("active", Number(btn.dataset.class) === state.classNum);
  });
  safeSetText("topicHint", TOPIC_HINTS[state.classNum]);
  safeSetText("classPill", CLASS_LABELS[state.classNum]);
}

function startQuiz(){
  state.questions = generateRun(state.classNum);
  state.index = 0;
  state.correct = 0;
  state.wrong = 0;
  state.points = 0;
  safeSetText("startPanelTitle", "");
  $("startPanel").classList.add("hidden");
  $("quizPanel").classList.remove("hidden");
  $("leaderboardPanel").classList.remove("hidden");
  $("finishPanel").classList.add("hidden");
  safeSetText("quizTitle", `${CLASS_LABELS[state.classNum]} — олимпиада`);
  renderQuestion();
  refreshLeaderboard().catch(()=>{});
  addActivity("Начал олимпиаду.");
}

function renderQuestion(){
  const q = state.questions[state.index];
  if(!q){ finishQuiz(); return; }
  safeSetText("qNum", `Вопрос ${state.index + 1} / ${state.questions.length}`);
  safeSetText("question", q.q);
  $("answer").value = "";
  safeSetText("result", "");
  safeSetText("explain", "");
  $("progressBar").style.width = `${(state.index / state.questions.length) * 100}%`;
  $("submitBtn").disabled = false;
  $("skipBtn").disabled = false;
  $("hintBtn").disabled = false;
  $("nextBtn").classList.add("hidden");
  $("answer").focus();
  state.currentShownAt = Date.now();
  safeSetText("currentScore", `Очки: ${state.points}`);
  safeSetText("correctCount", `Верно: ${state.correct}`);
  safeSetText("wrongCount", `Ошибки: ${state.wrong}`);
}

function checkAnswer(){
  const q = state.questions[state.index];
  const val = $("answer").value.trim();
  if(!val) return;
  const ok = q.checker(val);
  const elapsed = Math.max(0, Math.floor((Date.now() - state.currentShownAt) / 1000));
  if(ok){
    state.correct += 1;
    const bonus = Math.max(0, 40 - elapsed * 2);
    const gain = 100 + bonus;
    state.points += gain;
    safeSetText("result", `✅ Верно! +${gain} очков`);
    safeSetText("explain", q.explain);
  }else{
    state.wrong += 1;
    safeSetText("result", `❌ Неверно`);
    safeSetText("explain", `Правильный ответ: ${q.answer}. ${q.explain}`);
  }
  $("submitBtn").disabled = true;
  $("skipBtn").disabled = true;
  $("hintBtn").disabled = true;
  $("nextBtn").classList.remove("hidden");
  safeSetText("currentScore", `Очки: ${state.points}`);
  safeSetText("correctCount", `Верно: ${state.correct}`);
  safeSetText("wrongCount", `Ошибки: ${state.wrong}`);
  addActivity(ok ? `Ответил верно на вопрос ${state.index + 1}.` : `Ответил неверно на вопрос ${state.index + 1}.`);
}

function showHint(){
  const q = state.questions[state.index];
  if(q) safeSetText("explain", q.hint);
}

function skipQuestion(){
  state.wrong += 1;
  const q = state.questions[state.index];
  safeSetText("result", "⏭ Пропущено");
  safeSetText("explain", `Ответ: ${q.answer}. ${q.explain}`);
  $("submitBtn").disabled = true;
  $("skipBtn").disabled = true;
  $("hintBtn").disabled = true;
  $("nextBtn").classList.remove("hidden");
  safeSetText("currentScore", `Очки: ${state.points}`);
  safeSetText("correctCount", `Верно: ${state.correct}`);
  safeSetText("wrongCount", `Ошибки: ${state.wrong}`);
  addActivity(`Пропустил вопрос ${state.index + 1}.`);
}

function nextQuestion(){
  state.index += 1;
  if(state.index >= state.questions.length){ finishQuiz(); return; }
  renderQuestion();
}

function finishQuiz(){
  $("quizPanel").classList.add("hidden");
  $("finishPanel").classList.remove("hidden");
  safeSetText("finishTitle", `${CLASS_LABELS[state.classNum]} завершён`);
  const percent = Math.round((state.correct / state.questions.length) * 100);
  safeSetText("finishText", `Точность: ${percent}% • Верно: ${state.correct} • Очки: ${state.points}`);
  safeSetText("finishScore", `Итог: ${state.points}`);
  saveLocalOlymp(state.classNum, state.points, percent);
  saveFirestoreScore(state.classNum, state.points, percent).then(() => refreshLeaderboard()).catch(()=>{});
  updateAccountKeys();
  markStudyToday();
  addActivity(`Завершил олимпиаду: ${state.points} очков, ${percent}%.`);
}

function saveLocalOlymp(classNum, points, percent){
  const idx = String(classNum);
  const prevPoints = Number(localStorage.getItem(`${user}_olymp_${idx}_points`) || "0");
  const prevPercent = Number(localStorage.getItem(`${user}_olymp_${idx}`) || "0");
  localStorage.setItem(`${user}_olymp_${idx}_points`, String(Math.max(prevPoints, points)));
  localStorage.setItem(`${user}_olymp_${idx}`, String(Math.max(prevPercent, percent)));
}

async function saveFirestoreScore(classNum, points, percent){
  const ref = doc(db, "olympScores", user);
  const snap = await getDoc(ref);
  const old = snap.exists() ? snap.data() : {};
  const p7 = classNum === 7 ? Math.max(Number(old.p7Points || 0), points) : Number(old.p7Points || 0);
  const p8 = classNum === 8 ? Math.max(Number(old.p8Points || 0), points) : Number(old.p8Points || 0);
  const p9 = classNum === 9 ? Math.max(Number(old.p9Points || 0), points) : Number(old.p9Points || 0);
  const p10 = classNum === 10 ? Math.max(Number(old.p10Points || 0), points) : Number(old.p10Points || 0);
  const pct7 = classNum === 7 ? Math.max(Number(old.p7Percent || 0), percent) : Number(old.p7Percent || 0);
  const pct8 = classNum === 8 ? Math.max(Number(old.p8Percent || 0), percent) : Number(old.p8Percent || 0);
  const pct9 = classNum === 9 ? Math.max(Number(old.p9Percent || 0), percent) : Number(old.p9Percent || 0);
  const pct10 = classNum === 10 ? Math.max(Number(old.p10Percent || 0), percent) : Number(old.p10Percent || 0);

  await setDoc(ref, {
    nick,
    avatar,
    p7Points: p7,
    p8Points: p8,
    p9Points: p9,
    p10Points: p10,
    p7Percent: pct7,
    p8Percent: pct8,
    p9Percent: pct9,
    p10Percent: pct10,
    totalPoints: p7 + p8 + p9 + p10,
    updatedAt: serverTimestamp()
  }, { merge: true });
}

function updateAccountKeys(){
  const cls = String(state.classNum);
  const percentKey = `${user}_olymp_${cls}`;
  const pointsKey = `${user}_olymp_${cls}_points`;
  const prevPct = Number(localStorage.getItem(percentKey) || "0");
  const prevPts = Number(localStorage.getItem(pointsKey) || "0");
  localStorage.setItem(percentKey, String(Math.max(prevPct, Math.round((state.correct / state.questions.length) * 100))));
  localStorage.setItem(pointsKey, String(Math.max(prevPts, state.points)));
}

function addActivity(text){
  const key = `profileActivity_${user}`;
  const arr = json(key) || [];
  arr.unshift({ text, time: new Date().toLocaleString("ru-RU") });
  localStorage.setItem(key, JSON.stringify(arr.slice(0, 8)));
}

function markStudyToday(){
  const key = `studyMeta_${user}`;
  const meta = json(key) || { streak: 0, lastDate: "", weeklyCount: 0, weekKey: "" };
  const today = new Date().toISOString().slice(0,10);
  const d = new Date();
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  mon.setHours(0,0,0,0);
  const weekKey = mon.toISOString().slice(0,10);

  if(meta.lastDate !== today){
    if(meta.weekKey !== weekKey){ meta.weekKey = weekKey; meta.weeklyCount = 0; }
    meta.streak = meta.lastDate ? (new Date(today) - new Date(meta.lastDate) === 86400000 ? (meta.streak || 0) + 1 : 1) : 1;
    meta.weeklyCount = (meta.weeklyCount || 0) + 1;
    meta.lastDate = today;
    localStorage.setItem(key, JSON.stringify(meta));
  }
}

async function refreshLeaderboard(){
  const mode = state.leaderboardMode;
  const map = { total: "totalPoints", 7: "p7Points", 8: "p8Points", 9: "p9Points", 10: "p10Points" };
  const field = map[mode];
  safeSetText("lbTitle", mode === "total" ? "Топ общий" : `Топ ${CLASS_LABELS[mode]}`);

  const q = query(collection(db, "olympScores"), orderBy(field, "desc"), limit(10));
  const snap = await getDocs(q);
  const rows = [];
  snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
  renderLeaderboardRows(rows, mode);
}

function renderLeaderboardRows(rows, mode){
  const box = $("leaderboardList");
  if(!rows.length){
    box.innerHTML = `<div class="lb-empty">Пока нет результатов. Стань первым.</div>`;
    return;
  }

  box.innerHTML = rows.map((r, i) => {
    const score = mode === "total" ? (r.totalPoints || 0) : (r[`p${mode}Points`] || 0);
    const pct = mode === "total"
      ? `${r.p7Percent || 0}% • ${r.p8Percent || 0}% • ${r.p9Percent || 0}% • ${r.p10Percent || 0}%`
      : `${r[`p${mode}Percent`] || 0}%`;

    return `<div class="lb-item ${r.id === user ? 'me' : ''}">
      <div class="rank">#${i + 1}</div>
      <img src="${r.avatar || avatar}" alt="avatar">
      <div class="meta">
        <b>${r.nick || r.id}</b>
        <small>${pct}</small>
      </div>
      <div class="pts">${score}</div>
    </div>`;
  }).join("");
}

function setLeaderboardMode(m){
  state.leaderboardMode = m;
  document.querySelectorAll("[data-lb]").forEach(b => b.classList.toggle("active", b.dataset.lb === m));
  refreshLeaderboard().catch(()=>{});
}

function setClass(c){
  state.classNum = c;
  renderClassCards();
}

function addStartCards(){
  document.querySelectorAll("[data-class]").forEach(b => {
    b.addEventListener("click", () => setClass(Number(b.dataset.class)));
  });
}

function setProfileView(){
  $("avatar").src = avatar;
  $("nick").textContent = nick;
  $("nickSmall").textContent = `@${user}`;
}

function goLobby(){ location.href = "lobby.html"; }
function goAccount(){ location.href = "account.html"; }

async function ensureOlympDoc(){
  const ref = doc(db, "olympScores", user);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref, {
      nick,
      avatar,
      p7Points: 0,
      p8Points: 0,
      p9Points: 0,
      p10Points: 0,
      p7Percent: 0,
      p8Percent: 0,
      p9Percent: 0,
      p10Percent: 0,
      totalPoints: 0,
      updatedAt: serverTimestamp()
    });
  }
}

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("olympTheme", document.body.classList.contains("light") ? "light" : "dark");
}

async function init(){
  setProfileView();
  addStartCards();
  renderClassCards();
  await ensureOlympDoc();
  await refreshLeaderboard();
  addActivity("Opened olymp page.");

  const theme = localStorage.getItem("olympTheme") || "dark";
  if(theme === "light") document.body.classList.add("light");
}

$("startBtn").addEventListener("click", startQuiz);
$("submitBtn").addEventListener("click", checkAnswer);
$("hintBtn").addEventListener("click", showHint);
$("skipBtn").addEventListener("click", skipQuestion);
$("nextBtn").addEventListener("click", nextQuestion);
$("restartBtn").addEventListener("click", () => {
  $("finishPanel").classList.add("hidden");
  $("startPanel").classList.remove("hidden");
  $("quizPanel").classList.add("hidden");
});
$("answer").addEventListener("keydown", e => {
  if(e.key === "Enter" && !$("submitBtn").disabled) checkAnswer();
});
$("themeBtn").addEventListener("click", toggleTheme);
$("lobbyBtn").addEventListener("click", goLobby);
$("accountBtn").addEventListener("click", goAccount);
document.querySelectorAll("[data-lb]").forEach(b => b.addEventListener("click", () => setLeaderboardMode(b.dataset.lb)));

init().catch(err => {
  console.error(err);
  safeSetText("lbTitle", "Ошибка загрузки");
  const box = $("leaderboardList");
  if(box) box.innerHTML = `<div class="lb-empty">Не удалось загрузить страницу.</div>`;
});
</script>
</head>
<body>
<div class="page-shell">
  <header class="hero">
    <div>
      <div class="brand">F-Mine Olympiad</div>
      <div class="small" id="topicHint">Быстрые вычисления, дроби и уравнения</div>
    </div>
    <div class="top-actions">
      <button class="ghost" id="themeBtn">🌓 Тема</button>
      <button class="secondary" id="accountBtn">👤 Профиль</button>
      <button class="secondary" id="lobbyBtn">🏠 Лобби</button>
    </div>
  </header>

  <main class="layout">
    <section class="side-panel">
      <div class="card profile-card">
        <div class="profile">
          <img id="avatar" src="https://via.placeholder.com/96" alt="avatar">
          <div>
            <div id="nick" class="name"></div>
            <div id="nickSmall" class="small"></div>
          </div>
        </div>

        <div class="classes">
          <button data-class="7">7 класс</button>
          <button data-class="8">8 класс</button>
          <button data-class="9">9 класс</button>
          <button data-class="10">10 класс</button>
        </div>

        <div class="pill-row">
          <span class="pill" id="classPill">7 класс</span>
          <span class="pill">12 вопросов</span>
        </div>
      </div>

      <div class="card start-card" id="startPanel">
        <div class="section-title">Готов к старту</div>
        <p class="small">За правильный ответ ты получаешь очки. Чем быстрее отвечаешь, тем больше бонус.</p>
        <button id="startBtn">Начать олимпиаду</button>
      </div>

      <div class="card hidden" id="finishPanel">
        <div class="section-title" id="finishTitle">Завершено</div>
        <div class="finish-text" id="finishText"></div>
        <div class="big-points" id="finishScore"></div>
        <button id="restartBtn">Играть ещё раз</button>
      </div>
    </section>

    <section class="content-panel">
      <div class="card quiz-card hidden" id="quizPanel">
        <div class="qtop">
          <div id="qNum" class="qnum">Вопрос 1 / 12</div>
          <div id="currentScore" class="qscore">Очки: 0</div>
        </div>
        <div class="bar"><div class="bar-fill" id="progressBar"></div></div>
        <div id="question" class="question">Текст вопроса</div>
        <input id="answer" type="text" placeholder="Введи ответ" autocomplete="off" />
        <div class="controls">
          <button id="submitBtn">Проверить</button>
          <button id="hintBtn" class="ghost">Подсказка</button>
          <button id="skipBtn" class="secondary">Пропустить</button>
          <button id="nextBtn" class="hidden">Дальше</button>
        </div>
        <div class="result" id="result"></div>
        <div class="explain" id="explain"></div>
        <div class="stats-row">
          <span id="correctCount">Верно: 0</span>
          <span id="wrongCount">Ошибки: 0</span>
        </div>
      </div>

      <div class="card leaderboard-card" id="leaderboardPanel">
        <div class="lb-header">
          <div>
            <div class="section-title" id="lbTitle">Топ общий</div>
            <div class="small">Скорее проходи и поднимайся выше в таблице</div>
          </div>
          <div class="lb-tabs">
            <button data-lb="total" class="active">All</button>
            <button data-lb="7">7</button>
            <button data-lb="8">8</button>
            <button data-lb="9">9</button>
            <button data-lb="10">10</button>
          </div>
        </div>
        <div id="leaderboardList" class="leaderboard"></div>
      </div>
    </section>
  </main>
</div>

<style>
:root{
  --bg1:#0f1221;
  --bg2:#1d2442;
  --card:rgba(255,255,255,.07);
  --card2:rgba(255,255,255,.10);
  --text:#ffffff;
  --muted:rgba(255,255,255,.75);
  --line:rgba(255,255,255,.12);
  --accent:#6c63ff;
  --accent2:#ffd84d;
  --shadow:0 18px 45px rgba(0,0,0,.28);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Segoe UI,Arial,sans-serif}
body{
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(108,99,255,.25), transparent 35%),
    radial-gradient(circle at top right, rgba(255,216,77,.14), transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
  padding:16px;
}
body.light{
  --bg1:#f7f7fb;
  --bg2:#dfe5ff;
  --card:rgba(255,255,255,.74);
  --card2:rgba(255,255,255,.88);
  --text:#171717;
  --muted:rgba(0,0,0,.65);
  --line:rgba(0,0,0,.08);
  --shadow:0 18px 45px rgba(25,25,50,.12);
}
.page-shell{max-width:1280px;margin:0 auto}
.hero{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.brand{font-size:30px;font-weight:900;letter-spacing:.3px;background:linear-gradient(90deg,var(--text),var(--accent2),var(--text));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.small{font-size:13px;line-height:1.45;color:var(--muted)}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
button{
  border:none;border-radius:14px;padding:12px 15px;font-weight:800;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#4a47d1);color:#fff;transition:.2s ease;box-shadow:var(--shadow)
}
button:hover{transform:translateY(-2px)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}
button.secondary{background:rgba(90,90,90,.9)}
button.ghost{background:transparent;border:1px solid var(--line);color:var(--text);box-shadow:none}
.layout{display:grid;grid-template-columns:360px 1fr;gap:16px}
.card{
  background:linear-gradient(180deg,var(--card),rgba(255,255,255,.04));
  backdrop-filter:blur(16px);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  box-shadow:var(--shadow)
}
.side-panel,.content-panel{display:grid;gap:16px}
.profile{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.profile img{width:84px;height:84px;border-radius:50%;object-fit:cover;border:2px solid var(--accent2)}
.name{font-size:22px;font-weight:900}
.classes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.classes button{width:100%;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--line);box-shadow:none}
.classes button.active{outline:2px solid var(--accent2);background:rgba(255,216,77,.14)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pill{padding:9px 12px;border-radius:999px;background:rgba(0,0,0,.14);color:var(--text);font-size:12px;font-weight:800;border:1px solid var(--line)}
.section-title{font-size:22px;font-weight:900;margin-bottom:8px}
.hidden{display:none}
.quiz-card{min-height:320px}
.qtop{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
.qnum,.qscore{font-weight:900}
.bar{height:14px;background:rgba(0,0,0,.18);border-radius:999px;overflow:hidden;margin:12px 0 14px;border:1px solid var(--line)}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.35s}
.question{font-size:26px;font-weight:900;line-height:1.35;margin:12px 0 12px}
input[type="text"]{
  width:100%;margin-top:8px;padding:15px 16px;border:none;border-radius:14px;
  background:var(--card2);color:var(--text);outline:none;font-size:16px;border:1px solid var(--line)
}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.controls button{flex:1;min-width:140px}
.result{margin-top:14px;font-size:18px;font-weight:900}
.explain{margin-top:8px;color:var(--muted);line-height:1.5}
.stats-row{display:flex;justify-content:space-between;gap:10px;margin-top:14px;font-weight:800;color:var(--muted)}
.finish-text{margin:8px 0 6px;font-size:15px;color:var(--muted)}
.big-points{font-size:38px;font-weight:1000;background:linear-gradient(90deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.lb-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.lb-tabs{display:flex;gap:6px;flex-wrap:wrap}
.lb-tabs button{padding:10px 12px;border-radius:12px}
.lb-tabs button.active{outline:2px solid var(--accent2)}
.leaderboard{display:grid;gap:10px}
.lb-item{
  display:grid;grid-template-columns:42px 42px 1fr auto;gap:10px;align-items:center;
  padding:11px 12px;border-radius:16px;background:rgba(0,0,0,.14);border:1px solid var(--line)
}
.lb-item.me{background:linear-gradient(135deg,rgba(108,99,255,.25),rgba(255,216,77,.12))}
.lb-item .rank{font-weight:1000}
.lb-item img{width:42px;height:42px;border-radius:50%;object-fit:cover}
.lb-item .meta b{display:block;font-weight:900}
.lb-item .meta small{color:var(--muted)}
.lb-item .pts{font-weight:1000}
.lb-empty{padding:16px;border-radius:14px;background:rgba(0,0,0,.10);color:var(--muted)}
@media(max-width:980px){
  .layout{grid-template-columns:1fr}
  .classes{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:640px){
  body{padding:12px}
  .brand{font-size:24px}
  .classes{grid-template-columns:repeat(2,1fr)}
  .question{font-size:21px}
  .controls button{flex:1 1 100%}
  button{width:100%}
  .top-actions{width:100%}
  .top-actions button{flex:1}
  .lb-item{grid-template-columns:36px 36px 1fr auto}
}
</style>
</body>
</html>
